function drawGrid() {
  const m = MAPS[selectedMap];
  const w = C.width / DPR, h = C.height / DPR;
  const now = Date.now();

  // Space background
  ctx.fillStyle = '#0d0a1a';
  ctx.fillRect(0, 0, w, h);

  // Nebula
  if (nebulaCanvas) ctx.drawImage(nebulaCanvas, 0, 0);

  // Starfield
  for (const s of stars) {
    let a = s.alpha;
    if (s.twinkle) a *= 0.5 + 0.5 * Math.sin(now * 0.003 + s.phase);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fillRect(s.x * w, s.y * h, s.size, s.size);
  }

  for (let r = 0; r < m.rows; r++) {
    for (let c = 0; c < m.cols; c++) {
      const x = gridOffX + c * cellSize, y = gridOffY + r * cellSize;
      const v = grid[r][c];
      if (v === 1) {
        // Path cell — metallic panels
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x, y, cellSize, cellSize);
        ctx.strokeStyle = 'rgba(100,120,150,0.08)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x+0.5, y+0.5, cellSize-1, cellSize-1);
        if ((r + c) % 2 === 0) {
          ctx.strokeStyle = 'rgba(100,120,150,0.03)';
          ctx.beginPath();
          ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y + cellSize);
          ctx.moveTo(x + cellSize, y); ctx.lineTo(x, y + cellSize);
          ctx.stroke();
        }
      } else if (v === 0) {
        // Build cell — durasteel
        const isHover = (placementCell && placementCell.row === r && placementCell.col === c);
        ctx.fillStyle = isHover && shopSelection >= 0 ? 'rgba(68,255,68,0.12)' : '#151525';
        ctx.fillRect(x, y, cellSize, cellSize);
        ctx.strokeStyle = 'rgba(100,120,150,0.06)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x+0.5, y+0.5, cellSize-1, cellSize-1);
        if (shopSelection >= 0) {
          ctx.fillStyle = 'rgba(68,255,68,0.04)';
          ctx.fillRect(x, y, cellSize, cellSize);
        }
      } else if (v === 5) {
        ctx.fillStyle = '#151525';
        ctx.fillRect(x, y, cellSize, cellSize);
      }
      // v === 2: border — stars show through, no fill

      if (v === 3) {
        // Entry — holographic rings
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x, y, cellSize, cellSize);
        const cx2 = x + cellSize/2, cy2 = y + cellSize/2;
        for (let ring = 0; ring < 3; ring++) {
          const radius = cellSize * (0.15 + ring * 0.1) + Math.sin(now * 0.003 + ring) * 2;
          ctx.strokeStyle = `rgba(68,255,68,${0.3 - ring * 0.08})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(cx2, cy2, radius, 0, Math.PI*2); ctx.stroke();
        }
        const eg = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, cellSize*0.5);
        eg.addColorStop(0, 'rgba(68,255,68,0.12)');
        eg.addColorStop(1, 'rgba(68,255,68,0)');
        ctx.fillStyle = eg; ctx.fillRect(x, y, cellSize, cellSize);
      }
      if (v === 4) {
        // Exit — red warning zone
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x, y, cellSize, cellSize);
        const cx2 = x + cellSize/2, cy2 = y + cellSize/2;
        const pulse = 0.1 + Math.sin(now * 0.004) * 0.05;
        const xg = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, cellSize*0.5);
        xg.addColorStop(0, `rgba(255,68,68,${pulse})`);
        xg.addColorStop(1, 'rgba(255,68,68,0)');
        ctx.fillStyle = xg; ctx.fillRect(x, y, cellSize, cellSize);
        ctx.save();
        ctx.beginPath(); ctx.rect(x, y, cellSize, cellSize); ctx.clip();
        ctx.globalAlpha = 0.1; ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 1;
        for (let i = -cellSize; i < cellSize*2; i += 6) {
          ctx.beginPath(); ctx.moveTo(x+i, y); ctx.lineTo(x+i+cellSize, y+cellSize); ctx.stroke();
        }
        ctx.restore();
      }
    }
  }

  // Path chevrons
  const step = Math.max(Math.floor(pathPoints.length / 20), 1);
  for (let i = 0; i < pathPoints.length - step; i += step) {
    const p = pathPoints[i];
    const next = pathPoints[Math.min(i + step, pathPoints.length - 1)];
    const ang = Math.atan2(next.y - p.y, next.x - p.x);
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(ang);
    ctx.fillStyle = `rgba(68,170,255,${0.12 + Math.sin(now*0.002+i*0.1)*0.04})`;
    ctx.font = `${Math.floor(cellSize*0.22)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▸', 0, 0);
    ctx.restore();
  }
}

function drawTowerWeapon(def, sz, angle) {
  // Draws weapon centered at 0,0, rotated by angle
  ctx.save();
  ctx.rotate(angle);
  const r = sz * 0.35;
  switch(def.id) {
    case 'thorn': // Blaster — twin barrels
      ctx.fillStyle = '#aaa';
      ctx.fillRect(-r*0.2, -r*1.8, r*0.2, r*1.4);
      ctx.fillRect(r*0.05, -r*1.8, r*0.2, r*1.4);
      ctx.fillStyle = `rgba(${def.accentRGB},0.6)`;
      ctx.beginPath(); ctx.arc(0.03*r, -r*1.8, r*0.25, 0, Math.PI*2); ctx.fill();
      break;
    case 'tack': // Ion Scatter — center + 8 dots
      ctx.fillStyle = def.accent;
      ctx.beginPath(); ctx.arc(0, 0, r*0.3, 0, Math.PI*2); ctx.fill();
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2;
        ctx.beginPath(); ctx.arc(Math.cos(a)*r*0.85, Math.sin(a)*r*0.85, r*0.12, 0, Math.PI*2); ctx.fill();
      }
      break;
    case 'frost': // Cryo — concentric arcs
      ctx.strokeStyle = def.accent; ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        const startA = i * 2.1; const endA = startA + 1.5;
        ctx.beginPath(); ctx.arc(0, 0, r*(0.4+i*0.25), startA, endA); ctx.stroke();
      }
      break;
    case 'solar': // Thermal Det — circle + spikes
      ctx.fillStyle = def.accent;
      ctx.beginPath(); ctx.arc(0, 0, r*0.35, 0, Math.PI*2); ctx.fill();
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*r*0.45, Math.sin(a)*r*0.45);
        ctx.lineTo(Math.cos(a-0.2)*r*0.85, Math.sin(a-0.2)*r*0.85);
        ctx.lineTo(Math.cos(a+0.2)*r*0.85, Math.sin(a+0.2)*r*0.85);
        ctx.closePath(); ctx.fill();
      }
      break;
    case 'cannon': // Proton — thick barrel
      ctx.fillStyle = '#999';
      ctx.fillRect(-r*0.2, -r*1.6, r*0.4, r*1.3);
      ctx.fillStyle = `rgba(${def.accentRGB},0.7)`;
      ctx.beginPath(); ctx.arc(0, -r*1.6, r*0.3, 0, Math.PI*2); ctx.fill();
      break;
    case 'laser': // Death Ray — orb + orbiting wisps
      ctx.fillStyle = def.accent;
      ctx.beginPath(); ctx.arc(0, 0, r*0.35, 0, Math.PI*2); ctx.fill();
      const t2 = Date.now() * 0.004;
      ctx.strokeStyle = def.accent; ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        const wa = t2 + i * 2.09;
        ctx.beginPath(); ctx.arc(0, 0, r*0.75, wa, wa+1.2); ctx.stroke();
      }
      break;
    case 'storm': // Force Lightning — zigzag bolt
      ctx.strokeStyle = def.accent; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.9);
      ctx.lineTo(r*0.25, -r*0.3);
      ctx.lineTo(-r*0.15, -r*0.1);
      ctx.lineTo(r*0.15, r*0.5);
      ctx.lineTo(-r*0.1, r*0.9);
      ctx.stroke();
      break;
  }
  ctx.restore();
}

function drawTowers() {
  const now = Date.now();
  for (const t of towers) {
    const def = TOWER_DEFS[t.defIndex];
    const stats = getTowerStats(t);
    const sz = cellSize * 0.42;

    // Ground glow
    ctx.save(); ctx.globalAlpha = 0.1;
    const gg = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, cellSize*0.6);
    gg.addColorStop(0, def.accent); gg.addColorStop(1, 'transparent');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(t.x, t.y, cellSize*0.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Metallic base
    const bg = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, sz);
    bg.addColorStop(0, '#3a3550'); bg.addColorStop(1, '#1a1525');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(t.x, t.y, sz, 0, Math.PI*2); ctx.fill();

    // Level ring
    const totalLvl = t.pathA + t.pathB;
    ctx.strokeStyle = `rgba(${def.accentRGB},${0.2 + totalLvl * 0.15})`;
    ctx.lineWidth = totalLvl > 2 ? 2 : 1.5;
    ctx.beginPath(); ctx.arc(t.x, t.y, sz, 0, Math.PI*2); ctx.stroke();

    // Weapon drawing
    ctx.save(); ctx.translate(t.x, t.y);
    drawTowerWeapon(def, sz, t.angle || 0);
    ctx.restore();

    // Upgrade chevrons
    for (let i = 0; i < t.pathA; i++) {
      ctx.fillStyle = '#76ff03';
      const cx = t.x - sz*0.4 + i*6, cy = t.y - sz - 4;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+3, cy+2.5); ctx.lineTo(cx, cy+5); ctx.fill();
    }
    for (let i = 0; i < t.pathB; i++) {
      ctx.fillStyle = '#40c4ff';
      const cx = t.x + sz*0.4 - i*6, cy = t.y - sz - 4;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx-3, cy+2.5); ctx.lineTo(cx, cy+5); ctx.fill();
    }

    // Selected range
    if (selectedTower === t) {
      const range = stats.range * (cellSize / 40);
      ctx.strokeStyle = `rgba(${def.accentRGB},0.2)`;
      ctx.lineWidth = 1; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(t.x, t.y, range, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = `rgba(${def.accentRGB},0.08)`;
      ctx.beginPath(); ctx.arc(t.x, t.y, sz+2, 0, Math.PI*2); ctx.fill();
    }

    // Ring of fire visual
    if (stats.ringOfFire) {
      ctx.save();
      ctx.globalAlpha = 0.2 + Math.sin(now * 0.005) * 0.1;
      const rfg = ctx.createRadialGradient(t.x, t.y, sz, t.x, t.y, stats.range*(cellSize/40)*0.5);
      rfg.addColorStop(0, 'rgba(255,100,0,0.4)'); rfg.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = rfg;
      ctx.beginPath(); ctx.arc(t.x, t.y, stats.range*(cellSize/40)*0.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Beam rendering — spectacular
    if (def.type === 'beam' && t.beamTargets && t.beamTargets.length > 0) {
      const pulse = Math.sin(now * 0.008) * 1.5;
      ctx.save();
      for (const bt of t.beamTargets) {
        if (bt.dead) continue;
        // Outer glow
        ctx.strokeStyle = `rgba(${def.accentRGB},0.15)`;
        ctx.lineWidth = 8 + pulse;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(bt.x, bt.y); ctx.stroke();
        // Inner glow
        ctx.globalAlpha = 0.7;
        ctx.strokeStyle = def.accent; ctx.lineWidth = 3 + pulse*0.5;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(bt.x, bt.y); ctx.stroke();
        ctx.globalAlpha = 1;
        // Core
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
        ctx.shadowColor = def.accent; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(bt.x, bt.y); ctx.stroke();
        ctx.shadowBlur = 0;
        // Edge sparkles
        const bdx = bt.x-t.x, bdy = bt.y-t.y;
        for (let i = 0; i < 3; i++) {
          const f = Math.random();
          ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.4+Math.random()*0.6;
          ctx.beginPath(); ctx.arc(t.x+bdx*f+(Math.random()-0.5)*4, t.y+bdy*f+(Math.random()-0.5)*4, 1, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        // Impact ring
        const ir = 3+Math.sin(now*0.01)*2;
        ctx.strokeStyle = def.accent; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(bt.x, bt.y, ir, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }

    // Chain lightning — spectacular
    if (def.type === 'chain' && t.chainTargets && t.chainTargets.length > 0) {
      ctx.save();
      // Outer glow layer
      ctx.strokeStyle = 'rgba(100,160,255,0.25)'; ctx.lineWidth = 3;
      let prev = { x: t.x, y: t.y };
      for (const ct of t.chainTargets) {
        if (!ct.dead) { drawLightning(prev.x, prev.y, ct.x, ct.y); prev = ct; }
      }
      // Core layer
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.shadowColor = '#aaccff'; ctx.shadowBlur = 8;
      prev = { x: t.x, y: t.y };
      for (const ct of t.chainTargets) {
        if (!ct.dead) {
          drawLightning(prev.x, prev.y, ct.x, ct.y);
          // Spark at impact
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(ct.x, ct.y, 3, 0, Math.PI*2); ctx.fill();
          prev = ct;
        }
      }
      ctx.restore();
    }
  }

  // Placement preview
  if (shopSelection >= 0 && placementCell) {
    const def = TOWER_DEFS[shopSelection];
    const pos = cellCenter(placementCell.row, placementCell.col);
    const range = def.range * (cellSize / 40);
    const sz = cellSize * 0.42;
    ctx.save(); ctx.globalAlpha = 0.3;
    ctx.strokeStyle = def.accent; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(pos.x, pos.y, range, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.5;
    // Ghost base
    const gbg = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, sz);
    gbg.addColorStop(0, '#3a3550'); gbg.addColorStop(1, '#1a1525');
    ctx.fillStyle = gbg;
    ctx.beginPath(); ctx.arc(pos.x, pos.y, sz, 0, Math.PI*2); ctx.fill();
    ctx.translate(pos.x, pos.y);
    drawTowerWeapon(def, sz, 0);
    ctx.restore();
  }
}

function drawLightning(x1, y1, x2, y2) {
  const seg = 5;
  const dx = (x2-x1)/seg, dy = (y2-y1)/seg;
  const len = Math.sqrt((x2-x1)**2+(y2-y1)**2) || 1;
  const nx = -(y2-y1)/len*3, ny = (x2-x1)/len*3;
  for (let b = -1; b <= 1; b++) {
    const ox = nx*b, oy = ny*b;
    ctx.beginPath(); ctx.moveTo(x1+ox, y1+oy);
    for (let i = 1; i < seg; i++) {
      ctx.lineTo(x1+dx*i+(Math.random()-0.5)*8+ox, y1+dy*i+(Math.random()-0.5)*8+oy);
    }
    ctx.lineTo(x2+ox, y2+oy); ctx.stroke();
  }
}

function drawTIEShape(x, y, sz, color, variant) {
  // TIE fighter top-down: cockpit + vertical wing bars
  ctx.fillStyle = color;
  // Cockpit
  ctx.beginPath(); ctx.arc(x, y, sz*0.5, 0, Math.PI*2); ctx.fill();
  // Wings (perpendicular bars)
  const wt = sz*0.25, wh = sz*1.6;
  if (variant === 'angular') {
    // Shadow Squad — pointed wings
    ctx.beginPath();
    ctx.moveTo(x, y-wh*0.5); ctx.lineTo(x-wt*1.5, y); ctx.lineTo(x, y+wh*0.5); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y-wh*0.5); ctx.lineTo(x+wt*1.5, y); ctx.lineTo(x, y+wh*0.5); ctx.closePath(); ctx.fill();
  } else if (variant === 'rounded') {
    // Snow Squad — elliptical wings
    ctx.beginPath(); ctx.ellipse(x-sz*0.7, y, wt*0.4, wh*0.45, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+sz*0.7, y, wt*0.4, wh*0.45, 0, 0, Math.PI*2); ctx.fill();
  } else {
    // Standard rectangular wings
    ctx.fillRect(x-sz*0.8, y-wh*0.5, wt*0.4, wh);
    ctx.fillRect(x+sz*0.6, y-wh*0.5, wt*0.4, wh);
  }
  // Struts
  ctx.strokeStyle = color; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(x-sz*0.5, y); ctx.lineTo(x-sz*0.65, y);
  ctx.moveTo(x+sz*0.5, y); ctx.lineTo(x+sz*0.65, y);
  ctx.stroke();
}

function drawBlooms() {
  const sorted = enemies.filter(e => !e.dead);
  sorted.sort((a, b) => a.pathProgress - b.pathProgress);

  for (const e of sorted) {
    const def = BLOOM_TYPES[e.type];
    const pos = getBloomPos(e);
    e.x = pos.x; e.y = pos.y;
    const sz = e.size * (cellSize / 40);

    // Compute facing angle
    const dx2 = e.x - (e.prevX || e.x), dy2 = e.y - (e.prevY || e.y);
    const eAngle = (dx2 || dy2) ? Math.atan2(dy2, dx2) : (e.angle || 0);
    e.prevX = e.x; e.prevY = e.y; e.angle = eAngle;

    ctx.save();

    if (def.moabClass) {
      // Star Destroyer / Super Star Destroyer — wedge shape
      const w = sz * 2.2, h = sz * 1.2;
      const isBFB = e.type === 'bfb';
      ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(eAngle);
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.moveTo(w, 0); ctx.lineTo(-w*0.8, -h); ctx.lineTo(-w, -h*0.5);
      ctx.lineTo(-w, h*0.5); ctx.lineTo(-w*0.8, h); ctx.closePath();
      ctx.fill();
      // Bridge
      ctx.fillStyle = isBFB ? '#445566' : '#5a7888';
      ctx.fillRect(-w*0.2, -h*0.6, w*0.15, h*0.3);
      // Engine glow
      const ec = isBFB ? '#ff4444' : '#4488ff';
      ctx.fillStyle = ec; ctx.shadowColor = ec; ctx.shadowBlur = 4;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath(); ctx.arc(-w*0.9, i*h*0.3, isBFB?3:2, 0, Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
      // HP bar
      const hpPct = e.hp / e.maxHp;
      const barW = w*2, barH = 3;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x-barW/2, e.y-h-8, barW, barH);
      const hpGrad = ctx.createLinearGradient(e.x-barW/2, 0, e.x-barW/2+barW*hpPct, 0);
      hpGrad.addColorStop(0, hpPct>0.5?'#44dd44':hpPct>0.25?'#ffdd00':'#ff4444');
      hpGrad.addColorStop(1, hpPct>0.5?'#22aa22':hpPct>0.25?'#ccaa00':'#cc2222');
      ctx.fillStyle = hpGrad;
      ctx.fillRect(e.x-barW/2, e.y-h-8, barW*hpPct, barH);
      // Shield shimmer (MOAB) / warning glow (BFB)
      if (isBFB) {
        ctx.strokeStyle = `rgba(255,68,68,${0.15+Math.sin(Date.now()*0.006)*0.1})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(e.x, e.y, w*1.1, 0, Math.PI*2); ctx.stroke();
      } else {
        ctx.strokeStyle = `rgba(68,136,255,${0.08+Math.sin(Date.now()*0.005)*0.05})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(e.x, e.y, w*1.1, 0, Math.PI*2); ctx.stroke();
      }
    } else if (e.type === 'lead') {
      // AT-ST walker
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.fillStyle = '#778899'; ctx.strokeStyle = '#556677'; ctx.lineWidth = 1;
      ctx.fillRect(-sz*0.3, -sz*0.5, sz*0.6, sz*0.5);
      ctx.strokeRect(-sz*0.3, -sz*0.5, sz*0.6, sz*0.5);
      ctx.fillRect(-sz*0.2, -sz*0.7, sz*0.4, sz*0.25);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-sz*0.15, 0); ctx.lineTo(-sz*0.35, sz*0.6);
      ctx.moveTo(sz*0.15, 0); ctx.lineTo(sz*0.35, sz*0.6);
      ctx.stroke();
      ctx.restore();
    } else if (e.type === 'ceramic') {
      // AT-AT walker
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.fillStyle = '#998866'; ctx.strokeStyle = '#887755'; ctx.lineWidth = 1;
      ctx.fillRect(-sz*0.5, -sz*0.3, sz, sz*0.4);
      ctx.strokeRect(-sz*0.5, -sz*0.3, sz, sz*0.4);
      ctx.fillRect(sz*0.3, -sz*0.55, sz*0.25, sz*0.25);
      ctx.lineWidth = 1.5;
      const legs = [-0.35,-0.15,0.15,0.35];
      for (const lx of legs) {
        ctx.beginPath(); ctx.moveTo(lx*sz, sz*0.1); ctx.lineTo(lx*sz, sz*0.6); ctx.stroke();
      }
      ctx.restore();
      // Shield ring (HP)
      if (e.hp > 1) {
        ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(e.x, e.y, sz+3, 0, Math.PI*2*(e.hp/e.maxHp)); ctx.stroke();
      }
    } else {
      // TIE fighters — all small enemy types
      let color = def.color;
      if (def.color === 'rainbow') {
        const hue = (Date.now() * 0.1) % 360;
        color = `hsl(${hue},80%,60%)`;
      }
      const variant = e.type === 'black' ? 'angular' : e.type === 'white' ? 'rounded' : 'standard';
      ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(eAngle);
      drawTIEShape(0, 0, sz, color, variant);
      ctx.restore();
      // Engine trail
      ctx.fillStyle = `rgba(68,136,255,0.2)`;
      ctx.beginPath();
      ctx.arc(e.x-Math.cos(eAngle)*sz*1.5, e.y-Math.sin(eAngle)*sz*1.5, sz*0.3, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.restore();

    // Status effects — freeze
    if (e.frozen || e.freezeTimer > 0) {
      // Ice crystal overlay
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.strokeStyle = 'rgba(200,240,255,0.8)'; ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const a = i*Math.PI/3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*sz*-1.2, Math.sin(a)*sz*-1.2);
        ctx.lineTo(Math.cos(a)*sz*1.2, Math.sin(a)*sz*1.2);
        ctx.stroke();
      }
      ctx.restore();
      // Frost particles
      if (animFrame % 4 === 0 && particles.length < MAX_PARTICLES) {
        particles.push({ x:e.x+(Math.random()-0.5)*sz, y:e.y, vx:(Math.random()-0.5)*10, vy:-15-Math.random()*20, life:0.4, maxLife:0.4, size:1.5, color:'rgba(200,240,255,0.7)', type:'pop' });
      }
    }
    if (e.slowTimer > 0 && !e.frozen) {
      ctx.strokeStyle = 'rgba(136,238,255,0.35)'; ctx.lineWidth = 1; ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.arc(e.x, e.y, sz+2, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    }
    if (e.stunTimer > 0) {
      ctx.fillStyle = '#ffff00';
      ctx.font = `${Math.max(Math.floor(sz), 8)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('✦', e.x, e.y - sz - 3);
    }
    // Burn — enhanced
    if (e.burnTimer > 0 && animFrame % 2 === 0) {
      const bc = ['#ff3300','#ff6600','#ffaa00','#ffcc00'][Math.floor(Math.random()*4)];
      if (particles.length < MAX_PARTICLES) {
        particles.push({ x:e.x+(Math.random()-0.5)*sz, y:e.y-sz*0.3, vx:(Math.random()-0.5)*20, vy:-30-Math.random()*30, life:0.35, maxLife:0.35, size:2+Math.random()*2, color:bc, type:'pop' });
      }
      // Glow halo
      ctx.save(); ctx.globalAlpha = 0.15;
      const bgg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, sz*1.5);
      bgg.addColorStop(0, '#ff6600'); bgg.addColorStop(1, 'transparent');
      ctx.fillStyle = bgg;
      ctx.beginPath(); ctx.arc(e.x, e.y, sz*1.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    if (p.dead) continue;
    const angle = p.isTack ? p.angle : Math.atan2(p.ty - p.y, p.tx - p.x);
    ctx.save();

    if (p.isFreeze) {
      // Cryo — diamond shape
      ctx.translate(p.x, p.y); ctx.rotate(angle);
      ctx.fillStyle = '#88eeff'; ctx.shadowColor = '#88eeff'; ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.moveTo(4, 0); ctx.lineTo(0, -2); ctx.lineTo(-4, 0); ctx.lineTo(0, 2); ctx.closePath();
      ctx.fill();
    } else if (p.towerId === 'thorn') {
      // Blaster bolt — elongated red rectangle
      ctx.translate(p.x, p.y); ctx.rotate(angle);
      ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 6;
      ctx.fillStyle = '#ff4444'; ctx.fillRect(-3, -1, 6, 2);
      ctx.fillStyle = '#fff'; ctx.fillRect(-2, -0.5, 4, 1);
    } else if (p.towerId === 'tack') {
      // Ion bolt — blue-white dot with trail
      ctx.fillStyle = '#44aaff'; ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 4;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(p.x-Math.cos(angle)*3, p.y-Math.sin(angle)*3, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (p.towerId === 'solar') {
      // Thermal detonator — orange orb with glow
      ctx.fillStyle = '#ff8800'; ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (p.towerId === 'cannon') {
      // Proton ball — green energy
      ctx.shadowColor = '#44ff44'; ctx.shadowBlur = 8;
      const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 4);
      pg.addColorStop(0, '#aaffaa'); pg.addColorStop(1, '#44ff44');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    } else {
      // Default
      ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 4;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.isSplash ? 4 : 3, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    if (p.type === 'ring') {
      // Shockwave — double ring
      ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.globalAlpha = alpha * 0.5;
      const r1 = p.size * (1-alpha) * 3 + p.size;
      ctx.beginPath(); ctx.arc(p.x, p.y, r1, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = alpha * 0.25;
      ctx.beginPath(); ctx.arc(p.x, p.y, r1*1.4, 0, Math.PI*2); ctx.stroke();
    } else if (p.type === 'chain') {
      ctx.strokeStyle = p.color; ctx.lineWidth = 2*alpha;
      ctx.shadowColor = p.color; ctx.shadowBlur = 4;
      drawLightning(p.x, p.y, p.tx, p.ty);
    } else if (p.type === 'debris') {
      // Angular debris particle
      ctx.fillStyle = p.color;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.life * 10);
      ctx.fillRect(-p.size*0.5, -p.size*0.5, p.size, p.size);
      ctx.restore();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawHUDCanvas() {
  if (popCombo > 5 && comboTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(comboTimer * 2, 1);
    ctx.fillStyle = '#44aaff';
    ctx.font = `bold ${Math.floor(cellSize * 0.6)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(68,170,255,0.6)'; ctx.shadowBlur = 15;
    ctx.fillText(`${popCombo} KILLS!`, C.width / DPR / 2, gridOffY - 8);
    ctx.restore();
  }
}

function render() {
  ctx.save();
  if (shakeTime > 0) {
    ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);
  }
  drawGrid();
  drawTowers();
  drawBlooms();
  drawProjectiles();
  drawParticles();
  drawHUDCanvas();
  ctx.restore();
}

// ═══════════════════════════════════════
//  UPDATE LOGIC
// ═══════════════════════════════════════

function findTarget(tower, stats, targeting) {
  const range = stats.range * (cellSize / 40);
  const rangeSq = range * range;
  let best = null, bestVal = -Infinity;

  for (const e of enemies) {
    if (e.dead) continue;
    const dx = e.x - tower.x, dy = e.y - tower.y;
    if (dx*dx + dy*dy > rangeSq) continue;

    let val = 0;
    switch(targeting) {
      case 'first': val = e.pathProgress; break;
      case 'last': val = -e.pathProgress; break;
      case 'close': val = -(dx*dx + dy*dy); break;
      case 'strong': val = BLOOM_TYPES[e.type].rbe; break;
    }
    if (val > bestVal) { bestVal = val; best = e; }
  }
  return best;
}

function findEnemiesInRange(cx, cy, radius) {
  const rSq = radius * radius;
  const targets = [];
  for (const e of enemies) {
    if (e.dead) continue;
    const dx = e.x - cx, dy = e.y - cy;
    if (dx*dx + dy*dy <= rSq) targets.push(e);
  }
  return targets;
}

function findChainTargets(start, range, count) {
  const targets = [start];
  const used = new Set([enemies.indexOf(start)]);
  const rSq = range * range;
  for (let c = 1; c < count; c++) {
    const last = targets[targets.length - 1];
    let closest = null, closestD = Infinity;
    for (let i = 0; i < enemies.length; i++) {
      if (used.has(i) || enemies[i].dead) continue;
      const e = enemies[i];
      const dx = e.x - last.x, dy = e.y - last.y;
      const d = dx*dx + dy*dy;
      if (d < closestD && d < rSq) { closestD = d; closest = e; }
    }
    if (closest) { targets.push(closest); used.add(enemies.indexOf(closest)); }
    else break;
  }
  return targets;
}

function update(dt) {
  if (STATE !== 'playing' && STATE !== 'between_waves') return;
  const sDt = dt * gameSpeed;

  // Combo
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) popCombo = 0; }

  // Shake
  if (shakeTime > 0) { shakeTime -= dt; if (shakeTime <= 0) { shakeMag = 0; shakeTime = 0; } }

  // Wave countdown
  if (STATE === 'between_waves') {
    waveCountdown -= dt;
    const btn = $('sendWaveBtn');
    if (btn) btn.textContent = `Launch Assault (+25CR) [${Math.ceil(Math.max(waveCountdown, 0))}s]`;
    if (waveCountdown <= 0) startWave();
  }

  // Spawn blooms
  if (waveActive && spawnQueue.length > 0) {
    spawnTimer -= sDt;
    if (spawnTimer <= 0) {
      const type = spawnQueue.shift();
      enemies.push(createBloom(type, 0));
      const wDef = WAVES[currentWave - 1];
      spawnTimer = wDef.interval;
      if (BLOOM_TYPES[type].moabClass) spawnTimer += 1.5;
    }
  }

  // Check wave complete
  if (waveActive && spawnQueue.length === 0 && enemies.every(e => e.dead)) {
    waveActive = false;
    if (currentWave >= TOTAL_WAVES) victory();
    else enterBetweenWaves();
  }

  // Update blooms
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.slowTimer > 0) { e.slowTimer -= sDt; if (e.slowTimer <= 0) e.slowFactor = 1.0; }
    if (e.freezeTimer > 0) { e.freezeTimer -= sDt; if (e.freezeTimer <= 0) e.frozen = false; }
    if (e.stunTimer > 0) { e.stunTimer -= sDt; }
    if (e.burnTimer > 0) {
      e.burnTicks += sDt;
      if (e.burnTicks >= 0.5) {
        e.burnTicks = 0;
        damageBloom(e, 1, 'fire');
      }
      e.burnTimer -= sDt;
      if (e.burnTimer <= 0) { e.burnTimer = 0; e.burnTicks = 0; }
    }

    if (!e.frozen && e.stunTimer <= 0) {
      const totalLen = getBloomTotalLen(e);
      const moveSpeed = e.speed * e.slowFactor * (cellSize * 0.7) * sDt / totalLen;
      e.pathProgress += moveSpeed;
    }

    if (e.pathProgress >= 1.0) {
      e.dead = true;
      const rbe = BLOOM_TYPES[e.type].rbe;
      lives -= rbe;
      shakeMag = Math.min(rbe * 0.5, 12);
      shakeTime = 0.3;
      if (lives <= 0) { lives = 0; gameOver(); return; }
    }
  }

  // Update towers
  for (const t of towers) {
    const def = TOWER_DEFS[t.defIndex];
    const stats = getTowerStats(t);
    const scaledRange = stats.range * (cellSize / 40);

    if (def.type === 'beam') {
      // Continuous beam
      t.beamTargets = t.beamTargets || [];
      const newTargets = [];
      for (let b = 0; b < stats.beamTargets; b++) {
        const tgt = findTarget(t, stats, t.targeting || 'first');
        if (tgt && !newTargets.includes(tgt)) {
          newTargets.push(tgt);
          // Apply DPS
          const dps = stats.damage * stats.beamDpsMultiplier;
          t.fireTimer = (t.fireTimer || 0) + dps * sDt;
          while (t.fireTimer >= 1) {
            t.fireTimer -= 1;
            if (!tgt.dead) {
              const atkType = stats.popAll ? 'energy' : stats.attackType;
              damageBloom(tgt, 1, atkType);
            }
          }
        }
      }
      t.beamTargets = newTargets;
      if (newTargets.length > 0) t.angle = Math.atan2(newTargets[0].y - t.y, newTargets[0].x - t.x);
      if (newTargets.length === 0) t.fireTimer = 0;

    } else if (def.type === 'freeze') {
      // Cryo Emitter: AoE slow/freeze around tower
      t.fireTimer = (t.fireTimer || 0) - sDt;
      if (t.fireTimer <= 0) {
        t.fireTimer = 0.5; // tick every 0.5s
        const targets = findEnemiesInRange(t.x, t.y, scaledRange);
        for (const tgt of targets) {
          if (BLOOM_TYPES[tgt.type].immuneFreeze) continue;
          if (BLOOM_TYPES[tgt.type].moabClass && !stats.freezeSolid) continue;
          tgt.slowFactor = 1 - stats.slow;
          tgt.slowTimer = stats.slowDur;
          if (stats.freezeSolid && !BLOOM_TYPES[tgt.type].moabClass) {
            tgt.frozen = true;
            tgt.freezeTimer = 1.5;
          }
          if (stats.snapPop) {
            damageBloom(tgt, 1, 'freeze');
          }
        }
        if (targets.length > 0) spawnRingParticle(t.x, t.y, scaledRange * 0.3, '#88ddff');
      }
      // Cryo cannon: also shoots projectiles
      if (stats.cryoCannon) {
        t.cryoTimer = (t.cryoTimer || 0) - sDt;
        if (t.cryoTimer <= 0) {
          const tgt = findTarget(t, stats, t.targeting || 'first');
          if (tgt) {
            const proj = createProjectile(t, tgt, { ...stats, damage: 1, projSpeed: 280, attackType: 'freeze', pierce: 3 });
            proj.isFreeze = true;
            proj.slow = stats.slow;
            proj.slowDur = stats.slowDur;
            projectiles.push(proj);
            t.cryoTimer = 1.0;
          }
        }
      }

    } else if (def.type === 'chain') {
      // Force Lightning
      t.fireTimer = (t.fireTimer || 0) - sDt;
      t.chainTargets = t.chainTargets || [];
      if (t.fireTimer <= 0) {
        const tgt = findTarget(t, stats, t.targeting || 'first');
        if (tgt) {
          t.angle = Math.atan2(tgt.y - t.y, tgt.x - t.x);
          const chainRange = scaledRange * 0.8;
          const targets = findChainTargets(tgt, chainRange * chainRange, stats.chains);
          t.chainTargets = targets;
          for (let i = 0; i < targets.length; i++) {
            const ct = targets[i];
            damageBloom(ct, stats.damage, stats.attackType);
            if (stats.chainAoe) {
              const nearby = findEnemiesInRange(ct.x, ct.y, cellSize * 0.8);
              for (const nb of nearby) {
                if (nb !== ct && !nb.dead) damageBloom(nb, 1, stats.attackType);
              }
            }
            if (stats.stunChance > 0 && Math.random() < stats.stunChance) {
              ct.stunTimer = stats.stunDur;
            }
            if (i > 0) spawnChainParticle(targets[i-1].x, targets[i-1].y, ct.x, ct.y, '#aaddff');
            else spawnChainParticle(t.x, t.y, ct.x, ct.y, '#aaddff');
          }
          t.fireTimer = 1 / stats.fireRate;
          setTimeout(() => { if (t.chainTargets === targets) t.chainTargets = []; }, 150);
        }
      }

    } else if (def.type === 'tack') {
      // Tack shooter: fires tacks in all directions
      t.fireTimer = (t.fireTimer || 0) - sDt;
      if (stats.ringOfFire) {
        // Constant DPS aura
        if (t.fireTimer <= 0) {
          t.fireTimer = 0.15;
          const range = scaledRange * 0.5;
          const targets = findEnemiesInRange(t.x, t.y, range);
          for (const tgt of targets) {
            damageBloom(tgt, 1, 'fire');
            if (stats.burn && tgt.burnTimer <= 0) { tgt.burnTimer = 2; tgt.burnTicks = 0; }
          }
        }
      } else {
        // Has any enemy in range?
        const hasTarget = enemies.some(e => !e.dead && (e.x-t.x)**2 + (e.y-t.y)**2 <= scaledRange*scaledRange);
        if (t.fireTimer <= 0 && hasTarget) {
          const numTacks = stats.tacks;
          for (let i = 0; i < numTacks; i++) {
            const angle = (i / numTacks) * Math.PI * 2;
            const proj = createProjectile(t, null, stats, angle);
            proj.isTack = true;
            if (stats.burn) proj.burn = true;
            projectiles.push(proj);
          }
          t.fireTimer = 1 / stats.fireRate;
        }
      }

    } else {
      // Standard projectile / AoE towers
      t.fireTimer = (t.fireTimer || 0) - sDt;
      if (t.fireTimer <= 0) {
        const tgt = findTarget(t, stats, t.targeting || 'first');
        if (tgt) {
          t.angle = Math.atan2(tgt.y - t.y, tgt.x - t.x);
          const numShots = stats.missiles || 1;
          for (let s = 0; s < numShots; s++) {
            const proj = createProjectile(t, tgt, stats);
            if (s > 0) {
              // Offset for multiple missiles
              proj.x += (Math.random() - 0.5) * 8;
              proj.y += (Math.random() - 0.5) * 8;
            }
            projectiles.push(proj);
          }
          t.fireTimer = 1 / stats.fireRate;
        }
      }
    }
  }

  // Update projectiles
  for (const p of projectiles) {
    if (p.dead) continue;
    // Track target
    if (p.target && !p.target.dead && (p.seeking || !p.isTack)) {
      p.tx = p.target.x; p.ty = p.target.y;
    }
    const dx = p.tx - p.x, dy = p.ty - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const moveAmt = p.speed * sDt;

    if (p.isTack) {
      // Tacks travel in straight line
      p.x += Math.cos(p.angle) * moveAmt;
      p.y += Math.sin(p.angle) * moveAmt;
      p.traveled += moveAmt;
      // Hit check: any enemy near tack
      for (const e of enemies) {
        if (e.dead) continue;
        const edx = e.x - p.x, edy = e.y - p.y;
        if (edx*edx + edy*edy < (cellSize * 0.4) ** 2) {
          damageBloom(e, p.damage, p.burn ? 'fire' : p.attackType);
          if (p.burn && e.burnTimer <= 0) { e.burnTimer = 2; e.burnTicks = 0; }
          p.pierceCount++;
          if (p.pierceCount >= p.pierce) { p.dead = true; break; }
        }
      }
      if (p.traveled > p.maxDist) p.dead = true;
    } else if (dist <= moveAmt || dist < 5) {
      p.dead = true;
      if (p.isSplash) {
        const splashR = p.splashRadius * (cellSize / 40);
        const targets = findEnemiesInRange(p.tx, p.ty, splashR);
        for (const tgt of targets) {
          let dmg = p.damage;
          if (p.moabMultiplier > 1 && BLOOM_TYPES[tgt.type].moabClass) dmg *= p.moabMultiplier;
          damageBloom(tgt, dmg, p.attackType);
          if (p.burn && tgt.burnTimer <= 0) { tgt.burnTimer = 2; tgt.burnTicks = 0; }
          if (p.siegeStun && BLOOM_TYPES[tgt.type].moabClass) { tgt.stunTimer = 1.0; }
        }
        spawnRingParticle(p.tx, p.ty, splashR, p.color);
        // Cluster bombs: secondary explosion
        if (p.clusterBombs) {
          setTimeout(() => {
            const frags = findEnemiesInRange(p.tx, p.ty, splashR * 1.3);
            for (const f of frags) { if (!f.dead) damageBloom(f, 1, p.attackType); }
            spawnRingParticle(p.tx, p.ty, splashR * 0.6, '#ffaa33');
          }, 100);
        }
      } else {
        // Single target hit
        if (p.target && !p.target.dead) {
          let dmg = p.damage;
          if (p.moabMultiplier > 1 && BLOOM_TYPES[p.target.type].moabClass) dmg *= p.moabMultiplier;
          damageBloom(p.target, dmg, p.attackType);
          if (p.burn && !p.target.dead && p.target.burnTimer <= 0) {
            p.target.burnTimer = 3; p.target.burnTicks = 0;
          }
          if (p.isFreeze && !p.target.dead && !BLOOM_TYPES[p.target.type].immuneFreeze) {
            p.target.slowFactor = 1 - p.slow;
            p.target.slowTimer = p.slowDur;
          }
          if (p.siegeStun && BLOOM_TYPES[p.target.type].moabClass) { p.target.stunTimer = 1.0; }
          p.pierceCount++;
          if (p.pierceCount < p.pierce) p.dead = false; // continue
        }
      }
    } else {
      p.x += (dx / dist) * moveAmt;
      p.y += (dy / dist) * moveAmt;
      p.traveled += moveAmt;
      if (p.traveled > p.maxDist * 2) p.dead = true;
    }
  }

  // Update particles
  for (const p of particles) {
    p.life -= dt;
    if (p.type === 'pop' || p.type === 'debris') { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.type === 'debris' ? 40 : 100) * dt; }
  }

  // Cleanup
  enemies = enemies.filter(e => !e.dead);
  projectiles = projectiles.filter(p => !p.dead);
  particles = particles.filter(p => p.life > 0);

  updateHUD();
}

function updateHUD() {
  $('hudGold').textContent = gold;
  $('hudLives').textContent = lives;
  $('hudWave').textContent = `${currentWave}/${TOTAL_WAVES}`;

  // Update shop affordability
  document.querySelectorAll('.shop-item').forEach((el, i) => {
    el.classList.toggle('cant-afford', gold < TOWER_DEFS[i].baseCost);
  });

  // Update tower panel if open
  if (selectedTower) refreshTowerPanel();
}

// ═══════════════════════════════════════
//  WAVE MANAGEMENT
// ═══════════════════════════════════════

function startWave() {
  if (currentWave >= TOTAL_WAVES) return;
  currentWave++;
  waveActive = true;
  STATE = 'playing';
  spawnQueue = [...WAVES[currentWave - 1].blooms];
  spawnTimer = 0.3;

  $('sendWaveBtn').classList.remove('visible');
  closeTowerPanel();

  // Banner
  const banner = $('waveBanner');
  banner.textContent = `Assault Wave ${currentWave}`;
  banner.classList.add('visible');
  setTimeout(() => banner.classList.remove('visible'), 1500);

  // Capital ship warning
  const hasMoab = spawnQueue.some(t => BLOOM_TYPES[t].moabClass);
  if (hasMoab) {
    const bw = $('moabWarning');
    const hasBfb = spawnQueue.includes('bfb');
    bw.textContent = hasBfb ? '⚠ SUPER STAR DESTROYER ⚠' : '⚠ STAR DESTROYER INCOMING ⚠';
    bw.classList.add('visible');
    setTimeout(() => bw.classList.remove('visible'), 2500);
    shakeMag = 4; shakeTime = 0.5;
  }

  AudioManager.playClick();
}

function enterBetweenWaves() {
  STATE = 'between_waves';
  waveCountdown = 20;

  // Round income: $100 base + 5% interest (capped at 50)
  const income = 100;
  const interest = Math.min(Math.floor(gold * 0.05), 50);
  gold += income + interest;
  totalGoldEarned += income + interest;

  $('sendWaveBtn').classList.add('visible');
}

function sendWaveEarly() {
  if (STATE !== 'between_waves') return;
  gold += 25;
  totalGoldEarned += 25;
  startWave();
}

// ═══════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════

function startGame() {
  gold = 650;
  lives = 150;
  currentWave = 0;
  totalPops = 0;
  totalGoldEarned = 0;
  totalTowersBuilt = 0;
  score = 0;
  towers = [];
  enemies = [];
  projectiles = [];
  particles = [];
  selectedTower = null;
  shopSelection = -1;
  placementCell = null;
  waveActive = false;
  spawnQueue = [];
  popCombo = 0; comboTimer = 0;
  shakeMag = 0; shakeTime = 0;

  $('startMenu').classList.add('hidden');
  $('resultOverlay').classList.add('hidden');
  $('pauseOverlay').classList.add('hidden');
  $('hud').style.display = '';
  $('shopBar').style.display = '';

  initMap();
  buildShopBar();
  STATE = 'between_waves';
  waveCountdown = 8;
  $('sendWaveBtn').classList.add('visible');

  if (!loopRunning) {
    loopRunning = true;
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  }
}

function gameOver() {
  STATE = 'gameover';
  score = Math.floor(currentWave * 100 + totalPops + gold / 10);
  const isNewBest = ArcadeData.submitScore('void-defense', score);
  ArcadeData.earnPetals(currentWave * 3);

  $('roTitle').textContent = 'Defeat';
  $('roTitle').style.color = '#ff4444';
  $('roScore').textContent = score;
  $('roStats').innerHTML =
    `Assault Waves: ${currentWave}/${TOTAL_WAVES}<br>Kills: ${totalPops}<br>Credits Earned: ${totalGoldEarned}CR<br>Credits: +${currentWave * 3}` +
    (isNewBest ? '<br><span style="color:#ffd740">New Best!</span>' : '');
  $('resultOverlay').classList.remove('hidden');
  $('sendWaveBtn').classList.remove('visible');
  AudioManager.playFail();
}

function victory() {
  STATE = 'victory';
  score = Math.floor(TOTAL_WAVES * 100 + totalPops + gold / 10);
  const isNewBest = ArcadeData.submitScore('void-defense', score);
  ArcadeData.earnPetals(TOTAL_WAVES * 5);

  $('roTitle').textContent = 'Victory!';
  $('roTitle').style.color = '#76ff03';
  $('roScore').textContent = score;
  $('roStats').innerHTML =
    `All ${TOTAL_WAVES} Assault Waves Cleared!<br>Kills: ${totalPops}<br>Credits Earned: ${totalGoldEarned}CR<br>Credits: +${TOTAL_WAVES * 5}` +
    (isNewBest ? '<br><span style="color:#ffd740">New Best!</span>' : '');
  $('resultOverlay').classList.remove('hidden');
  $('sendWaveBtn').classList.remove('visible');
  AudioManager.playSuccess();
}

// ═══════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════

function gameLoop(now) {
  if (!loopRunning) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  animFrame++;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════
//  SHOP BAR UI
// ═══════════════════════════════════════

function buildShopBar() {
  const bar = $('shopBar');
  bar.innerHTML = '';
  for (let i = 0; i < TOWER_DEFS.length; i++) {
    const d = TOWER_DEFS[i];
    const el = document.createElement('div');
    el.className = 'shop-item';
    if (gold < d.baseCost) el.classList.add('cant-afford');
    el.innerHTML = `<span class="si-icon" style="color:${d.accent};text-shadow:0 0 6px ${d.accent}">◆</span><span class="si-cost">${d.baseCost}CR</span><span class="si-name">${d.name.split(' ')[0]}</span>`;
    el.style.setProperty('--ta', d.accent);
    el.dataset.idx = i;
    el.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      selectShopTower(i);
    });
    bar.appendChild(el);
  }
}

function selectShopTower(idx) {
  closeTowerPanel();
  if (shopSelection === idx) {
    // Deselect
    shopSelection = -1;
    document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('selected'));
    return;
  }
  if (gold < TOWER_DEFS[idx].baseCost) return;
  shopSelection = idx;
  document.querySelectorAll('.shop-item').forEach((el, i) => el.classList.toggle('selected', i === idx));
  AudioManager.playClick();
}

function clearShopSelection() {
  shopSelection = -1;
  document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('selected'));
}

// ═══════════════════════════════════════
//  TOWER PANEL UI
// ═══════════════════════════════════════

function showTowerPanel(tower) {
  clearShopSelection();
  selectedTower = tower;
  refreshTowerPanel();
  $('towerPanel').classList.add('visible');
}

function refreshTowerPanel() {
  if (!selectedTower) return;
  const t = selectedTower;
  const def = TOWER_DEFS[t.defIndex];
  const stats = getTowerStats(t);
  const panel = $('towerPanel');

  const targeting = t.targeting || 'first';
  const targetingLabel = { first:'First', last:'Last', close:'Close', strong:'Strong' }[targeting];

  let statsHtml = '';
  if (def.type === 'beam') {
    statsHtml = `DPS: ${(stats.damage * stats.beamDpsMultiplier).toFixed(1)} | Range: ${stats.range}`;
  } else if (def.type === 'freeze') {
    statsHtml = `Slow: ${Math.round(stats.slow*100)}% | Range: ${stats.range}`;
  } else if (def.type === 'chain') {
    statsHtml = `Dmg: ${stats.damage} | Chains: ${stats.chains} | Range: ${stats.range}`;
  } else if (def.type === 'tack') {
    statsHtml = stats.ringOfFire ? `Ring of Fire | Range: ${stats.range}` : `Tacks: ${stats.tacks} | Dmg: ${stats.damage} | Range: ${stats.range}`;
  } else {
    statsHtml = `Dmg: ${stats.damage} | Rate: ${stats.fireRate.toFixed(1)}/s | Range: ${stats.range}`;
    if (stats.splashRadius > 0) statsHtml += ` | Splash: ${stats.splashRadius}`;
  }

  // Path A upgrade
  let pathAHtml = '<div class="tp-path-label">Path A</div>';
  if (t.pathA >= 2) {
    pathAHtml += `<div class="tp-upgrade-btn maxed">✓ ${def.pathA[1].name}</div>`;
  } else {
    const upg = def.pathA[t.pathA];
    const canAfford = gold >= upg.cost;
    pathAHtml += `<div class="tp-upgrade-btn ${canAfford ? '' : 'locked'}" data-path="a">${upg.name} (${upg.cost}CR)</div>`;
    pathAHtml += `<div class="tp-upgrade-desc">${upg.desc}</div>`;
  }

  // Path B upgrade
  let pathBHtml = '<div class="tp-path-label">Path B</div>';
  if (t.pathB >= 2) {
    pathBHtml += `<div class="tp-upgrade-btn maxed">✓ ${def.pathB[1].name}</div>`;
  } else {
    const upg = def.pathB[t.pathB];
    const canAfford = gold >= upg.cost;
    pathBHtml += `<div class="tp-upgrade-btn ${canAfford ? '' : 'locked'}" data-path="b">${upg.name} (${upg.cost}CR)</div>`;
    pathBHtml += `<div class="tp-upgrade-desc">${upg.desc}</div>`;
  }

  const sellAmt = Math.floor(towerTotalCost(t) * 0.7);

  panel.innerHTML = `
    <div class="tp-header">
      <span class="tp-name" style="color:${def.accent}">${def.name}</span>
      <span class="tp-targeting" id="targetCycle">${targetingLabel} ▾</span>
    </div>
    <div class="tp-stats">${statsHtml}</div>
    <div class="tp-upgrades">
      <div class="tp-path" id="pathAPanel">${pathAHtml}</div>
      <div class="tp-path" id="pathBPanel">${pathBHtml}</div>
    </div>
    <div class="tp-actions">
      <div class="tp-btn sell" id="sellBtn">Sell (${sellAmt}CR)</div>
      <div class="tp-btn" id="closeBtn">Close</div>
    </div>
  `;

  // Event listeners
  $('targetCycle').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    cycleTargeting();
  });

  const pathABtn = panel.querySelector('[data-path="a"]');
  if (pathABtn && !pathABtn.classList.contains('maxed')) {
    pathABtn.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      upgradePath('a');
    });
  }
  const pathBBtn = panel.querySelector('[data-path="b"]');
  if (pathBBtn && !pathBBtn.classList.contains('maxed')) {
    pathBBtn.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      upgradePath('b');
    });
  }

  $('sellBtn').addEventListener('pointerdown', (e) => { e.stopPropagation(); sellTower(); });
  $('closeBtn').addEventListener('pointerdown', (e) => { e.stopPropagation(); closeTowerPanel(); });
}

function closeTowerPanel() {
  $('towerPanel').classList.remove('visible');
  selectedTower = null;
}

function cycleTargeting() {
  if (!selectedTower) return;
  const order = ['first','last','close','strong'];
  const cur = selectedTower.targeting || 'first';
  const next = order[(order.indexOf(cur) + 1) % order.length];
  selectedTower.targeting = next;
  refreshTowerPanel();
  AudioManager.playClick();
}

function upgradePath(path) {
  if (!selectedTower) return;
  const def = TOWER_DEFS[selectedTower.defIndex];
  const lvl = path === 'a' ? selectedTower.pathA : selectedTower.pathB;
  if (lvl >= 2) return;
  const upgDef = path === 'a' ? def.pathA[lvl] : def.pathB[lvl];
  if (gold < upgDef.cost) return;
  gold -= upgDef.cost;
  if (path === 'a') selectedTower.pathA++;
  else selectedTower.pathB++;
  refreshTowerPanel();
  AudioManager.playPlace();
  haptic('light');
}

function sellTower() {
  if (!selectedTower) return;
  const refund = Math.floor(towerTotalCost(selectedTower) * 0.7);
  gold += refund;
  grid[selectedTower.row][selectedTower.col] = 0;
  towers = towers.filter(t => t !== selectedTower);
  closeTowerPanel();
  AudioManager.playClick();
  haptic('medium');
}

function buildTower(defIndex, row, col) {
  const def = TOWER_DEFS[defIndex];
  if (gold < def.baseCost) return;
  gold -= def.baseCost;
  const pos = cellCenter(row, col);
  const tower = {
    defIndex, pathA: 0, pathB: 0,
    row, col, x: pos.x, y: pos.y,
    fireTimer: 0, cryoTimer: 0,
    targeting: 'first', angle: 0,
    beamTargets: [], chainTargets: []
  };
  towers.push(tower);
  grid[row][col] = 5;
  totalTowersBuilt++;
  clearShopSelection();
  AudioManager.playPlace();
  haptic('medium');
  showTowerPanel(tower);
}

// ═══════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════

function getCellFromPixel(px, py) {
  const m = MAPS[selectedMap];
  const col = Math.floor((px - gridOffX) / cellSize);
  const row = Math.floor((py - gridOffY) / cellSize);
  if (row < 0 || row >= m.rows || col < 0 || col >= m.cols) return null;
  return { row, col };
}

C.addEventListener('pointerdown', (e) => {
  if (STATE === 'gameover' || STATE === 'victory' || STATE === 'menu') return;
  e.preventDefault();
  const rect = C.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;

  const cell = getCellFromPixel(px, py);

  // If shop tower selected, try to place
  if (shopSelection >= 0) {
    if (cell && grid[cell.row]?.[cell.col] === 0) {
      buildTower(shopSelection, cell.row, cell.col);
    } else {
      clearShopSelection();
    }
    return;
  }

  if (!cell) {
    closeTowerPanel();
    return;
  }

  // Tap existing tower
  const tower = towers.find(t => t.row === cell.row && t.col === cell.col);
  if (tower) {
    showTowerPanel(tower);
    return;
  }

  // Tap empty build cell
  if (grid[cell.row]?.[cell.col] === 0) {
    closeTowerPanel();
    // Do nothing — need to select from shop first (BTD style)
    return;
  }

  closeTowerPanel();
});

// Track pointer for placement preview
C.addEventListener('pointermove', (e) => {
  if (shopSelection < 0) { placementCell = null; return; }
  const rect = C.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  const cell = getCellFromPixel(px, py);
  if (cell && grid[cell.row]?.[cell.col] === 0) {
    placementCell = cell;
  } else {
    placementCell = null;
  }
});

// Speed buttons
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    gameSpeed = parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    AudioManager.playClick();
  });
});

// Send wave
$('sendWaveBtn').addEventListener('pointerdown', (e) => {
  e.stopPropagation();
  sendWaveEarly();
});

// Pause
$('pauseBtn').addEventListener('pointerdown', () => {
  if (STATE === 'playing' || STATE === 'between_waves') {
    STATE = 'paused';
    $('pauseOverlay').classList.remove('hidden');
  }
});
$('resumeBtn').addEventListener('click', () => {
  $('pauseOverlay').classList.add('hidden');
  STATE = waveActive ? 'playing' : 'between_waves';
  lastTime = performance.now();
});
$('restartBtn').addEventListener('click', () => {
  $('pauseOverlay').classList.add('hidden');
  startGame();
});
$('exitBtn').addEventListener('click', () => { window.location.href = '../index.html'; });

// Result buttons
$('roRetry').addEventListener('click', () => startGame());
$('roMenu').addEventListener('click', () => {
  $('resultOverlay').classList.add('hidden');
  $('hud').style.display = 'none';
  $('shopBar').style.display = 'none';
  $('sendWaveBtn').classList.remove('visible');
  $('startMenu').classList.remove('hidden');
  STATE = 'menu';
});
$('roExit').addEventListener('click', () => { window.location.href = '../index.html'; });

// Start — use click for mobile compatibility
$('startBtn').addEventListener('click', (e) => { e.preventDefault(); startGame(); });

// ═══════════════════════════════════════
//  MAP SELECTOR
// ═══════════════════════════════════════

function initMapSelector() {
  const cont = $('mapSelector');
  cont.innerHTML = '';
  for (let i = 0; i < MAPS.length; i++) {
    const m = MAPS[i];
    const card = document.createElement('div');
    card.className = 'map-card' + (i === selectedMap ? ' selected' : '');
    const preview = document.createElement('canvas');
    preview.width = 120;
    preview.height = Math.round(120 * (m.rows / m.cols));
    const pCtx = preview.getContext('2d');
    const tempGrid = m.generate();
    const pCW = preview.width / m.cols, pCH = preview.height / m.rows;
    for (let r = 0; r < m.rows; r++) {
      for (let c = 0; c < m.cols; c++) {
        const v = tempGrid[r][c];
        pCtx.fillStyle = (v===1||v===3||v===4) ? '#1a1a2e' : v===0 ? '#151525' : '#050510';
        pCtx.fillRect(c*pCW, r*pCH, pCW, pCH);
        if (v===3) { pCtx.fillStyle = 'rgba(68,255,68,0.3)'; pCtx.fillRect(c*pCW, r*pCH, pCW, pCH); }
        if (v===4) { pCtx.fillStyle = 'rgba(255,68,68,0.3)'; pCtx.fillRect(c*pCW, r*pCH, pCW, pCH); }
      }
    }
    card.appendChild(preview);
    card.innerHTML += `<div class="mc-name">${m.name}</div><div class="mc-diff">${m.difficulty}</div>`;
    card.addEventListener('pointerdown', () => {
      selectedMap = i;
      document.querySelectorAll('.map-card').forEach(c2 => c2.classList.remove('selected'));
      card.classList.add('selected');
      AudioManager.playClick();
    });
    cont.appendChild(card);
  }
}

initMapSelector();

function drawMenuBG() {
  if (STATE !== 'menu') return;
  const w = C.width/DPR, h = C.height/DPR;
  ctx.fillStyle = '#0d0a1a';
  ctx.fillRect(0, 0, w, h);
  if (nebulaCanvas) ctx.drawImage(nebulaCanvas, 0, 0);
  const now = Date.now();
  for (const s of stars) {
    let a = s.alpha;
    if (s.twinkle) a *= 0.5 + 0.5 * Math.sin(now * 0.003 + s.phase);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fillRect(s.x * w, s.y * h, s.size, s.size);
  }
  requestAnimationFrame(drawMenuBG);
}
drawMenuBG();

})();
