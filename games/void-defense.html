<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Galactic Defense — Iris Moon Arcade</title>
<meta name="theme-color" content="#0d0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="../shared.css">
<style>
:root{--game-accent:#4488cc;--game-glow:rgba(68,136,204,0.3)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;position:fixed;inset:0;width:100%;height:100dvh;touch-action:none;overscroll-behavior:none;margin:0;padding:0}
#game-canvas{display:block;position:absolute;top:0;left:0;touch-action:none;z-index:1}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top) + 4px) 8px 4px;pointer-events:none;background:linear-gradient(180deg,rgba(13,10,26,0.85) 0%,transparent 100%)}
.hud-item{display:flex;align-items:center;gap:3px;font-family:var(--font-ui);font-size:clamp(11px,1.5dvh,14px);font-weight:600;color:var(--moon-glow);background:rgba(13,10,26,0.7);border:1px solid var(--glass-border);border-radius:8px;padding:3px 8px;pointer-events:auto;white-space:nowrap}
.hud-left,.hud-center,.hud-right{display:flex;gap:5px;align-items:center}
.hud-item .gold-icon{color:#ffd740}
.hud-item .life-icon{color:#44aaff}
.speed-btn{font-family:var(--font-ui);font-size:clamp(10px,1.2dvh,12px);font-weight:600;color:var(--iris-light);background:rgba(30,24,50,0.7);border:1px solid var(--glass-border);border-radius:6px;padding:2px 7px;cursor:pointer;pointer-events:auto;transition:all .15s}
.speed-btn.active{color:var(--moon-glow);background:rgba(179,136,255,0.3);border-color:var(--neon-purple);box-shadow:0 0 8px var(--game-glow)}

/* ── Shop Bar ── */
.shop-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;justify-content:center;gap:3px;padding:4px 6px calc(env(safe-area-inset-bottom) + 4px);background:rgba(10,10,20,0.95);border-top:1px solid rgba(68,170,255,0.12);pointer-events:auto}
.shop-item{display:flex;flex-direction:column;align-items:center;justify-content:center;width:clamp(42px,12vw,54px);height:clamp(48px,12vw,58px);border-radius:8px;background:rgba(30,24,50,0.6);border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative}
.shop-item.selected{border-color:var(--ta,#4488cc);background:rgba(68,136,204,0.15);box-shadow:0 0 10px var(--ta,rgba(68,136,204,0.4))}
.shop-item.cant-afford{opacity:0.35}
.shop-item .si-icon{font-size:clamp(16px,2.8dvh,22px);line-height:1}
.shop-item .si-cost{font-size:clamp(8px,1dvh,10px);color:#ffd740;font-weight:700;margin-top:1px}
.shop-item .si-name{font-size:clamp(6px,0.8dvh,8px);color:var(--iris-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;padding:0 2px}

/* ── Send Wave Button ── */
.send-wave-btn{position:fixed;z-index:12;left:50%;transform:translateX(-50%);font-family:var(--font-ui);font-size:clamp(11px,1.4dvh,13px);font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--moon-glow);background:linear-gradient(135deg,var(--iris-deep),var(--iris-mid));border:1px solid rgba(184,169,212,0.3);border-radius:20px;padding:7px 20px;cursor:pointer;pointer-events:auto;display:none;animation:neonPulse 1.5s infinite}
.send-wave-btn.visible{display:block}

/* ── Tower Info Panel ── */
.tower-panel{position:fixed;z-index:15;left:50%;transform:translateX(-50%);background:rgba(10,15,30,0.95);border:1px solid var(--glass-border);border-top:1px solid rgba(68,170,255,0.3);border-radius:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 14px;display:none;width:min(320px,88vw);pointer-events:auto}
.tower-panel.visible{display:block}
.tp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tp-name{font-family:var(--font-display);font-size:clamp(14px,2dvh,18px);font-weight:600;color:var(--moon-glow)}
.tp-targeting{font-family:var(--font-ui);font-size:clamp(9px,1.2dvh,11px);color:var(--iris-light);background:rgba(74,63,107,0.4);border:1px solid var(--glass-border);border-radius:12px;padding:2px 10px;cursor:pointer;transition:all .15s}
.tp-targeting:active{background:rgba(74,63,107,0.7)}
.tp-stats{font-size:clamp(9px,1.2dvh,11px);color:var(--iris-light);line-height:1.6;margin-bottom:8px}
.tp-upgrades{display:flex;gap:6px;margin-bottom:8px}
.tp-path{flex:1;background:rgba(30,24,50,0.5);border:1px solid rgba(184,169,212,0.08);border-radius:8px;padding:6px}
.tp-path-label{font-size:clamp(7px,0.9dvh,9px);color:var(--iris-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;opacity:0.6}
.tp-upgrade-btn{font-family:var(--font-ui);font-size:clamp(9px,1.2dvh,11px);font-weight:500;color:var(--moon-glow);background:rgba(74,63,107,0.3);border:1px solid rgba(184,169,212,0.15);border-radius:6px;padding:4px 8px;cursor:pointer;width:100%;text-align:center;transition:all .15s;margin-top:3px}
.tp-upgrade-btn:active{background:rgba(74,63,107,0.6)}
.tp-upgrade-btn.maxed{opacity:0.4;cursor:default;color:#76ff03;border-color:rgba(118,255,3,0.2)}
.tp-upgrade-btn.locked{opacity:0.35;cursor:default}
.tp-upgrade-desc{font-size:clamp(7px,0.9dvh,9px);color:var(--iris-light);margin-top:2px;opacity:0.7}
.tp-actions{display:flex;gap:8px;justify-content:center}
.tp-btn{font-family:var(--font-ui);font-size:clamp(10px,1.3dvh,12px);font-weight:500;color:var(--moon-glow);border:1px solid var(--glass-border);border-radius:8px;padding:5px 16px;cursor:pointer;background:rgba(74,63,107,0.3);transition:all .15s}
.tp-btn:active{background:rgba(74,63,107,0.6)}
.tp-btn.sell{border-color:rgba(255,68,68,0.3);color:#ff4444}

/* ── Wave Banner ── */
.wave-banner{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);z-index:25;font-family:var(--font-display);font-size:clamp(28px,5dvh,42px);font-weight:300;color:var(--moon-glow);text-shadow:0 0 30px var(--game-glow);opacity:0;pointer-events:none;transition:opacity .4s;letter-spacing:6px;text-transform:uppercase}
.wave-banner.visible{opacity:1}
.moab-warning{position:fixed;top:22%;left:50%;transform:translate(-50%,-50%);z-index:25;font-family:var(--font-display);font-size:clamp(18px,3dvh,28px);font-weight:600;color:#ff4444;text-shadow:0 0 30px rgba(255,68,68,0.5);opacity:0;pointer-events:none;letter-spacing:3px;text-transform:uppercase}
.moab-warning.visible{opacity:1;animation:pulse 0.5s infinite}

/* ── Overlays ── */
.menu-overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,10,26,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.menu-overlay.hidden{display:none}
.menu-title{font-family:var(--font-display);font-size:clamp(30px,5.5dvh,44px);font-weight:300;letter-spacing:3px;margin-bottom:4px}
.menu-subtitle{font-family:var(--font-display);font-size:clamp(10px,1.4dvh,13px);letter-spacing:4px;text-transform:uppercase;color:var(--iris-light);opacity:.6;margin-bottom:clamp(14px,2.5dvh,24px)}
.map-selector{display:flex;gap:clamp(8px,2vw,14px);margin-bottom:clamp(12px,2dvh,20px);flex-wrap:wrap;justify-content:center}
.map-card{width:clamp(90px,22vw,130px);background:rgba(30,24,50,0.7);border:2px solid var(--glass-border);border-radius:12px;padding:8px;cursor:pointer;transition:all .3s;text-align:center}
.map-card.selected{border-color:var(--neon-purple);box-shadow:0 0 20px var(--game-glow)}
.map-card canvas{width:100%;border-radius:6px;margin-bottom:4px}
.map-card .mc-name{font-family:var(--font-display);font-size:clamp(12px,1.8dvh,16px);color:var(--moon-glow)}
.map-card .mc-diff{font-size:clamp(8px,1.1dvh,10px);color:var(--iris-light);letter-spacing:1px;text-transform:uppercase}
.overlay-base{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,10,26,0.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.overlay-base.hidden{display:none}
.overlay-base .ov-title{font-family:var(--font-display);font-size:clamp(28px,5dvh,40px);font-weight:300;margin-bottom:12px;letter-spacing:2px}
.overlay-base .ov-score{font-family:var(--font-display);font-size:clamp(36px,6dvh,50px);font-weight:600;color:var(--moon-glow);margin-bottom:4px}
.overlay-base .ov-label{font-size:clamp(9px,1.2dvh,11px);letter-spacing:3px;text-transform:uppercase;color:var(--iris-light);opacity:.6;margin-bottom:10px}
.overlay-base .ov-stats{font-size:clamp(10px,1.3dvh,13px);color:var(--iris-light);line-height:1.8;text-align:center;margin-bottom:14px}
.ov-btn{font-family:var(--font-ui);font-size:clamp(12px,1.5dvh,14px);font-weight:500;letter-spacing:1px;color:var(--moon-glow);background:rgba(74,63,107,0.4);border:1px solid var(--glass-border);border-radius:20px;padding:9px 26px;cursor:pointer;margin:4px;min-width:140px;text-align:center;transition:all .2s}
.ov-btn:hover{background:rgba(74,63,107,0.7)}
.ov-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

/* Back / Pause */
.back-btn{position:fixed;top:calc(env(safe-area-inset-top) + 6px);left:8px;z-index:30;background:rgba(30,24,50,0.7);border:1px solid var(--glass-border);border-radius:50%;width:clamp(28px,4dvh,36px);height:clamp(28px,4dvh,36px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--iris-light);font-size:clamp(12px,1.6dvh,16px);text-decoration:none;pointer-events:auto}
.pause-btn{position:fixed;top:calc(env(safe-area-inset-top) + 6px);right:8px;z-index:30;background:rgba(30,24,50,0.7);border:1px solid var(--glass-border);border-radius:50%;width:clamp(28px,4dvh,36px);height:clamp(28px,4dvh,36px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--iris-light);font-size:clamp(12px,1.6dvh,16px);pointer-events:auto}

/* Placement ghost */
.placement-range{position:fixed;z-index:5;pointer-events:none;border:2px dashed rgba(179,136,255,0.3);border-radius:50%;display:none}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes neonPulse{0%,100%{box-shadow:0 0 5px var(--game-glow)}50%{box-shadow:0 0 18px var(--game-glow)}}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<a class="back-btn" href="../index.html">&#8592;</a>
<div class="pause-btn" id="pauseBtn">&#9208;</div>

<div class="hud" id="hud" style="display:none">
  <div class="hud-left">
    <div class="hud-item"><span class="gold-icon">CR</span><span id="hudGold">650</span></div>
    <div class="hud-item"><span class="life-icon">&#128737;</span><span id="hudLives">150</span></div>
  </div>
  <div class="hud-center">
    <div class="hud-item">Assault Wave <span id="hudWave">0/40</span></div>
  </div>
  <div class="hud-right">
    <div class="speed-btn active" data-speed="1">1x</div>
    <div class="speed-btn" data-speed="2">2x</div>
    <div class="speed-btn" data-speed="3">3x</div>
  </div>
</div>

<div class="shop-bar" id="shopBar" style="display:none"></div>
<button class="send-wave-btn" id="sendWaveBtn">Launch Assault (+25CR)</button>
<div class="tower-panel" id="towerPanel"></div>
<div class="wave-banner" id="waveBanner"></div>
<div class="moab-warning" id="moabWarning">&#9888; STAR DESTROYER INCOMING &#9888;</div>

<!-- START MENU -->
<div class="menu-overlay" id="startMenu">
  <div class="menu-title text-gradient">Galactic Defense</div>
  <div class="menu-subtitle">Tower Defense</div>
  <div class="map-selector" id="mapSelector"></div>
  <button class="btn-primary" id="startBtn">Start Game</button>
</div>

<!-- PAUSE -->
<div class="overlay-base hidden" id="pauseOverlay">
  <div class="ov-title text-gradient">Paused</div>
  <div class="ov-btn" id="resumeBtn">Resume</div>
  <div class="ov-btn" id="restartBtn">Restart</div>
  <div class="ov-btn" id="exitBtn">Exit to Hub</div>
</div>

<!-- RESULT -->
<div class="overlay-base hidden" id="resultOverlay">
  <div class="ov-title text-gradient" id="roTitle">Victory!</div>
  <div class="ov-score" id="roScore">0</div>
  <div class="ov-label">Score</div>
  <div class="ov-stats" id="roStats"></div>
  <div class="ov-btns">
    <div class="ov-btn" id="roRetry">Play Again</div>
    <div class="ov-btn" id="roMenu">Menu</div>
    <div class="ov-btn" id="roExit">Exit</div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  GALACTIC DEFENSE — Star Wars Tower Defense
// ═══════════════════════════════════════════════════════

(() => {

const $ = id => document.getElementById(id);
const C = $('game-canvas');
const ctx = C.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 3);

// ── Core State ──
let STATE = 'menu'; // menu, between_waves, playing, paused, gameover, victory
let gameSpeed = 1;
let selectedMap = 0;
let gold = 650;
let lives = 150;
let currentWave = 0;
const TOTAL_WAVES = 40;
let totalPops = 0;
let totalGoldEarned = 0;
let totalTowersBuilt = 0;
let score = 0;
let waveCountdown = 0;
let waveActive = false;
let spawnQueue = [];
let spawnTimer = 0;
let towers = [];
let enemies = [];
let projectiles = [];
let particles = [];
let selectedTower = null;
let shopSelection = -1; // index into TOWER_DEFS or -1
let placementValid = false;
let placementCell = null;
let shakeMag = 0, shakeTime = 0;
let lastTime = 0;
let animFrame = 0;
let loopRunning = false;
let popCombo = 0, comboTimer = 0;
let cellSize = 0, gridOffX = 0, gridOffY = 0;
let grid = [];
const MAX_PARTICLES = 300;
const SHOP_HEIGHT = 66;
const HUD_HEIGHT = 44;

// ── Starfield & Nebula ──
const stars = [];
let nebulaCanvas = null;
function initStarfield() {
  stars.length = 0;
  const count = 80 + Math.floor(Math.random() * 40);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      size: 0.5 + Math.random() * 1.5,
      twinkle: Math.random() < 0.1,
      phase: Math.random() * Math.PI * 2,
      alpha: 0.3 + Math.random() * 0.7
    });
  }
}
initStarfield();

function initNebula(w, h) {
  nebulaCanvas = document.createElement('canvas');
  nebulaCanvas.width = w; nebulaCanvas.height = h;
  const nCtx = nebulaCanvas.getContext('2d');
  const nebulae = [
    { x: w*0.25, y: h*0.3, r: Math.max(w,h)*0.3, c:'100,50,180' },
    { x: w*0.7, y: h*0.6, r: Math.max(w,h)*0.25, c:'30,80,180' },
    { x: w*0.5, y: h*0.8, r: Math.max(w,h)*0.2, c:'30,150,150' },
  ];
  for (const n of nebulae) {
    const g = nCtx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0, `rgba(${n.c},0.05)`);
    g.addColorStop(1, `rgba(${n.c},0)`);
    nCtx.fillStyle = g;
    nCtx.fillRect(0, 0, w, h);
  }
}

// ═══════════════════════════════════════
//  BLOOM TYPES — The cascade core
// ═══════════════════════════════════════
// In Bloons TD, each balloon "layer" pops into children
const BLOOM_TYPES = {
  red:     { hp:1, speed:1.0, reward:1, color:'#ff4444', children:[], rbe:1, name:'TIE Scout' },
  blue:    { hp:1, speed:1.4, reward:1, color:'#4488ff', children:['red'], rbe:2, name:'TIE Fighter' },
  green:   { hp:1, speed:1.8, reward:1, color:'#44dd44', children:['blue'], rbe:3, name:'TIE Interceptor' },
  yellow:  { hp:1, speed:3.2, reward:1, color:'#ffdd00', children:['green'], rbe:4, name:'TIE Bomber' },
  pink:    { hp:1, speed:3.5, reward:1, color:'#ff88cc', children:['yellow'], rbe:5, name:'TIE Striker' },
  black:   { hp:1, speed:1.8, reward:2, color:'#444444', children:['pink','pink'], rbe:12, name:'Shadow Squad', immuneExplosion:true },
  white:   { hp:1, speed:2.0, reward:2, color:'#eeeeee', children:['pink','pink'], rbe:12, name:'Snow Squad', immuneFreeze:true },
  lead:    { hp:1, speed:1.0, reward:5, color:'#778899', children:['black','black'], rbe:25, name:'AT-ST', immuneSharp:true },
  rainbow: { hp:1, speed:2.2, reward:3, color:'rainbow', children:['black','white'], rbe:25, name:'Elite Squad' },
  ceramic: { hp:10, speed:2.5, reward:10, color:'#cc7744', children:['rainbow','rainbow'], rbe:60, name:'AT-AT' },
  moab:    { hp:200, speed:0.25, reward:50, color:'#6a8899', children:['ceramic','ceramic','ceramic','ceramic'], rbe:440, name:'Star Destroyer', moabClass:true },
  bfb:     { hp:700, speed:0.12, reward:100, color:'#556677', children:['moab','moab','moab','moab'], rbe:2460, name:'Super Star Destroyer', moabClass:true },
};

// ═══════════════════════════════════════
//  TOWER DEFINITIONS
// ═══════════════════════════════════════
// Each tower has 2 upgrade paths with 2 levels each

const TOWER_DEFS = [
  {
    id:'thorn', name:'Blaster Turret', baseCost:90, accent:'#ff4444', accentRGB:'255,68,68',
    damage:1, pierce:2, fireRate:1.0, range:100, projSpeed:360,
    type:'projectile', projColor:'#ff4444', attackType:'sharp',
    desc:'Standard blaster turret. Reliable and affordable.',
    pathA:[
      { name:'Accelerated Bolts', cost:100, desc:'+2 pierce, faster fire' },
      { name:'Triple Barrel', cost:350, desc:'Fires 3 bolts at once' },
    ],
    pathB:[
      { name:'Targeting Computer', cost:80, desc:'+35% range' },
      { name:'Homing Bolts', cost:400, desc:'Bolts home in on targets' },
    ]
  },
  {
    id:'tack', name:'Ion Scatter', baseCost:140, accent:'#44aaff', accentRGB:'68,170,255',
    damage:1, pierce:1, fireRate:0.7, range:65, projSpeed:280,
    type:'tack', projColor:'#44aaff', attackType:'sharp',
    tacks:8,
    desc:'Fires 8 ion bolts in all directions.',
    pathA:[
      { name:'Overcharged', cost:120, desc:'12 ions, faster fire' },
      { name:'Ion Storm', cost:450, desc:'16 ions, 2x fire rate' },
    ],
    pathB:[
      { name:'Thermal Ions', cost:100, desc:'Ions pop lead, +burn' },
      { name:'Plasma Ring', cost:600, desc:'Constant fire ring pops everything nearby' },
    ]
  },
  {
    id:'frost', name:'Cryo Emitter', baseCost:150, accent:'#88eeff', accentRGB:'136,238,255',
    damage:0, pierce:0, fireRate:0, range:80, projSpeed:0,
    type:'freeze', projColor:'#88eeff', attackType:'freeze',
    slowFactor:0.4, slowDuration:1.5,
    desc:'Slows all enemies in range.',
    pathA:[
      { name:'Deep Freeze', cost:125, desc:'Stronger slow, also pops' },
      { name:'Absolute Zero', cost:550, desc:'Huge range, freezes solid' },
    ],
    pathB:[
      { name:'Flash Freeze', cost:100, desc:'Pops 1 layer on slow' },
      { name:'Cryo Launcher', cost:500, desc:'Shoots freeze projectiles far' },
    ]
  },
  {
    id:'solar', name:'Thermal Detonator', baseCost:200, accent:'#ff8800', accentRGB:'255,136,0',
    damage:1, pierce:0, fireRate:0.5, range:110, projSpeed:260,
    type:'aoe', projColor:'#ff8800', attackType:'explosion',
    splashRadius:45,
    desc:'Explosive area damage. Melts armor.',
    pathA:[
      { name:'Expanded Payload', cost:150, desc:'+60% splash radius' },
      { name:'Cluster Charges', cost:600, desc:'Fragments deal 2nd explosion' },
    ],
    pathB:[
      { name:'Incendiary', cost:120, desc:'Burn DoT on hit' },
      { name:'Capital Ship Buster', cost:700, desc:'10x damage to capital ships' },
    ]
  },
  {
    id:'cannon', name:'Proton Cannon', baseCost:275, accent:'#44ff44', accentRGB:'68,255,68',
    damage:2, pierce:0, fireRate:0.35, range:120, projSpeed:300,
    type:'aoe', projColor:'#44ff44', attackType:'explosion',
    splashRadius:55,
    desc:'Heavy proton explosions. Devastating vs groups.',
    pathA:[
      { name:'Heavy Protons', cost:200, desc:'3x damage' },
      { name:'Orbital Strike', cost:900, desc:'8x damage, stun capital ships 1s' },
    ],
    pathB:[
      { name:'Rapid Cycling', cost:150, desc:'+60% fire rate' },
      { name:'Concussion Barrage', cost:750, desc:'Fires 3 seeking missiles' },
    ]
  },

function getTowerStats(t) {
  const d = TOWER_DEFS[t.defIndex];
  const pA = t.pathA, pB = t.pathB;
  let damage = d.damage;
  let pierce = d.pierce || 1;
  let fireRate = d.fireRate;
  let range = d.range;
  let projSpeed = d.projSpeed;
  let tacks = d.tacks || 0;
  let splashRadius = d.splashRadius || 0;
  let chains = d.chains || 0;
  let slow = d.slowFactor || 0;
  let slowDur = d.slowDuration || 0;
  let attackType = d.attackType;
  let seekTarget = false;
  let burn = false;
  let moabMultiplier = 1;
  let snapPop = false;
  let cryoCannon = false;
  let clusterBombs = false;
  let missiles = 1;
  let stunChance = 0;
  let stunDur = 0;
  let beamTargets = 1;
  let beamDpsMultiplier = 1;
  let ringOfFire = false;
  let freezeSolid = false;
  let popAll = false;
  let abilityReady = false;
  let siegeStun = false;
  let chainAoe = false;

  switch(d.id) {
    case 'thorn':
      if (pA >= 1) { pierce += 2; fireRate *= 1.25; }
      if (pA >= 2) { missiles = 3; }
      if (pB >= 1) { range *= 1.35; }
      if (pB >= 2) { seekTarget = true; damage += 1; }
      break;
    case 'tack':
      if (pA >= 1) { tacks = 12; fireRate *= 1.3; }
      if (pA >= 2) { tacks = 16; fireRate *= 2; }
      if (pB >= 1) { burn = true; attackType = 'fire'; }
      if (pB >= 2) { ringOfFire = true; }
      break;
    case 'frost':
      if (pA >= 1) { slow = 0.6; slowDur = 2.5; snapPop = true; }
      if (pA >= 2) { range *= 1.8; freezeSolid = true; slowDur = 3; slow = 0.8; }
      if (pB >= 1) { snapPop = true; }
      if (pB >= 2) { cryoCannon = true; range *= 1.5; }
      break;
    case 'solar':
      if (pA >= 1) { splashRadius *= 1.6; }
      if (pA >= 2) { clusterBombs = true; }
      if (pB >= 1) { burn = true; }
      if (pB >= 2) { moabMultiplier = 10; }
      break;
    case 'cannon':
      if (pA >= 1) { damage *= 3; }
      if (pA >= 2) { damage = Math.max(damage, d.damage * 8); siegeStun = true; }
      if (pB >= 1) { fireRate *= 1.6; }
      if (pB >= 2) { missiles = 3; seekTarget = true; }
      break;
    case 'laser':
      if (pA >= 1) { beamDpsMultiplier = 2.5; }
      if (pA >= 2) { beamDpsMultiplier = 6; popAll = true; }
      if (pB >= 1) { beamTargets = 2; }
      if (pB >= 2) { beamTargets = 4; abilityReady = true; }
      break;
    case 'storm':
      if (pA >= 1) { chains += 3; damage += 1; }
      if (pA >= 2) { chains += 5; chainAoe = true; damage += 2; }
      if (pB >= 1) { stunChance = 0.25; stunDur = 0.5; }
      if (pB >= 2) { stunChance = 0.5; stunDur = 1.0; damage *= 2; }
      break;
  }

  return {
    damage, pierce, fireRate, range, projSpeed, tacks,
    splashRadius, chains, slow, slowDur, attackType,
    seekTarget, burn, moabMultiplier, snapPop, cryoCannon,
    clusterBombs, missiles, stunChance, stunDur, beamTargets,
    beamDpsMultiplier, ringOfFire, freezeSolid, popAll,
    abilityReady, siegeStun, chainAoe
  };
}

function towerTotalCost(t) {
  const d = TOWER_DEFS[t.defIndex];
  let total = d.baseCost;
  for (let i = 0; i < t.pathA; i++) total += d.pathA[i].cost;
  for (let i = 0; i < t.pathB; i++) total += d.pathB[i].cost;
  return total;
}

// ═══════════════════════════════════════
//  PATH SYSTEM
// ═══════════════════════════════════════

let pathPoints = [], pathLength = 0, pathSegments = [];
let isForkMap = false;
let pathPointsTop = [], pathPointsBot = [];
let pathLengthTop = 0, pathLengthBot = 0;
let pathSegmentsTop = [], pathSegmentsBot = [];
let sharedStartLen = 0, sharedEndLen = 0;
let sharedStartPts = [], sharedEndPts = [];
let sharedStartSegs = [], sharedEndSegs = [];

function cellCenter(row, col) {
  return { x: gridOffX + (col + 0.5) * cellSize, y: gridOffY + (row + 0.5) * cellSize };
}

function buildPath(waypoints) {
  const pts = waypoints.map(wp => cellCenter(wp[0], wp[1]));
  const detailed = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i+1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const steps = Math.max(Math.ceil(dist / 2), 1);
    for (let s = 0; s < steps; s++) {
      const t = s / steps;
      detailed.push({ x: a.x + dx * t, y: a.y + dy * t });
    }
  }
  detailed.push(pts[pts.length - 1]);
  return detailed;
}

function calcSegments(pts) {
  const segs = [0]; let total = 0;
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
    total += Math.sqrt(dx*dx + dy*dy);
    segs.push(total);
  }
  return { segs, total };
}

function getPositionOnPath(progress, pts, segs, totalLen) {
  if (pts.length < 2 || totalLen <= 0) return pts[0] || {x:0,y:0};
  const dist = Math.max(0, Math.min(progress, 1)) * totalLen;
  let lo = 0, hi = segs.length - 1;
  while (lo < hi - 1) { const mid = (lo + hi) >> 1; if (segs[mid] <= dist) lo = mid; else hi = mid; }
  const segLen = (segs[hi] || segs[lo]) - segs[lo];
  const t = segLen > 0 ? (dist - segs[lo]) / segLen : 0;
  const a = pts[lo], b = pts[hi] || pts[lo];
  return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
}

function setupPaths() {
  const raw = MAPS[selectedMap].getPath();
  if (raw.fork) {
    isForkMap = true;
    sharedStartPts = buildPath(raw.shared_start);
    pathPointsTop = buildPath(raw.top_fork);
    pathPointsBot = buildPath(raw.bottom_fork);
    sharedEndPts = buildPath(raw.shared_end);
    const ss = calcSegments(sharedStartPts); sharedStartSegs = ss.segs; sharedStartLen = ss.total;
    const st = calcSegments(pathPointsTop); pathSegmentsTop = st.segs; pathLengthTop = st.total;
    const sb = calcSegments(pathPointsBot); pathSegmentsBot = sb.segs; pathLengthBot = sb.total;
    const se = calcSegments(sharedEndPts); sharedEndSegs = se.segs; sharedEndLen = se.total;
    pathLength = sharedStartLen + Math.max(pathLengthTop, pathLengthBot) + sharedEndLen;
    pathPoints = [...sharedStartPts, ...pathPointsTop, ...sharedEndPts];
    const ps = calcSegments(pathPoints); pathSegments = ps.segs;
  } else {
    isForkMap = false;
    pathPoints = buildPath(raw);
    const ps = calcSegments(pathPoints); pathSegments = ps.segs; pathLength = ps.total;
  }
}

function getBloomPos(b) {
  if (isForkMap) {
    const totalLen = sharedStartLen + (b.topFork ? pathLengthTop : pathLengthBot) + sharedEndLen;
    const dist = b.pathProgress * totalLen;
    if (dist <= sharedStartLen && sharedStartLen > 0) {
      return getPositionOnPath(dist / sharedStartLen, sharedStartPts, sharedStartSegs, sharedStartLen);
    } else if (dist <= sharedStartLen + (b.topFork ? pathLengthTop : pathLengthBot)) {
      const fd = dist - sharedStartLen;
      const fl = b.topFork ? pathLengthTop : pathLengthBot;
      return getPositionOnPath(fd / fl, b.topFork ? pathPointsTop : pathPointsBot, b.topFork ? pathSegmentsTop : pathSegmentsBot, fl);
    } else {
      const ed = dist - sharedStartLen - (b.topFork ? pathLengthTop : pathLengthBot);
      return getPositionOnPath(Math.min(ed / sharedEndLen, 1), sharedEndPts, sharedEndSegs, sharedEndLen);
    }
  }
  return getPositionOnPath(b.pathProgress, pathPoints, pathSegments, pathLength);
}

function getBloomTotalLen(b) {
  if (isForkMap) return sharedStartLen + (b.topFork ? pathLengthTop : pathLengthBot) + sharedEndLen;
  return pathLength;
}

function createBloom(type, progress, topFork) {
  const def = BLOOM_TYPES[type];
  return {
    type, hp: def.hp, maxHp: def.hp,
    pathProgress: progress || 0,
    speed: def.speed, dead: false,
    topFork: topFork !== undefined ? topFork : Math.random() < 0.5,
    slowFactor: 1.0, slowTimer: 0,
    frozen: false, freezeTimer: 0,
    burnTimer: 0, burnTicks: 0,
    stunTimer: 0,
    x: 0, y: 0, size: def.moabClass ? (type === 'bfb' ? 18 : 12) : 5
  };
}

function popBloom(bloom, fromExplosion, fromFreeze, fromEnergy) {
  if (bloom.dead) return;
  const def = BLOOM_TYPES[bloom.type];
  bloom.hp--;
  totalPops++;
  popCombo++;
  comboTimer = 0.5;

  if (bloom.hp <= 0) {
    bloom.dead = true;
    gold += def.reward;
    totalGoldEarned += def.reward;
    const popColor = def.color === 'rainbow' ? randomRainbowColor() : def.color;
    const popCount = def.moabClass ? (bloom.type === 'bfb' ? 25 : 15) : bloom.type === 'ceramic' ? 15 : 8;
    spawnPopParticles(bloom.x, bloom.y, popColor, popCount);
    // White sparks
    spawnPopParticles(bloom.x, bloom.y, '#ffffff', Math.floor(popCount * 0.4));
    // MOAB/BFB death: screen shake + debris
    if (def.moabClass) {
      shakeMag = bloom.type === 'bfb' ? 10 : 6; shakeTime = 0.4;
      spawnRingParticle(bloom.x, bloom.y, bloom.size * (cellSize/40) * 2, '#ffffff');
      for (let d = 0; d < 6 && particles.length < MAX_PARTICLES; d++) {
        const da = Math.random()*Math.PI*2, ds = 20+Math.random()*60;
        particles.push({ x:bloom.x, y:bloom.y, vx:Math.cos(da)*ds, vy:Math.sin(da)*ds, life:0.6+Math.random()*0.3, maxLife:0.8, size:2+Math.random()*2, color:Math.random()>0.5?'#888':'#ff8800', type:'debris' });
      }
    }
    playPopSound(bloom.type);

    for (const childType of def.children) {
      const child = createBloom(childType, bloom.pathProgress, bloom.topFork);
      child.pathProgress += (Math.random() - 0.5) * 0.003;
      child.pathProgress = Math.max(0, Math.min(child.pathProgress, 0.999));
      enemies.push(child);
    }
  }
}

function damageBloom(bloom, pops, attackType) {
  if (bloom.dead) return;
  const def = BLOOM_TYPES[bloom.type];
  // Immunity checks
  if (def.immuneSharp && attackType === 'sharp') return;
  if (def.immuneExplosion && attackType === 'explosion') return;
  if (def.immuneFreeze && attackType === 'freeze') return;
  // Energy and fire bypass all immunities

  for (let i = 0; i < pops && !bloom.dead; i++) {
    popBloom(bloom, attackType === 'explosion', attackType === 'freeze', attackType === 'energy');
  }
}

function randomRainbowColor() {
  const c = ['#ff4444','#ff8800','#ffdd00','#44dd44','#4488ff','#aa44ff'];
  return c[Math.floor(Math.random() * c.length)];
}

// ═══════════════════════════════════════

// ═══════════════════════════════════════

function generateWaves() {
  const W = [];
  const rep = (t, n) => Array(n).fill(t);
  const mix = (...args) => {
    const a = [];
    for (let i = 0; i < args.length; i += 2) for (let j = 0; j < args[i+1]; j++) a.push(args[i]);
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
    return a;
  };
  const w = (blooms, interval) => ({ blooms, interval: interval || 0.6 });

  // 1-5: Intro
  W.push(w(rep('red', 20), 0.8));
  W.push(w(rep('red', 30), 0.7));
  W.push(w(mix('red',15,'blue',10), 0.65));
  W.push(w(mix('blue',20,'green',5), 0.6));
  W.push(w(mix('green',15,'blue',15), 0.55));

  // 6-10: Ramp
  W.push(w(mix('green',20,'blue',15), 0.5));
  W.push(w(mix('green',15,'yellow',10), 0.5));
  W.push(w(mix('yellow',20,'green',15), 0.45));
  W.push(w(mix('yellow',20,'green',15,'blue',10), 0.45));
  W.push(w(mix('yellow',25,'green',20), 0.4));

  // 11-15: Pink, Black, White
  W.push(w(mix('pink',10,'yellow',20), 0.4));
  W.push(w(mix('pink',15,'yellow',15,'green',10), 0.38));
  W.push(w(mix('black',8,'pink',15,'yellow',10), 0.38));
  W.push(w(mix('white',8,'pink',15,'yellow',10), 0.35));
  W.push(w(mix('black',10,'white',10,'pink',20), 0.35));

  // 16-20: Lead, Rainbow
  W.push(w(mix('lead',5,'black',10,'white',10,'pink',15), 0.35));
  W.push(w(mix('rainbow',8,'pink',20,'yellow',15), 0.3));
  W.push(w(mix('lead',8,'rainbow',10,'pink',15), 0.3));
  W.push(w(mix('rainbow',15,'lead',5,'pink',20,'black',10), 0.28));
  W.push(w(mix('rainbow',20,'lead',8,'pink',20), 0.28));

  // 21-24: Ceramic + first MOAB
  W.push(w(mix('ceramic',3,'rainbow',15,'pink',20), 0.3));
  W.push(w(mix('ceramic',5,'rainbow',20,'lead',5), 0.28));
  W.push(w(mix('ceramic',8,'rainbow',15,'lead',8,'pink',20), 0.25));
  W.push(w([...rep('moab',1),...mix('ceramic',6,'rainbow',20)], 0.25)); // First MOAB!

  // 25-29: MOABs + ceramic swarms
  W.push(w(mix('ceramic',10,'rainbow',20,'lead',10,'pink',30), 0.22));
  W.push(w([...rep('moab',1),...mix('ceramic',12,'rainbow',15,'lead',8)], 0.22));
  W.push(w([...rep('moab',2),...mix('ceramic',10,'rainbow',20,'black',15,'white',15)], 0.2));
  W.push(w([...rep('moab',2),...mix('ceramic',15,'rainbow',20,'lead',10)], 0.2));
  W.push(w([...rep('moab',3),...mix('ceramic',12,'rainbow',25,'pink',30)], 0.18));

  // 30-34: Multiple MOABs
  W.push(w([...rep('moab',3),...mix('ceramic',20,'rainbow',25,'lead',10,'pink',30)], 0.18));
  W.push(w([...rep('moab',4),...mix('ceramic',15,'rainbow',20,'lead',12)], 0.16));
  W.push(w([...rep('moab',4),...mix('ceramic',20,'rainbow',30,'black',15,'white',15)], 0.15));
  W.push(w([...rep('moab',5),...mix('ceramic',25,'rainbow',25,'lead',15)], 0.14));
  W.push(w([...rep('moab',6),...mix('ceramic',20,'rainbow',30,'pink',40)], 0.13));

  // 35-39: BFB arrives
  W.push(w([...rep('bfb',1),...rep('moab',4),...mix('ceramic',20,'rainbow',20)], 0.15));
  W.push(w([...rep('bfb',1),...rep('moab',5),...mix('ceramic',25,'rainbow',25,'lead',15)], 0.13));
  W.push(w([...rep('bfb',2),...rep('moab',4),...mix('ceramic',20,'rainbow',30)], 0.12));
  W.push(w([...rep('bfb',2),...rep('moab',6),...mix('ceramic',30,'rainbow',30,'lead',15)], 0.1));
  W.push(w([...rep('bfb',3),...rep('moab',8),...mix('ceramic',30,'rainbow',40,'lead',20,'pink',50)], 0.08));

  return W;
}

function initMap() {
  const m = MAPS[selectedMap];
  grid = m.generate();
  const W = C.width / DPR, H = C.height / DPR;
  const availW = W - 10;
  const availH = H - HUD_HEIGHT - SHOP_HEIGHT - 10;
  cellSize = Math.floor(Math.min(availW / m.cols, availH / m.rows));
  gridOffX = Math.floor((W - cellSize * m.cols) / 2);
  gridOffY = HUD_HEIGHT + Math.floor((availH - cellSize * m.rows) / 2);
  setupPaths();
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  C.width = Math.round(w * DPR);
  C.height = Math.round(h * DPR);
  C.style.width = w + 'px';
  C.style.height = h + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  initNebula(w, h);

  // Position send-wave button above shop bar
  const swb = $('sendWaveBtn');
  swb.style.bottom = (SHOP_HEIGHT + 10) + 'px';

  // Position tower panel above shop bar
  const tp = $('towerPanel');
  tp.style.bottom = (SHOP_HEIGHT + 8) + 'px';

  if (STATE !== 'menu') {
    const m = MAPS[selectedMap];
    const W2 = C.width / DPR, H2 = C.height / DPR;
    const aW = W2 - 10, aH = H2 - HUD_HEIGHT - SHOP_HEIGHT - 10;
    cellSize = Math.floor(Math.min(aW / m.cols, aH / m.rows));
    gridOffX = Math.floor((W2 - cellSize * m.cols) / 2);
    gridOffY = HUD_HEIGHT + Math.floor((aH - cellSize * m.rows) / 2);
    setupPaths();
    for (const t of towers) { const p = cellCenter(t.row, t.col); t.x = p.x; t.y = p.y; }
  }
}
window.addEventListener('resize', resize);
