<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Blade of Ruin — Maas Arcade</title>
<meta name="theme-color" content="#0d0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="../shared.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--game-accent:#ff4444;--game-glow:rgba(255,68,68,0.3)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;position:fixed;inset:0;width:100%;height:100dvh;touch-action:none;overscroll-behavior:none;margin:0;padding:0}

#game-canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;z-index:1}
#particle-canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;z-index:2;pointer-events:none}
#bg-canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}

/* ── Overlay Base ── */
.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,10,26,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow-y:auto;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);opacity:1;pointer-events:all;transition:none}
.overlay.hidden{display:none!important}
.overlay-scroll{max-height:100dvh;overflow-y:auto;width:100%;display:flex;flex-direction:column;align-items:center;padding:clamp(8px,2dvh,20px) clamp(8px,3vw,20px)}

/* ── Glass Panels ── */
.gp{background:rgba(30,24,50,0.7);border:1px solid rgba(184,169,212,0.12);border-radius:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:clamp(10px,2dvh,20px);width:min(420px,92vw)}
.gp-glow{box-shadow:0 0 30px var(--game-glow),inset 0 0 20px rgba(74,63,107,0.1)}

/* ── Menu Overlay — transparent for canvas background ── */
#ov-menu{background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none}
#ov-menu .overlay-scroll{background:transparent}

/* ── Title Styling ── */
.title-main{font-family:'Cinzel','Cormorant Garamond',serif;font-size:clamp(30px,6dvh,54px);font-weight:700;letter-spacing:clamp(3px,0.8vw,8px);text-align:center;background:linear-gradient(135deg,#8b0000,#cc3300,#ff6a00,#cc3300,#8b0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;margin-bottom:6px;filter:drop-shadow(0 0 12px rgba(255,80,30,0.4))}
.title-sub{font-family:'Cinzel','Cormorant Garamond',serif;font-size:clamp(9px,1.2dvh,12px);letter-spacing:clamp(4px,1vw,10px);text-transform:uppercase;color:#b8a9d4;opacity:.55;margin-bottom:clamp(12px,2.5dvh,24px);text-align:center}

/* ── Buttons ── */
.btn{font-family:'Cinzel','Quicksand',sans-serif;font-size:clamp(13px,1.8dvh,16px);font-weight:600;color:var(--moon-glow);background:rgba(20,16,36,0.55);border:1px solid rgba(184,169,212,0.18);border-radius:8px;padding:clamp(10px,1.5dvh,14px) clamp(20px,4vw,32px);cursor:pointer;transition:all .25s;text-transform:uppercase;letter-spacing:2px;min-width:clamp(140px,40vw,200px);text-align:center;display:inline-block;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 2px 8px rgba(0,0,0,0.3)}
.btn:active{transform:scale(0.96);background:rgba(74,63,107,0.5)}
.btn:hover{border-color:rgba(184,169,212,0.35);box-shadow:0 0 14px rgba(184,169,212,0.1),inset 0 1px 0 rgba(255,255,255,0.06)}
.btn-accent{border-color:rgba(200,60,40,0.5);background:rgba(140,20,0,0.25);box-shadow:0 0 18px var(--game-glow),inset 0 1px 0 rgba(255,100,60,0.08)}
.btn-accent:active{background:rgba(200,40,20,0.35)}
.btn-sm{font-size:clamp(10px,1.3dvh,13px);padding:clamp(6px,1dvh,10px) clamp(12px,2vw,20px);min-width:auto;letter-spacing:1px}
.btn-danger{border-color:#ff4444;color:#ff6666}
.btn-gold{border-color:#ffd740;color:#ffd740;background:rgba(255,215,64,0.1)}
.btn-green{border-color:#76ff03;color:#76ff03;background:rgba(118,255,3,0.1)}
.btn-disabled{opacity:0.35;pointer-events:none}

/* ── Stat bars ── */
.bar-wrap{width:100%;height:clamp(14px,2dvh,20px);background:rgba(13,10,26,0.6);border-radius:10px;border:1px solid rgba(184,169,212,0.08);overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:10px;transition:width .4s ease}
.bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Quicksand',sans-serif;font-size:clamp(9px,1.2dvh,12px);font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.bar-hp .bar-fill{background:linear-gradient(90deg,#cc2222,#ff4444)}
.bar-sta .bar-fill{background:linear-gradient(90deg,#cc8800,#ffaa00)}
.bar-mana .bar-fill{background:linear-gradient(90deg,#2244cc,#4488ff)}
.bar-xp .bar-fill{background:linear-gradient(90deg,#448844,#66cc66)}

/* ── Character Creation ── */
.race-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,1vw,8px);width:100%;margin:clamp(6px,1dvh,12px) 0}
.race-card{background:rgba(30,24,50,0.5);border:2px solid rgba(184,169,212,0.1);border-radius:10px;padding:clamp(6px,1dvh,10px) clamp(4px,0.5vw,8px);cursor:pointer;text-align:center;transition:all .2s}
.race-card.selected{border-color:var(--game-accent);background:rgba(255,68,68,0.12);box-shadow:0 0 12px var(--game-glow)}
.race-card .rc-icon{font-size:clamp(20px,3.5dvh,32px);line-height:1.2}
.race-card .rc-name{font-family:'Quicksand',sans-serif;font-size:clamp(9px,1.1dvh,11px);font-weight:600;color:var(--moon-glow);margin-top:2px}
.race-card .rc-bonus{font-size:clamp(7px,0.9dvh,9px);color:var(--iris-light);opacity:.7;margin-top:1px}

.stat-row{display:flex;align-items:center;gap:clamp(4px,1vw,8px);margin:clamp(2px,0.4dvh,4px) 0;width:100%}
.stat-label{font-family:'Quicksand',sans-serif;font-size:clamp(10px,1.3dvh,13px);font-weight:600;color:var(--iris-light);min-width:clamp(32px,8vw,44px);text-transform:uppercase}
.stat-val{font-family:'Quicksand',sans-serif;font-size:clamp(12px,1.5dvh,15px);font-weight:700;color:var(--moon-glow);min-width:24px;text-align:center}
.stat-btn{width:clamp(28px,4dvh,36px);height:clamp(28px,4dvh,36px);border-radius:50%;border:1px solid rgba(184,169,212,0.2);background:rgba(74,63,107,0.3);color:var(--moon-glow);font-size:clamp(14px,2dvh,18px);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.stat-btn:active{background:rgba(74,63,107,0.6)}
.stat-btn.disabled{opacity:.25;pointer-events:none}
.stat-bar-mini{flex:1;height:6px;background:rgba(13,10,26,0.5);border-radius:3px;overflow:hidden}
.stat-bar-mini div{height:100%;background:var(--game-accent);border-radius:3px;transition:width .2s}

/* ── Weapon Choice ── */
.weapon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(4px,1vw,8px);width:100%;margin:clamp(6px,1dvh,12px) 0}
.weapon-card{background:rgba(30,24,50,0.5);border:2px solid rgba(184,169,212,0.1);border-radius:10px;padding:clamp(8px,1.2dvh,12px);cursor:pointer;text-align:center;transition:all .2s}
.weapon-card.selected{border-color:var(--game-accent);background:rgba(255,68,68,0.12);box-shadow:0 0 12px var(--game-glow)}
.weapon-card .wc-icon{font-size:clamp(22px,3.5dvh,32px)}
.weapon-card .wc-name{font-size:clamp(8px,1dvh,10px);color:var(--moon-glow);margin-top:2px;font-weight:600}

/* ── Combat HUD — Bottom Actions ── */
.combat-hud{position:fixed;bottom:0;left:0;right:0;z-index:20;background:linear-gradient(0deg,rgba(8,6,16,0.97) 0%,rgba(10,8,20,0.92) 85%,transparent 100%);border-top:1px solid rgba(255,68,68,0.12);padding:clamp(6px,1dvh,12px) clamp(4px,1vw,10px) calc(env(safe-area-inset-bottom,0px) + clamp(4px,0.8dvh,8px));display:none;flex-direction:column;gap:clamp(4px,0.7dvh,8px)}
.combat-hud.visible{display:flex}
/* Action grid — larger circular buttons */
.combat-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(4px,0.8vw,8px);padding:0 clamp(2px,0.5vw,4px)}
.action-btn{font-family:'Quicksand',sans-serif;position:relative;color:var(--moon-glow);background:rgba(20,16,36,0.85);border:2px solid rgba(184,169,212,0.2);border-radius:14px;padding:clamp(5px,0.8dvh,8px) clamp(6px,1.2vw,10px);cursor:pointer;text-align:center;transition:all .15s;line-height:1.1;width:clamp(62px,15vw,82px);min-height:clamp(62px,10dvh,82px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.action-btn:active{background:rgba(74,63,107,0.5);transform:scale(0.93)}
.action-btn .ab-icon{font-size:clamp(18px,2.8dvh,26px);display:block}
.action-btn .ab-name{font-size:clamp(8px,1dvh,10px);font-weight:700;display:block;letter-spacing:0.3px}
.action-btn .ab-cost{font-size:clamp(7px,0.85dvh,9px);display:block;color:var(--iris-mid);font-weight:600}
.action-btn .ab-dmg{font-size:clamp(9px,1.1dvh,11px);font-weight:800;display:block;margin-top:1px}
.action-btn .ab-tiers{font-size:clamp(6px,0.7dvh,8px);display:block;color:var(--iris-mid);margin-top:0px;white-space:nowrap;overflow:hidden}
.action-btn.disabled{opacity:.25;pointer-events:none}
.action-btn.highlight{border-color:var(--game-accent);box-shadow:0 0 10px var(--game-glow)}
/* Tier-colored borders for attack types */
.action-btn.ab-type-light{border-color:rgba(68,255,68,0.35)}
.action-btn.ab-type-heavy{border-color:rgba(255,68,68,0.4);box-shadow:0 0 6px rgba(255,68,68,0.15)}
.action-btn.ab-type-medium{border-color:rgba(255,255,68,0.35)}
.action-btn.ab-type-move{border-color:rgba(68,170,255,0.3)}
.action-btn.ab-type-defend{border-color:rgba(68,136,255,0.35)}
.action-btn.ab-type-spell{border-color:rgba(136,68,255,0.35)}
.action-btn.ab-type-util{border-color:rgba(184,169,212,0.2)}
.action-btn.ab-type-flee{border-color:rgba(255,68,68,0.3)}
/* Info Panel — shows details of hovered/selected action */
.action-info{width:100%;min-height:clamp(28px,4dvh,40px);background:rgba(15,12,28,0.9);border:1px solid rgba(184,169,212,0.1);border-radius:10px;padding:clamp(4px,0.6dvh,8px) clamp(8px,1.5vw,14px);display:flex;align-items:center;gap:clamp(6px,1vw,10px)}
.action-info .ai-icon{font-size:clamp(18px,2.5dvh,24px)}
.action-info .ai-body{flex:1;min-width:0}
.action-info .ai-name{font-family:'Quicksand',sans-serif;font-size:clamp(10px,1.2dvh,13px);font-weight:700;color:var(--moon-glow)}
.action-info .ai-desc{font-family:'Quicksand',sans-serif;font-size:clamp(8px,0.95dvh,10px);color:var(--iris-light);margin-top:1px}
.action-info .ai-tiers{display:flex;gap:clamp(4px,0.6vw,8px);margin-top:2px}
.action-info .ai-tier{font-size:clamp(7px,0.85dvh,9px);font-weight:700;padding:1px 4px;border-radius:4px;background:rgba(0,0,0,0.3)}
.action-info .ai-tier.t-miss{color:#666}
.action-info .ai-tier.t-graze{color:#ff8844}
.action-info .ai-tier.t-hit{color:#ffff44}
.action-info .ai-tier.t-strong{color:#44ff44}
.action-info .ai-tier.t-crit{color:#ff4444}

/* ── Spell Submenu ── */
.spell-menu{position:fixed;bottom:clamp(100px,20dvh,180px);left:50%;transform:translateX(-50%);z-index:25;background:rgba(12,10,25,0.96);border:1px solid rgba(68,68,255,0.2);border-radius:14px;padding:clamp(8px,1.2dvh,14px);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;width:min(400px,92vw);max-height:38dvh;overflow-y:auto}
.spell-menu.visible{display:block}
.spell-row{display:flex;align-items:center;gap:clamp(6px,1vw,10px);padding:clamp(6px,0.8dvh,8px);border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.spell-row:active{background:rgba(68,68,255,0.15)}
.spell-row.disabled{opacity:.3;pointer-events:none}
.spell-row .sr-icon{font-size:clamp(18px,2.5dvh,24px)}
.spell-row .sr-name{font-size:clamp(11px,1.3dvh,13px);font-weight:600;color:var(--moon-glow);flex:1}
.spell-row .sr-dmg{font-size:clamp(9px,1dvh,11px);font-weight:700;color:#ff8844}
.spell-row .sr-cost{font-size:clamp(9px,1.1dvh,11px);color:#4488ff}
.spell-row .sr-cd{font-size:clamp(8px,1dvh,10px);color:#ff8844}

/* ── Combat Top HUD ── */
.combat-top{position:fixed;top:0;left:0;right:0;z-index:20;padding:calc(env(safe-area-inset-top,0px) + clamp(4px,0.6dvh,8px)) clamp(6px,1.5vw,12px) clamp(4px,0.6dvh,8px);background:linear-gradient(180deg,rgba(10,8,18,0.96) 0%,rgba(10,8,18,0.8) 80%,transparent 100%);display:none;gap:clamp(3px,0.5dvh,6px)}
.combat-top.visible{display:flex;flex-direction:column}
.ct-row{display:flex;justify-content:space-between;align-items:flex-start;gap:clamp(6px,2vw,16px)}
.ct-fighter{flex:1;min-width:0}
.ct-portrait{display:flex;align-items:center;gap:clamp(4px,0.8vw,8px);margin-bottom:3px}
.ct-avatar{width:clamp(32px,5dvh,44px);height:clamp(32px,5dvh,44px);border-radius:8px;background:rgba(30,24,50,0.7);border:2px solid rgba(184,169,212,0.2);display:flex;align-items:center;justify-content:center;font-size:clamp(18px,3dvh,28px)}
.ct-avatar.player-av{border-color:rgba(68,170,255,0.4)}
.ct-avatar.enemy-av{border-color:rgba(255,68,68,0.4)}
.ct-info{flex:1;min-width:0}
.ct-name{font-family:'Cormorant Garamond',serif;font-size:clamp(12px,1.6dvh,16px);font-weight:600;margin-bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-name.player-name{color:#66aaff}
.ct-name.enemy-name{color:#ff6666;text-align:right}
.ct-sub{font-family:'Quicksand',sans-serif;font-size:clamp(8px,0.9dvh,10px);color:var(--iris-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-bars{display:flex;flex-direction:column;gap:2px}
.ct-bar{height:clamp(12px,1.6dvh,16px);position:relative}
.ct-bar .bar-text{font-size:clamp(8px,1dvh,11px);font-weight:700;letter-spacing:0.5px}
.ct-vs{font-family:'Cormorant Garamond',serif;font-size:clamp(12px,1.6dvh,18px);font-weight:600;color:var(--game-accent);text-shadow:0 0 10px var(--game-glow);min-width:24px;text-align:center;align-self:center}
.ct-status{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.ct-status-icon{font-size:clamp(10px,1.3dvh,14px);background:rgba(30,24,50,0.6);border-radius:4px;padding:1px 3px;border:1px solid rgba(184,169,212,0.08)}
.ct-turn{text-align:center;font-size:clamp(10px,1.2dvh,12px);color:var(--iris-light);font-weight:600;letter-spacing:1px}
.ct-distance{text-align:center;font-size:clamp(9px,1dvh,11px);color:var(--iris-mid)}

/* ── Town HUD (canvas-based town) ── */
.town-hud{position:fixed;top:env(safe-area-inset-top,0px);left:50%;transform:translateX(-50%);z-index:15;
  display:flex;align-items:center;gap:clamp(8px,2vw,14px);
  background:rgba(10,8,20,0.78);border:1px solid rgba(184,169,212,0.12);border-radius:0 0 12px 12px;
  padding:clamp(5px,0.8dvh,8px) clamp(10px,2.5vw,18px);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  max-width:min(440px,96vw);font-family:'Quicksand',sans-serif}
.town-hud.hidden{display:none!important}
.th-name{color:var(--moon-glow);font-weight:700;font-size:clamp(11px,1.4dvh,14px)}
.th-level{color:var(--iris-light);font-size:clamp(10px,1.2dvh,12px)}
.th-gold{color:#ffd740;font-weight:700;font-size:clamp(10px,1.2dvh,12px)}
.th-hp-wrap{flex:0 0 clamp(50px,12vw,70px);height:8px;background:rgba(0,0,0,0.3);border-radius:4px;overflow:hidden}
.th-hp-fill{height:100%;background:linear-gradient(90deg,#e53935,#ff6e40);border-radius:4px;transition:width .3s}
.th-btn{background:rgba(74,63,107,0.45);border:1px solid rgba(184,169,212,0.18);border-radius:8px;
  padding:clamp(3px,0.5dvh,5px) clamp(6px,1vw,10px);cursor:pointer;font-size:clamp(14px,1.8dvh,18px);
  color:var(--moon-glow);transition:all .15s;line-height:1}
.th-btn:active{background:rgba(74,63,107,0.7);transform:scale(0.95)}

/* ── Shop / Inventory ── */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(120px,30vw,160px),1fr));gap:clamp(4px,0.8dvh,8px);width:100%;margin:clamp(4px,0.8dvh,8px) 0;max-height:40dvh;overflow-y:auto}
.item-card{background:rgba(20,16,36,0.7);border:2px solid rgba(184,169,212,0.1);border-radius:10px;padding:clamp(6px,1dvh,10px);cursor:pointer;transition:all .2s}
.item-card.selected{border-color:var(--game-accent);box-shadow:0 0 10px var(--game-glow)}
.item-card .ic-name{font-size:clamp(10px,1.2dvh,12px);font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-card .ic-type{font-size:clamp(8px,0.9dvh,9px);color:var(--iris-mid);text-transform:uppercase;letter-spacing:0.5px}
.item-card .ic-stats{font-size:clamp(8px,1dvh,10px);color:var(--iris-light);margin-top:3px;line-height:1.4}
.item-card .ic-price{font-size:clamp(9px,1.1dvh,11px);color:#ffd740;font-weight:700;margin-top:3px}
.tier-common .ic-name{color:#a0a0a0}
.tier-uncommon .ic-name{color:#4fc3f7}
.tier-rare .ic-name{color:#c9a84c}
.tier-epic .ic-name{color:#ff6a00}
.tier-legendary .ic-name{color:#cc44ff}

/* ── Equipment Slots ── */
.equip-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,0.8vw,8px);width:100%;margin:clamp(4px,0.8dvh,8px) 0}
.equip-slot{background:rgba(20,16,36,0.5);border:2px solid rgba(184,169,212,0.08);border-radius:10px;padding:clamp(6px,1dvh,10px);text-align:center;min-height:clamp(50px,8dvh,70px);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.equip-slot .es-label{font-size:clamp(7px,0.8dvh,9px);color:var(--iris-mid);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.equip-slot .es-name{font-size:clamp(8px,1dvh,10px);font-weight:600}
.equip-slot.filled{border-color:rgba(184,169,212,0.2)}

/* ── Dialogue Box ── */
.dialogue-box{position:fixed;bottom:clamp(70px,14dvh,120px);left:50%;transform:translateX(-50%);z-index:30;width:min(400px,90vw);background:rgba(10,8,20,0.95);border:1px solid rgba(255,68,68,0.2);border-radius:12px;padding:clamp(10px,1.5dvh,16px);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none}
.dialogue-box.visible{display:block}
.dialogue-name{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,1.8dvh,18px);font-weight:600;color:var(--game-accent);margin-bottom:4px}
.dialogue-text{font-family:'Quicksand',sans-serif;font-size:clamp(11px,1.4dvh,14px);color:var(--moon-glow);line-height:1.5;min-height:2em}

/* ── Skin Toggle ── */
.skin-toggle{position:fixed;top:env(safe-area-inset-top,0px);right:clamp(4px,1vw,8px);z-index:50;margin-top:clamp(4px,0.6dvh,8px)}
.skin-btn{background:rgba(30,24,50,0.7);border:1px solid rgba(184,169,212,0.15);border-radius:8px;padding:clamp(4px,0.6dvh,6px) clamp(8px,1.2vw,12px);cursor:pointer;font-family:'Quicksand',sans-serif;font-size:clamp(9px,1dvh,11px);color:var(--iris-light);transition:all .2s}
.skin-btn:active{background:rgba(74,63,107,0.5)}

/* ── Back Button ── */
.back-btn{position:fixed;top:env(safe-area-inset-top,0px);left:clamp(4px,1vw,8px);z-index:50;margin-top:clamp(4px,0.6dvh,8px);background:rgba(30,24,50,0.7);border:1px solid rgba(184,169,212,0.15);border-radius:50%;width:clamp(32px,4.5dvh,42px);height:clamp(32px,4.5dvh,42px);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--iris-light);font-size:clamp(14px,2dvh,20px);transition:all .2s;text-decoration:none}
.back-btn:active{background:rgba(74,63,107,0.5)}
.menu-back-btn{align-self:flex-start;font-family:'Quicksand',sans-serif;font-size:clamp(12px,1.5dvh,15px);font-weight:600;color:var(--iris-light);text-decoration:none;background:rgba(30,24,50,0.5);border:1px solid rgba(184,169,212,0.15);border-radius:8px;padding:clamp(6px,1dvh,10px) clamp(12px,2vw,20px);transition:all .2s}
.menu-back-btn:active{background:rgba(74,63,107,0.5)}

/* ── Combat Log ── */
#combat-log{position:fixed;left:clamp(4px,1vw,8px);top:50%;transform:translateY(-50%);z-index:18;width:min(160px,35vw);max-height:30dvh;background:rgba(10,8,20,0.88);border:1px solid rgba(184,169,212,0.1);border-radius:10px;padding:clamp(4px,0.6dvh,8px);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;overflow:hidden;pointer-events:none}
#combat-log.visible{display:block}
#combat-log .cl-title{font-family:'Quicksand',sans-serif;font-size:clamp(8px,0.9dvh,10px);font-weight:700;color:var(--iris-mid);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
#combat-log .cl-entry{font-family:'Quicksand',sans-serif;font-size:clamp(8px,0.95dvh,10px);color:var(--iris-light);line-height:1.4;padding:1px 0;opacity:0.8}
#combat-log .cl-entry:last-child{opacity:1;color:var(--moon-glow);text-shadow:0 0 6px rgba(255,255,255,0.2)}
#combat-log .cl-entry.cl-damage{color:#ff6666}
#combat-log .cl-entry.cl-heal{color:#66ff88}
#combat-log .cl-entry.cl-move{color:#66aaff}
#combat-log .cl-entry.cl-crit{color:#ffd740;font-weight:700}

/* ── Damage Numbers ── */
.dmg-float{position:fixed;z-index:35;pointer-events:none;font-family:'Cormorant Garamond',serif;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,0.8);animation:dmgFloat 1.2s ease-out forwards}
.dmg-float.crit{font-size:clamp(24px,4dvh,36px)!important;color:#ff4444!important}
.dmg-float.heal{color:#44ff44!important}
.dmg-float.dodge-text{color:#44aaff!important;font-style:italic}
.dmg-float.block-text{color:#ffaa44!important}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1}100%{opacity:0;transform:translateY(clamp(-60px,-10dvh,-100px)) scale(0.7)}}

/* ── Level Up Glow ── */
@keyframes lvlGlow{0%,100%{box-shadow:0 0 20px var(--game-glow)}50%{box-shadow:0 0 50px var(--game-glow),0 0 80px rgba(255,68,68,0.2)}}
.lvl-up-panel{animation:lvlGlow 1.5s infinite}

/* ── Name Input ── */
.name-input{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,3dvh,28px);font-weight:600;color:var(--moon-glow);background:rgba(13,10,26,0.6);border:1px solid rgba(184,169,212,0.2);border-radius:10px;padding:clamp(8px,1.2dvh,12px) clamp(12px,2vw,20px);text-align:center;width:min(300px,80vw);outline:none;transition:border-color .2s}
.name-input:focus{border-color:var(--game-accent)}
.name-input::placeholder{color:var(--iris-mid);opacity:.5}

/* ── Misc ── */
.flex-center{display:flex;align-items:center;justify-content:center}
.flex-col{display:flex;flex-direction:column;align-items:center}
.gap-sm{gap:clamp(4px,0.6dvh,8px)}
.gap-md{gap:clamp(8px,1.2dvh,14px)}
.gap-lg{gap:clamp(12px,2dvh,20px)}
.mt-sm{margin-top:clamp(4px,0.8dvh,8px)}
.mt-md{margin-top:clamp(8px,1.5dvh,14px)}
.mb-sm{margin-bottom:clamp(4px,0.8dvh,8px)}
.mb-md{margin-bottom:clamp(8px,1.5dvh,14px)}
.text-center{text-align:center}
.w-full{width:100%}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(16px,2.2dvh,22px);font-weight:600;color:var(--moon-glow);letter-spacing:1px}
.info-text{font-family:'Quicksand',sans-serif;font-size:clamp(10px,1.2dvh,13px);color:var(--iris-light);line-height:1.5}
.gold-text{color:#ffd740;font-weight:700}
.scrollable{max-height:50dvh;overflow-y:auto;width:100%}
.btn-row{display:flex;gap:clamp(6px,1.5vw,12px);justify-content:center;flex-wrap:wrap;margin-top:clamp(6px,1dvh,12px)}
.difficulty-row{display:flex;gap:clamp(4px,1vw,8px);justify-content:center;margin:clamp(6px,1dvh,12px) 0}
.diff-btn{padding:clamp(6px,1dvh,10px) clamp(14px,3vw,22px);border-radius:6px;border:1px solid rgba(184,169,212,0.12);background:rgba(14,10,28,0.5);color:var(--iris-mid);font-family:'Cinzel','Quicksand',sans-serif;font-size:clamp(9px,1.1dvh,11px);font-weight:600;cursor:pointer;transition:all .25s;letter-spacing:1.5px;text-transform:uppercase}

const MODEL_TIERS = [

  { color:'#ff6a00', accent:'#ffa040', glow:'rgba(255,106,0,0.5)', runes:true, wings:true, particles:false },
  { color:'#cc44ff', accent:'#ee88ff', glow:'rgba(200,80,255,0.6)', runes:true, wings:true, particles:true },
];

function getModelTier(lv) { return MODEL_TIERS[Math.min(Math.floor((lv-1)/2), 4)]; }

function lighten(hex, pct) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + Math.floor((255-r)*pct)); g = Math.min(255, g + Math.floor((255-g)*pct)); b = Math.min(255, b + Math.floor((255-b)*pct));
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}
function darken(hex, pct) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.floor(r*(1-pct)); g = Math.floor(g*(1-pct)); b = Math.floor(b*(1-pct));
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}

function mkFilter(id, color, str) {
  return `<filter id="${id}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="${str||3}" result="b"/><feFlood flood-color="${color}" flood-opacity="0.8" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
}

function mkDefs(id, skin, arm, acc, glow) {
  return `<defs>${mkFilter('gf_'+id, acc, 2.5)}${mkFilter('af_'+id, glow, 1.5)}<radialGradient id="sg_${id}" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="${skin}"/><stop offset="100%" stop-color="${skin}88"/></radialGradient><linearGradient id="ag_${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${arm}"/><stop offset="100%" stop-color="${arm}aa"/></linearGradient><linearGradient id="ac_${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${acc}"/><stop offset="100%" stop-color="${acc}66"/></linearGradient></defs>`;
}

function mkRunes(x, y, w, h, color, n) {
  const chars = 'ᚱᚠᚢᚦᚨᚲᚷᚹᚺᛁᛃᛇᛈᛉᛊᛏ';
  let s = '';
  for (let i = 0; i < (n||4); i++) {
    const rx = x + (w/(n||4)) * (i + 0.5);
    const ry = y + Math.sin(i*1.3)*h*0.3;
    const ch = chars[Math.floor(Math.random()*chars.length)];
    s += `<text x="${rx}" y="${ry}" fill="${color}" opacity="0.6" font-size="8" text-anchor="middle" style="animation:runeFloat ${2+i*0.3}s ease-in-out infinite">${ch}</text>`;
  }
  return s;
}

function mkParticles(cx, cy, color, n) {
  let s = '';
  for (let i = 0; i < (n||6); i++) {
    const a = (Math.PI*2/n)*i;
    const r = 15 + Math.random()*10;
    const px = cx + Math.cos(a)*r, py = cy + Math.sin(a)*r;
    s += `<circle cx="${px}" cy="${py}" r="${1.5+Math.random()}" fill="${color}" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="${1.5+Math.random()}s" repeatCount="indefinite"/><animate attributeName="cy" values="${py};${py-8};${py}" dur="${2+Math.random()}s" repeatCount="indefinite"/></circle>`;
  }
  return s;
}

function mkWings(cx, cy, color, acc, sc) {
  const s = sc || 0.7;
  return `<g transform="translate(${cx},${cy}) scale(${s})" opacity="0.5"><path d="M0,0 C-20,-30 -45,-25 -50,-5 C-45,-20 -25,-15 0,0Z" fill="${color}" stroke="${acc}" stroke-width="0.5"/><path d="M0,0 C20,-30 45,-25 50,-5 C45,-20 25,-15 0,0Z" fill="${color}" stroke="${acc}" stroke-width="0.5"/></g>`;
}

function renderCharacter(raceId, modelLv, weaponId, colorOverride) {
  const tier = getModelTier(modelLv);
  const race = RACES.find(r=>r.id===raceId) || RACES[0];
  const skin = colorOverride?.skin || race.skin;
  const arm = colorOverride?.armor || tier.color;
  const acc = colorOverride?.accent || tier.accent;
  const gem = colorOverride?.gem || tier.accent;
  const glow = tier.glow;
  const id = raceId + modelLv;
  const W = 110, H = 200;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  svg += `<style>@keyframes runeFloat{0%,100%{transform:translateY(0);opacity:0.6}50%{transform:translateY(-3px);opacity:1}}</style>`;
  svg += mkDefs(id, skin, arm, acc, glow);

  // Wings (behind body, tier 4+)
  if (tier.wings) svg += mkWings(55, 55, arm, acc, 0.6 + modelLv*0.03);

  // Legs
  svg += `<rect x="40" y="108" width="12" height="55" rx="3" fill="${skin}"/><rect x="58" y="108" width="12" height="55" rx="3" fill="${skin}"/>`;
  if (modelLv>=2) { svg += `<rect x="39" y="120" width="14" height="35" rx="2" fill="url(#ag_${id})" stroke="${acc}" stroke-width="0.3"/><rect x="57" y="120" width="14" height="35" rx="2" fill="url(#ag_${id})" stroke="${acc}" stroke-width="0.3"/>`; }

  // Boots
  svg += `<rect x="38" y="160" width="16" height="12" rx="3" fill="${darken(arm,0.3)}"/><rect x="56" y="160" width="16" height="12" rx="3" fill="${darken(arm,0.3)}"/>`;
  if (modelLv>=4) { svg += `<rect x="38" y="160" width="16" height="4" rx="1" fill="${acc}" opacity="0.4"/><rect x="56" y="160" width="16" height="4" rx="1" fill="${acc}" opacity="0.4"/>`; }

  // Torso
  svg += `<rect x="33" y="48" width="44" height="60" rx="5" fill="${skin}"/>`;
  svg += `<path d="M33,53 L55,45 L77,53 L77,100 Q55,108 33,100Z" fill="url(#ag_${id})" stroke="${acc}" stroke-width="0.5"/>`;
  svg += `<line x1="55" y1="52" x2="55" y2="95" stroke="${acc}" stroke-width="0.5" opacity="0.4"/>`;
  svg += `<circle cx="55" cy="68" r="3.5" fill="${gem}" filter="url(#gf_${id})"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/></circle>`;

  // Tabard (lv>=5)
  if (modelLv>=5) svg += `<path d="M44,100 L44,130 Q55,135 66,130 L66,100" fill="${arm}cc" stroke="${acc}" stroke-width="0.5"/>`;

  // Belt
  svg += `<rect x="33" y="100" width="44" height="6" rx="2" fill="${darken(arm,0.3)}"/><rect x="51" y="100" width="8" height="6" rx="1" fill="${acc}"/>`;

  // Pauldrons (lv>=3)
  if (modelLv>=3) {
    svg += `<ellipse cx="29" cy="50" rx="10" ry="8" fill="url(#ag_${id})" stroke="${acc}" stroke-width="0.5"/>`;
    svg += `<ellipse cx="81" cy="50" rx="10" ry="8" fill="url(#ag_${id})" stroke="${acc}" stroke-width="0.5"/>`;
    if (modelLv>=6) { svg += `<circle cx="29" cy="50" r="2" fill="${gem}" opacity="0.6"/><circle cx="81" cy="50" r="2" fill="${gem}" opacity="0.6"/>`; }
  }

  // Arms
  svg += `<rect x="20" y="52" width="13" height="50" rx="4" fill="${skin}"/><rect x="77" y="52" width="13" height="50" rx="4" fill="${skin}"/>`;
  if (modelLv>=2) { svg += `<rect x="20" y="55" width="13" height="35" rx="3" fill="url(#ag_${id})" stroke="${acc}" stroke-width="0.3"/><rect x="77" y="55" width="13" height="35" rx="3" fill="url(#ag_${id})" stroke="${acc}" stroke-width="0.3"/>`; }
  // Fists
  svg += `<ellipse cx="26" cy="106" rx="6" ry="5" fill="${skin}"/><ellipse cx="84" cy="106" rx="6" ry="5" fill="${skin}"/>`;

  // Head
  const headFn = HEAD_FNS[raceId] || headHuman;
  svg += headFn(55, 30, modelLv, tier, id, acc, skin);

  // Runes (tier 3+)
  if (tier.runes) svg += mkRunes(30, 80, 50, 20, acc, 4);

  // Particles (tier 5)
  if (tier.particles) svg += mkParticles(55, 75, acc, 6);

  // Weapon
  const wepFn = WEP_FNS[weaponId] || WEP_FNS.sword;
  svg += wepFn(modelLv, acc, gem, id);

  svg += '</svg>';
  return svg;
}

// ── Image Cache ──
const _imgCache = {};

function getCharImg(raceId, modelLv, weaponId, colorOvr) {
  const key = `${raceId}_${modelLv}_${weaponId}_${JSON.stringify(colorOvr||{})}`;
  if (_imgCache[key] && _imgCache[key].complete) return _imgCache[key];
  const svg = renderCharacter(raceId, modelLv, weaponId, colorOvr);
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.src = url;
  _imgCache[key] = img;
  return img;
}

function clearImgCache() {
  Object.keys(_imgCache).forEach(k => { try { URL.revokeObjectURL(_imgCache[k].src); } catch(e){} delete _imgCache[k]; });
}

function computeDerived(stats, equip, raceId) {
  const s = {...stats};
  // Apply item bonuses
  EQUIP_SLOTS.forEach(slot => {
    const it = equip[slot];
    if (it && it.bonuses) Object.entries(it.bonuses).forEach(([k,v])=>{ s[k]=(s[k]||0)+v; });
  });
  // Apply armor set bonuses
  const setCounts = {};
  EQUIP_SLOTS.forEach(sl => {
    const it = equip[sl];
    if(it && it.setId) setCounts[it.setId] = (setCounts[it.setId]||0) + 1;
  });
  Object.entries(setCounts).forEach(([setId, count]) => {
    const set = ARMOR_SETS.find(a=>a.id===setId);
    if(!set) return;
    [2,4,6].forEach(n => {
      if(count >= n && set.bonuses[n]) {
        Object.entries(set.bonuses[n]).forEach(([k,v]) => { s[k]=(s[k]||0)+v; });
      }
    });
  });
  const maxHp = 50 + s.VIT * 8;
  const maxSta = 30 + s.STA * 5;
  const maxMana = 20 + s.MAG * 6;
  const meleeMult = 1 + s.STR*0.02 + s.ATK*0.03;
  let dodge = s.AGI * 0.015;
  const crit = Math.min(s.ATK*0.005, 0.3);
  const block = equip.shield ? Math.min(0.1+s.DEF*0.01, 0.4) : 0;
  const dr = s.DEF * 0.01;
  const flatDR = s.DEF;
  const pri = 10 + s.AGI * 0.5;
  const spellMult = 1 + s.MAG*0.025;
  const hpRegen = s.VIT*0.5;
  const staRegen = 3 + s.STA;
  const manaRegen = 2 + s.MAG*0.5;
  const discount = Math.min(s.CHA*0.01, 0.3);
  const taunt = s.CHA*0.03;
  const race = RACES.find(r=>r.id===raceId);
  if (race && race.passive==='dodgeBonus') dodge += 0.2;
  dodge = Math.min(dodge, 0.5);
  return { maxHp,maxSta,maxMana,meleeMult,dodge,crit,block,dr,flatDR,pri,spellMult,hpRegen,staRegen,manaRegen,discount,taunt };
}

function xpForLv(lv) { return Math.floor(100*Math.pow(1.25,lv-1)); }

function getModelLv(equip) {
  let tot=0, n=0;
  EQUIP_SLOTS.forEach(sl=>{ if(equip[sl]){tot+=equip[sl].tier;n++;} });
  return n===0 ? 1 : ITEM_TIERS[Math.min(Math.round(tot/n),4)].modelLv;
}

function recalcPlayer() {
  const d = computeDerived(player.stats, player.equipment, player.race);
  player.maxHp=d.maxHp; player.maxStamina=d.maxSta; player.maxMana=d.maxMana;
  if(player.hp>player.maxHp) player.hp=player.maxHp;
  if(player.stamina>player.maxStamina) player.stamina=player.maxStamina;
  if(player.mana>player.maxMana) player.mana=player.maxMana;
}

function initPlayerStats(raceId) {
  const race = RACES.find(r=>r.id===raceId);
  STAT_NAMES.forEach(s=>{ player.stats[s]=5; });
  if(race) Object.entries(race.bonus).forEach(([k,v])=>{ player.stats[k]+=v; });
  recalcPlayer();
  player.hp=player.maxHp; player.stamina=player.maxStamina; player.mana=player.maxMana;
}

function genItem(slot, tier, plvl) {
  const td = ITEM_TIERS[tier];
  const lv = Math.max(1, plvl + Math.floor(Math.random()*5)-2);
  const pres = ITEM_PRE[slot]||['Item'];
  const pre = pres[Math.floor(Math.random()*pres.length)];
  const suf = tier>=2 ? ITEM_SUF[Math.floor(Math.random()*ITEM_SUF.length)] : '';
  const item = {
    id:nextItemId++, name:pre+(suf?' '+suf:''), slot, tier, level:lv,
    defense:0, damage:0, bonuses:{},
    value:Math.floor((10+lv*5)*td.mult*(1+tier*0.3)),
  };
  if(slot!=='weapon') item.defense=Math.floor((2+lv*1.5)*td.mult);
  if(slot==='weapon') {
    const wt=WEAPON_TYPES[Math.floor(Math.random()*WEAPON_TYPES.length)];
    item.weaponType=wt.id; item.damage=Math.floor(wt.baseDmg*(1+lv*0.15)*td.mult);
    item.range=[...wt.range]; item.category=wt.category;
  }
  const nb=Math.min(tier+1,3);
  const avail=[...STAT_NAMES];
  for(let i=0;i<nb;i++){
    if(!avail.length)break;
    const idx=Math.floor(Math.random()*avail.length);
    const st=avail.splice(idx,1)[0];
    item.bonuses[st]=Math.floor((1+lv*0.3+tier*0.5)*(0.8+Math.random()*0.4));
  }
  return item;
}

function genShopItems(arena, plvl) {
  const count=8+arena*3;
  const items=[];
  // Guarantee at least one item per slot
  EQUIP_SLOTS.forEach(slot => {
    const r=Math.random();
    let tier=r<0.40?Math.max(0,arena-1):r<0.70?arena:r<0.90?Math.min(arena+1,4):Math.min(arena+2,4);
    tier=Math.max(0,Math.min(tier,4));
    items.push(genItem(slot,tier,plvl));
  });
  // Fill remaining with random items, biased toward current arena tier
  for(let i=items.length;i<count;i++){
    const r=Math.random();
    let tier=r<0.30?Math.max(0,arena-1):r<0.55?arena:r<0.80?Math.min(arena+1,4):Math.min(arena+2,4);
    tier=Math.max(0,Math.min(tier,4));
    const slot=EQUIP_SLOTS[Math.floor(Math.random()*EQUIP_SLOTS.length)];
    const item=genItem(slot,tier,plvl);
    // Chance to be an armor set piece
    if(Math.random()<0.25 && arena>=1) {
      const setIdx=Math.floor(Math.random()*ARMOR_SETS.length);
      item.setId=ARMOR_SETS[setIdx].id;
      item.name=ARMOR_SETS[setIdx].name.split(' ')[0]+' '+item.name;
    }
    items.push(item);
  }
  return items;
}

function itemStatText(item) {
  let parts=[];
  if(item.damage) parts.push(`DMG ${item.damage}`);
  if(item.defense) parts.push(`DEF ${item.defense}`);
  Object.entries(item.bonuses).forEach(([k,v])=> parts.push(`${k}+${v}`));
  return parts.join(', ');
}

function genEnemyName() { return N_PRE[Math.floor(Math.random()*N_PRE.length)]+' '+N_SUF[Math.floor(Math.random()*N_SUF.length)]; }

const ENEMY_TITLES = ['Pit Fighter','Arena Slave','Mercenary','Gladiator','War Veteran','Sellsword','Condemned','Challenger','Berserker','Duelist'];
const ENEMY_FLAVOR = ['A scarred veteran of countless bouts.','Eyes full of rage and desperation.','Moves with practiced precision.','Covered in old battle wounds.','A wild fighter with nothing to lose.','Calm and calculating — dangerous.'];

function genEnemy(arena, fight, plvl) {
  const baseLv=Math.max(1, plvl-2+fight);
  const lv=Math.floor(baseLv*(0.9+Math.random()*0.2));
  const race=RACES[Math.floor(Math.random()*RACES.length)];
  const dm=DIFFS[difficulty].statMult;
  const stats={};
  STAT_NAMES.forEach(s=>{ stats[s]=Math.floor((3+lv*0.8+Math.random()*3)*dm); });
  const spec=STAT_NAMES[Math.floor(Math.random()*STAT_NAMES.length)];
  stats[spec]=Math.floor(stats[spec]*1.4);
  const wt=WEAPON_TYPES[Math.floor(Math.random()*WEAPON_TYPES.length)];
  const d=computeDerived(stats,{head:null,shoulders:null,chest:null,arms:null,legs:null,shield:null,weapon:null},race.id);
  const hasShield = arena >= 2 && Math.random() < 0.3;
  return {
    name:genEnemyName(), race:race.id, level:lv, stats,
    hp:Math.floor(d.maxHp*dm), maxHp:Math.floor(d.maxHp*dm),
    stamina:d.maxSta, maxStamina:d.maxSta, mana:d.maxMana, maxMana:d.maxMana,
    weapon:wt.id, behavior:['aggressive','balanced','defensive'][Math.floor(Math.random()*3)],
    abilities:[], statusFx:[], voidArmor:0, isChampion:false, championData:null,
    equipTier:Math.min(arena,4), undyingUsed:false, phase2:false,
    title:ENEMY_TITLES[Math.floor(Math.random()*ENEMY_TITLES.length)],
    flavor:ENEMY_FLAVOR[Math.floor(Math.random()*ENEMY_FLAVOR.length)],
    hasShield,
  };
}

function genChampion(ai) {
  const c=CHAMPIONS[ai];
  const dm=DIFFS[difficulty].statMult;
  const stats={};
  STAT_NAMES.forEach(s=>{ stats[s]=Math.floor((c.stats[s]||5)*dm); });
  const d=computeDerived(stats,{head:null,shoulders:null,chest:null,arms:null,legs:null,shield:null,weapon:null},c.race);
  return {
    name:c.name, race:c.race, level:c.level, stats,
    hp:Math.floor(d.maxHp*c.hpMult*dm), maxHp:Math.floor(d.maxHp*c.hpMult*dm),
    stamina:d.maxSta, maxStamina:d.maxSta, mana:d.maxMana, maxMana:d.maxMana,
    weapon:c.weapon, behavior:c.behavior,
    abilities:c.abilities.map(a=>({...a,current:0})),
    statusFx:[], voidArmor:0, isChampion:true, championData:c,
    equipTier:c.tier, undyingUsed:false, phase2:false,
  };
}

// ── Bounty Boss Generation ──
function genBountyBoss(idx) {
  const b = BOUNTY_BOSSES[idx];
  const dm = DIFFS[difficulty].statMult;
  const stats = {};
  STAT_NAMES.forEach(s => { stats[s] = Math.floor((b.stats[s]||5)*dm); });
  const d = computeDerived(stats, emptyEquip(), b.race);
  return {
    name:b.name, race:b.race, level:b.level, stats,
    hp:Math.floor(d.maxHp*b.hpMult*dm), maxHp:Math.floor(d.maxHp*b.hpMult*dm),
    stamina:d.maxSta, maxStamina:d.maxSta, mana:d.maxMana, maxMana:d.maxMana,
    weapon:b.weapon, behavior:b.behavior,
    abilities:b.abilities.map(a=>({...a,current:0})),
    statusFx:[], voidArmor:0, isChampion:true, championData:b,
    equipTier:b.bountyTier, undyingUsed:false, phase2:false,
    isBounty:true, bountyIdx:idx, bountyArena:b.arena,
  };
}

function startBountyCombat(idx) {
  const enemy = genBountyBoss(idx);
  combat.bountyArena = enemy.bountyArena;
  // Use consumables
  playerConsumables.forEach(c => {
    if(c.effect==='healPct') { player.hp = Math.min(player.maxHp, player.hp + Math.floor(player.maxHp*c.value)); }
    else if(c.effect==='staPct') { player.stamina = Math.min(player.maxStamina, player.stamina + Math.floor(player.maxStamina*c.value)); }
    else if(c.effect==='buff') { player.statusFx.push({id:c.status, turns:c.turns}); }
    else if(c.effect==='ward') { player.voidArmor += c.value; }
  });
  playerConsumables = [];
  saveGame();
  startCombat(enemy);
}

const SAVE_KEY='blade-of-ruin-save';
const SAVE_VER=2;

function saveGame() {
  const d={
    v:SAVE_VER, player:{
      name:player.name,race:player.race,level:player.level,xp:player.xp,
      stats:{...player.stats}, hp:player.hp,maxHp:player.maxHp,
      stamina:player.stamina,maxStamina:player.maxStamina,
      mana:player.mana,maxMana:player.maxMana, gold:player.gold,
      equipment:{...player.equipment}, inventory:[...player.inventory],
      spellCooldowns:{...player.spellCooldowns}, resUsed:player.resUsed,
    },
    progression:{...progression}, difficulty, nextItemId,
    consumables:[...playerConsumables],
  };
  localStorage.setItem(SAVE_KEY,JSON.stringify(d));
}

function loadGame() {
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw) return false;
  try {
    const d=JSON.parse(raw);
    // Migrate v1 → v2: 5 arenas → 4, reset champs, add new fields
    if(d.v===1) {
      d.v=2;
      if(d.progression) {
        if(d.progression.arena>=4) d.progression.arena=3;
        d.progression.champsDefeated=[];
        d.progression.bountiesCompleted=[];
      }
      d.consumables=[];
    }
    if(d.v!==SAVE_VER) return false;
    const p=d.player;
    player.name=p.name; player.race=p.race; player.level=p.level; player.xp=p.xp;
    player.stats=p.stats; player.hp=p.hp; player.maxHp=p.maxHp;
    player.stamina=p.stamina; player.maxStamina=p.maxStamina;
    player.mana=p.mana; player.maxMana=p.maxMana; player.gold=p.gold;
    player.equipment=p.equipment; player.inventory=p.inventory||[];
    player.spellCooldowns=p.spellCooldowns||{}; player.resUsed=p.resUsed||false;
    player.voidArmor=0; player.statusFx=[];
    progression=d.progression;
    progression.bountiesCompleted=progression.bountiesCompleted||[];
    difficulty=d.difficulty||0; nextItemId=d.nextItemId||100;
    playerConsumables=d.consumables||[];
    return true;
  } catch(e){ return false; }
}

function exportSave() {
  saveGame();
  const blob=new Blob([localStorage.getItem(SAVE_KEY)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`blade-of-ruin-${player.name}-lv${player.level}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importSave(file) {
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d.v!==SAVE_VER&&d.v!==1){alert('Invalid save');return;}
      localStorage.setItem(SAVE_KEY,r.result);
      if(loadGame()){recalcPlayer();changeState(ST.TOWN);}
    }catch(e){alert('Invalid file');}
  };
  r.readAsText(file);
}

function hasSave(){ return !!localStorage.getItem(SAVE_KEY); }

// ── Audio System ──
const Snd = (() => {
  let ctx;
  function c() { if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)(); return ctx; }
  function noise(dur, vol, fq) {
    const x=c(), buf=x.createBuffer(1,x.sampleRate*dur,x.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const src=x.createBufferSource(); src.buffer=buf;
    const g=x.createGain(); g.gain.setValueAtTime(vol||0.3,x.currentTime); g.gain.exponentialRampToValueAtTime(0.001,x.currentTime+dur);
    if(fq){const f=x.createBiquadFilter();f.type='bandpass';f.frequency.value=fq;f.Q.value=1.5;src.connect(f);f.connect(g);}else src.connect(g);
    g.connect(x.destination); src.start(); src.stop(x.currentTime+dur);
  }
  function tone(fq, dur, type, vol, fqEnd) {
    const x=c(), o=x.createOscillator(); o.type=type||'sine';
    o.frequency.setValueAtTime(fq,x.currentTime);
    if(fqEnd) o.frequency.exponentialRampToValueAtTime(Math.max(fqEnd,20),x.currentTime+dur);
    const g=x.createGain(); g.gain.setValueAtTime(vol||0.2,x.currentTime); g.gain.exponentialRampToValueAtTime(0.001,x.currentTime+dur);
    o.connect(g); g.connect(x.destination); o.start(); o.stop(x.currentTime+dur);
  }
  return {
    swordHit(){ noise(0.08,0.25,2000); tone(2200,0.06,'square',0.1); },
    heavyHit(){ noise(0.12,0.3); tone(120,0.15,'sawtooth',0.2); tone(80,0.2,'sine',0.15); },
    magicCast(){ tone(440,0.12,'triangle',0.15); setTimeout(()=>tone(660,0.12,'triangle',0.12),100); setTimeout(()=>tone(880,0.12,'triangle',0.1),200); },
    dodge(){ noise(0.1,0.15,300); },
    block(){ tone(800,0.05,'square',0.15); setTimeout(()=>tone(1600,0.05,'square',0.12),40); },
    death(){ tone(200,0.8,'sawtooth',0.15,60); },
    levelUp(){ tone(523,0.15,'triangle',0.15); setTimeout(()=>tone(659,0.15,'triangle',0.13),120); setTimeout(()=>tone(784,0.15,'triangle',0.12),240); setTimeout(()=>tone(1047,0.2,'triangle',0.14),360); },
    gold(){ tone(1047,0.06,'sine',0.12); setTimeout(()=>tone(1319,0.06,'sine',0.1),50); },
    champIntro(){ tone(130,0.8,'triangle',0.1); tone(164,0.8,'triangle',0.08); tone(196,0.8,'triangle',0.08); },
    click(){ tone(600,0.04,'square',0.08); },
    heal(){ tone(400,0.25,'sine',0.12,800); },
  };
})();

// ── Animation State ──
let anims = [];
let shakeX = 0, shakeY = 0, shakePow = 0;
let combatParts = [];
let floats = [];
let playerAnimOff = { x:0, y:0, opacity:1 };
let enemyAnimOff = { x:0, y:0, opacity:1 };

let shakeDirX = 0, shakeDirY = 0;
function triggerShake(pow, dirX, dirY) {
  shakePow = pow;
  shakeDirX = dirX || 0; shakeDirY = dirY || 0;
}
function updateShake() {
  if (shakePow > 0.5) {
    const dirBias = 0.6;
    shakeX = ((Math.random()-0.5)*(1-dirBias) + shakeDirX*dirBias) * shakePow;
    shakeY = ((Math.random()-0.5)*(1-dirBias) + shakeDirY*dirBias) * shakePow;
    shakePow *= shakePow > 8 ? 0.88 : 0.82;
  } else { shakeX=0; shakeY=0; shakePow=0; }
}

// ── Particle types: circle, spark, debris, ring, trail ──
const PART_CAP = 120;
function spawnParts(x, y, color, count, spread, type) {
  const n = count || 20;
  const sp = spread || 8;
  const t = type || 'circle';
  for (let i = 0; i < n && combatParts.length < PART_CAP; i++) {
    combatParts.push({
      x, y,
      vx: (Math.random()-0.5) * sp,
      vy: (Math.random()-0.5) * sp - 2,
      life: 1, decay: 0.015 + Math.random() * 0.02,
      color, size: 3 + Math.random() * 7,
      type: t,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random()-0.5) * 0.2,
    });
  }
}

function updateParts() {
  combatParts = combatParts.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += (p.type === 'ring' ? 0 : 0.08);
    p.life -= p.decay;
    p.rot += (p.rotV || 0);
    p.size *= (p.type === 'ring' ? 1.04 : 0.995);
    return p.life > 0;
  });
}

function drawParts(ctx) {
  combatParts.forEach(p => {
    ctx.globalAlpha = p.life * 0.9;
    ctx.fillStyle = p.color;
    ctx.save();
    if (p.type === 'spark') {
      // Elongated rotating rectangle
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.shadowColor = p.color; ctx.shadowBlur = 6;
      ctx.fillRect(-p.size*1.5, -1, p.size*3, 2);
      ctx.shadowBlur = 0;
    } else if (p.type === 'debris') {
      // Angular polygon
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.moveTo(-p.size*0.5, -p.size*0.6);
      ctx.lineTo(p.size*0.5, -p.size*0.3);
      ctx.lineTo(p.size*0.4, p.size*0.5);
      ctx.lineTo(-p.size*0.3, p.size*0.4);
      ctx.fill();
    } else if (p.type === 'ring') {
      // Expanding circle outline
      ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.shadowColor = p.color; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
    } else if (p.type === 'trail') {
      // Fading line
      ctx.strokeStyle = p.color; ctx.lineWidth = p.size * 0.5;
      ctx.shadowColor = p.color; ctx.shadowBlur = 4;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx*3, p.y - p.vy*3); ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      // Circle with glow
      ctx.shadowColor = p.color; ctx.shadowBlur = p.size > 5 ? 8 : 4;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

// ── Slash Trail VFX ──
let slashTrails = [];
function spawnSlashTrail(fromX, fromY, toX, toY, color) {
  slashTrails.push({
    fromX, fromY, toX, toY, color,
    life: 1, decay: 0.04,
  });
}
function drawSlashTrails(ctx) {
  slashTrails = slashTrails.filter(s => {
    s.life -= s.decay;
    return s.life > 0;
  });
  slashTrails.forEach(s => {
    ctx.save();
    // Wide dim outer stroke
    ctx.globalAlpha = s.life * 0.3;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 12;
    ctx.shadowColor = s.color; ctx.shadowBlur = 20;
    ctx.lineCap = 'round';
    const midX = (s.fromX + s.toX) / 2 + (s.toY - s.fromY) * 0.3 * s.life;
    const midY = (s.fromY + s.toY) / 2 - Math.abs(s.toX - s.fromX) * 0.2 * s.life;
    ctx.beginPath(); ctx.moveTo(s.fromX, s.fromY);
    ctx.quadraticCurveTo(midX, midY, s.toX, s.toY); ctx.stroke();
    // Narrow bright core
    ctx.globalAlpha = s.life * 0.8;
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#fff';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(s.fromX, s.fromY);
    ctx.quadraticCurveTo(midX, midY, s.toX, s.toY); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

// ── Impact Flash VFX ──
let impactFlashes = [];
function spawnImpactFlash(x, y, color, size) {
  impactFlashes.push({ x, y, color, size: size || 40, life: 1, decay: 0.05 });
}
function drawImpactFlashes(ctx) {
  impactFlashes = impactFlashes.filter(f => {
    f.life -= f.decay;
    return f.life > 0;
  });
  impactFlashes.forEach(f => {
    ctx.save();
    const r = f.size * (1 - f.life * 0.5);
    // Outer glow
    ctx.globalAlpha = f.life * 0.15;
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color; ctx.shadowBlur = 25;
    ctx.beginPath(); ctx.arc(f.x, f.y, r * 1.5, 0, Math.PI*2); ctx.fill();
    // Mid ring
    ctx.globalAlpha = f.life * 0.4;
    ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
    // Bright core
    ctx.globalAlpha = f.life * 0.9;
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(f.x, f.y, r * 0.3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

// ── Screen Flash System ──
let screenFlash = null;
function triggerScreenFlash(color, duration) {
  screenFlash = { color, life: 1, decay: 1 / (duration || 15) };
}
function drawScreenFlash(ctx, w, h) {
  if (!screenFlash) return;
  screenFlash.life -= screenFlash.decay;
  if (screenFlash.life <= 0) { screenFlash = null; return; }
  ctx.save();
  ctx.globalAlpha = screenFlash.life * 0.2;
  ctx.fillStyle = screenFlash.color;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// ── Status Effect Ambient Particles ──
function spawnStatusParticles(x, y, charH, statuses) {
  if (!statuses || combatParts.length >= PART_CAP - 5) return;
  const now = Date.now();
  if (now % 6 !== 0) return; // Throttle: ~1 per 6 frames
  if (statuses.burning) {
    combatParts.push({ x: x + (Math.random()-0.5)*30, y: y + charH*0.3 + Math.random()*charH*0.4,
      vx: (Math.random()-0.5)*1.5, vy: -1.5 - Math.random()*2, life: 0.8, decay: 0.03,
      color: '#ff6600', size: 2+Math.random()*3, type: 'spark', rot: Math.random()*6.28, rotV: 0.1 });
  }
  if (statuses.frozen) {
    combatParts.push({ x: x + (Math.random()-0.5)*30, y: y + charH*0.2 + Math.random()*charH*0.5,
      vx: (Math.random()-0.5)*0.8, vy: -0.5 - Math.random(), life: 0.9, decay: 0.025,
      color: '#88ddff', size: 3+Math.random()*3, type: 'debris', rot: Math.random()*6.28, rotV: 0.05 });
  }
  if (statuses.poisoned) {
    combatParts.push({ x: x + (Math.random()-0.5)*25, y: y + charH*0.4 + Math.random()*charH*0.3,
      vx: (Math.random()-0.5)*1, vy: -1 - Math.random()*1.5, life: 0.7, decay: 0.02,
      color: '#44ff44', size: 2+Math.random()*4, type: 'trail', rot: 0, rotV: 0 });
  }
}

function showFloat(text, x, y, color, big) {
  const el = document.createElement('div');
  el.className = 'dmg-float' + (big ? ' crit' : '');
  el.style.cssText = `left:${x}px;top:${y}px;font-size:${big?'clamp(24px,4dvh,36px)':'clamp(16px,2.5dvh,22px)'};color:${color}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ── Damage Calculation ──
function emptyEquip() { return {head:null,shoulders:null,chest:null,arms:null,legs:null,shield:null,weapon:null}; }

// ── 2d10 Roll System ──
// Roll 2d10 (range 2-20). Stat bonuses shift tier thresholds.
// Tiers: MISS → GRAZE → HIT → STRONG → CRIT
const ROLL_TIERS = [
  { id:'miss',   label:'Miss',   color:'#666666', mult:0,    icon:'💨' },
  { id:'graze',  label:'Graze',  color:'#ff8844', mult:0.4,  icon:'🔸' },
  { id:'hit',    label:'Hit',    color:'#ffff44', mult:1.0,  icon:'⚔️' },
  { id:'strong', label:'Strong', color:'#44ff44', mult:1.5,  icon:'💪' },
  { id:'crit',   label:'CRIT!',  color:'#ff4444', mult:2.2,  icon:'💥' },
];

function roll2d10() { return Math.floor(Math.random()*10)+1 + Math.floor(Math.random()*10)+1; }

// Calculate tier thresholds for an attacker vs defender
function getRollThresholds(attacker, defender, mult, isSpell) {
  const isP = attacker===player;
  const atkD = computeDerived(attacker.stats, isP?player.equipment:emptyEquip(), attacker.race||player.race);
  const defD = computeDerived(defender.stats, defender===player?player.equipment:emptyEquip(), defender.race||player.race);
  // Base thresholds (on 2d10 scale 2-20)
  // Higher stats lower miss threshold and raise crit threshold
  const atkBonus = (isSpell ? atkD.spellMult - 1 : atkD.meleeMult - 1) * 6; // 0-6 range
  const defPen = defD.dodge * 4; // 0-2 penalty from enemy dodge
  const shift = Math.floor(atkBonus - defPen);
  // Thresholds: roll >= threshold for that tier
  // Default: miss <7, graze 7-10, hit 11-14, strong 15-17, crit 18+
  return {
    graze:  Math.max(3, 7 - shift),
    hit:    Math.max(5, 11 - shift),
    strong: Math.max(8, 15 - shift),
    crit:   Math.max(11, 18 - shift),
  };
}

function getTierForRoll(roll, thresholds) {
  if (roll >= thresholds.crit)   return 4; // CRIT
  if (roll >= thresholds.strong) return 3; // STRONG
  if (roll >= thresholds.hit)    return 2; // HIT
  if (roll >= thresholds.graze)  return 1; // GRAZE
  return 0; // MISS
}

// Preview damage range for an action (for HUD display)
function previewDamageRange(attacker, defender, atkMult, isSpell, spell) {
  const isP = attacker===player;
  const atkD = computeDerived(attacker.stats, isP?player.equipment:emptyEquip(), attacker.race||player.race);
  let base;
  if (isSpell && spell) {
    base = spell.base + (attacker.stats.MAG||0) * spell.scale;
    base *= atkD.spellMult;
    if (isP && player.race==='highelf') base *= 1.15;
  } else {
    const wep = isP ? player.equipment.weapon : null;
    base = wep ? wep.damage : (WEAPON_TYPES.find(w=>w.id===(isP?'sword':attacker.weapon))?.baseDmg||10);
    base *= atkD.meleeMult;
  }
  base *= atkMult;
  // Status mods
  (attacker.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.dmgMod) base*=(1+e.dmgMod); });
  if (isP && player.race==='orc' && player.hp < player.maxHp*0.25) base *= 1.25;
  return {
    graze:  Math.max(1, Math.floor(base * 0.4)),
    hit:    Math.max(1, Math.floor(base * 1.0)),
    strong: Math.max(1, Math.floor(base * 1.5)),
    crit:   Math.max(1, Math.floor(base * 2.2)),
  };
}

// Calculate % chance for each tier (2d10 probability table)
function tierChances(thresholds) {
  // Probability table for 2d10 sum. P(sum=n) = (ways to make n)/100
  const ways = {2:1,3:2,4:3,5:4,6:5,7:6,8:7,9:8,10:9,11:10,12:9,13:8,14:7,15:6,16:5,17:4,18:3,19:2,20:1};
  let miss=0, graze=0, hit=0, strong=0, crit=0;
  for (let r=2; r<=20; r++) {
    const w = ways[r];
    const tier = getTierForRoll(r, thresholds);
    if (tier===0) miss+=w; else if(tier===1) graze+=w; else if(tier===2) hit+=w; else if(tier===3) strong+=w; else crit+=w;
  }
  return { miss, graze, hit, strong, crit }; // Each out of 100
}

function calcDamage(attacker, defender, mult, isSpell, spell) {
  const isP = attacker===player;
  const atkD = computeDerived(attacker.stats, isP?player.equipment:emptyEquip(), attacker.race||player.race);
  const defD = computeDerived(defender.stats, defender===player?player.equipment:emptyEquip(), defender.race||player.race);

  // Dodge check first (separate from roll)
  let dodged = false;
  if (Math.random() < defD.dodge) dodged = true;
  if (!dodged && defender!==player && combat.enemy?.isChampion && combat.enemy.championData?.passive==='elvenGrace') {
    if (Math.random() < 0.3) dodged = true;
  }
  if (dodged) return { dmg:0, dodged:true, blocked:false, crit:false, roll:0, tier:0 };

  // Roll 2d10
  const d1 = Math.floor(Math.random()*10)+1;
  const d2 = Math.floor(Math.random()*10)+1;
  const roll = d1 + d2;
  const thresholds = getRollThresholds(attacker, defender, mult, isSpell);
  const tierIdx = getTierForRoll(roll, thresholds);
  const tier = ROLL_TIERS[tierIdx];

  // Miss = no damage
  if (tierIdx === 0) return { dmg:0, dodged:false, blocked:false, crit:false, roll, tier:tierIdx, d1, d2, tierLabel:tier.label };

  let base;
  if (isSpell && spell) {
    base = spell.base + (attacker.stats.MAG||0) * spell.scale;
    base *= atkD.spellMult;
    if (isP && player.race==='highelf') base *= 1.15;
  } else {
    const wep = isP ? player.equipment.weapon : null;
    base = wep ? wep.damage : (WEAPON_TYPES.find(w=>w.id===(isP?'sword':attacker.weapon))?.baseDmg||10);
    base *= atkD.meleeMult;
  }
  base *= mult;

  // Status mods
  (attacker.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.dmgMod) base*=(1+e.dmgMod); });
  (defender.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.atkMod) base*=(1+e.atkMod); });
  if (isP && player.race==='orc' && player.hp < player.maxHp*0.25) base *= 1.25;

  // Apply tier multiplier (replaces old variance + crit)
  base *= tier.mult;
  const isCrit = tierIdx === 4;

  // Block (only on graze/hit, not strong/crit)
  let blocked = false;
  if (!isSpell && tierIdx <= 2 && Math.random() < defD.block) { base *= 0.4; blocked = true; }

  // Armor
  let dmg = base - defD.flatDR;
  dmg *= (1 - defD.dr);
  if (defender===player && player.race==='dwarf') dmg *= 0.85;
  (defender.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.drMod) dmg*=(1-e.drMod); });

  // Void armor
  if (defender.voidArmor > 0) { const ab=Math.min(defender.voidArmor, dmg); defender.voidArmor-=ab; dmg-=ab; }

  dmg = Math.max(1, Math.floor(dmg));
  return { dmg, dodged:false, blocked, crit:isCrit, roll, tier:tierIdx, d1, d2, tierLabel:tier.label };
}

// ── Apply Damage ──
function applyResult(target, result, atkName, tgtName) {
  if (result.dodged) {
    addLog(`${tgtName} dodges!`, 'move');
    Snd.dodge();
    const x = target===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
    showFloat('DODGE', x, gameCanvas.height*0.25, '#44aaff', false);
    animDodge(target===player, null);
    return;
  }
  // Miss from roll
  if (result.tier === 0) {
    addLog(`[${result.d1}+${result.d2}=${result.roll}] ${atkName} misses ${tgtName}!`, 'move');
    Snd.dodge();
    const x = target===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
    showFloat('MISS', x, gameCanvas.height*0.25, '#666', false);
    return;
  }
  target.hp = Math.max(0, target.hp - result.dmg);
  const tierTag = result.tierLabel ? `[${result.d1}+${result.d2}=${result.roll} ${result.tierLabel}] ` : '';
  const pre = result.crit ? 'CRIT! ' : result.blocked ? 'Blocked! ' : '';
  addLog(`${tierTag}${pre}${result.dmg} dmg → ${tgtName}`, result.crit ? 'crit' : 'damage');
  if (result.crit) Snd.heavyHit(); else Snd.swordHit();
  const x = target===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
  const tierColor = result.crit ? '#ff4444' : result.tier>=3 ? '#44ff44' : result.tier>=2 ? '#ffff44' : '#ff8844';
  showFloat((result.crit?'!':'')+result.dmg, x, gameCanvas.height*0.25, tierColor, result.crit||result.tier>=3);
  // Show dice roll float
  if (result.d1 !== undefined) {
    showFloat(`🎲${result.d1}+${result.d2}`, x, gameCanvas.height*0.20, ROLL_TIERS[result.tier].color, false);
  }
  spawnParts(x, gameCanvas.height*0.35, tierColor, result.crit?18:result.tier>=3?12:6, 8);
  triggerShake(result.crit ? 14 : result.tier>=3 ? 8 : 4);
}

// ── Status Tick ──
function processStatusTicks(fighter) {
  (fighter.statusFx||[]).forEach(s => {
    const e = STATUS_FX[s.id];
    if (e?.tick) {
      fighter.hp = Math.max(0, fighter.hp - e.tick);
      const name = fighter===player ? 'You' : fighter.name;
      addLog(`${name} takes ${e.tick} ${s.id} damage`, 'damage');
      const x = fighter===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
      showFloat(e.tick.toString(), x, gameCanvas.height*0.3, e.color, false);
    }
  });
  // Morath deathly chill
  if (fighter===player && combat.enemy?.isChampion && combat.enemy.championData?.name==='Wraith-Knight Morath') {
    const d = Math.floor(player.maxHp*0.02);
    player.hp = Math.max(0, player.hp-d);
    addLog(`Deathly Chill: ${d} damage`);
  }
}

// ── Combat Log ──
function addLog(msg, type) {
  combat.log.push({ text: msg, type: type || '' });
  if (combat.log.length > 30) combat.log.shift();
  updateCombatLog();
}
function updateCombatLog() {
  const el = document.getElementById('cl-entries');
  if (!el) return;
  const entries = combat.log.slice(-6);
  el.innerHTML = entries.map(e => {
    const entry = typeof e === 'string' ? { text: e, type: '' } : e;
    const cls = entry.type ? ` cl-${entry.type}` : '';
    return `<div class="cl-entry${cls}">${entry.text}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Start Combat ──
function startCombat(enemy) {
  combat.enemy = enemy;
  combat.distance = 5;
  combat.turn = 0;
  combat.animating = false;
  combat.log = [];
  player.resUsed = false;
  player.resPrepared = false;
  player.voidArmor = 0;
  player.statusFx = [];
  enemy.statusFx = [];
  enemy.voidArmor = 0;
  playerAnimOff = {x:0,y:0,opacity:1};
  enemyAnimOff = {x:0,y:0,opacity:1};

  // Demon intimidate
  if (player.race==='devil') {
    STAT_NAMES.forEach(s => { if(s==='ATK') enemy.stats[s]=Math.floor(enemy.stats[s]*0.95); });
  }

  // First turn
  const pPri = computeDerived(player.stats, player.equipment, player.race).pri;
  const ePri = computeDerived(enemy.stats, emptyEquip(), enemy.race).pri;
  combat.playerTurn = (enemy.isChampion && enemy.championData.passive==='thirdEye') ? false : (pPri >= ePri);

  changeState(ST.COMBAT);
  if (enemy.isChampion) {
    Snd.champIntro();
    showDialogue(enemy.name, enemy.championData.intro, () => beginTurn());
  } else beginTurn();
}

// ── Turn Flow ──
function beginTurn() {
  if (combat.animating) return;
  const fighter = combat.playerTurn ? player : combat.enemy;

  processStatusTicks(fighter);
  if (checkCombatEnd()) return;

  // Frozen/stunned skip
  const skip = (fighter.statusFx||[]).find(s => STATUS_FX[s.id]?.skip);
  if (skip) {
    addLog(`${fighter===player?player.name:combat.enemy.name} is ${skip.id}!`);
    endTurn();
    return;
  }

  // Passives
  if (combat.playerTurn && player.race==='revenant') {
    const h=Math.floor(player.maxHp*0.02);
    player.hp=Math.min(player.hp+h, player.maxHp);
  }
  if (!combat.playerTurn && combat.enemy.isChampion && combat.enemy.championData.passive==='darkThrone') {
    const h=Math.floor(combat.enemy.maxHp*0.03);
    combat.enemy.hp=Math.min(combat.enemy.hp+h, combat.enemy.maxHp);
    addLog(`Dark Throne heals ${combat.enemy.name} for ${h}`);
  }

  if (combat.playerTurn) {
    updateCombatHUD();
  } else {
    setTimeout(() => aiTurn(), 600);
  }
}

function endTurn() {
  const fighter = combat.playerTurn ? player : combat.enemy;
  // Decrement status durations
  fighter.statusFx = (fighter.statusFx||[]).filter(s => { s.turns--; return s.turns>0; });
  // Spell cooldowns
  if (combat.playerTurn) {
    Object.keys(player.spellCooldowns).forEach(id => { if(player.spellCooldowns[id]>0) player.spellCooldowns[id]--; });
  } else {
    (combat.enemy.abilities||[]).forEach(a => { if(a.current>0) a.current--; });
  }

  if (checkCombatEnd()) return;

  // Phase 2 check for Anurath
  const e = combat.enemy;
  if (e.isChampion && e.championData.name==='Anurath the Shadow Lord' && !e.phase2 && e.hp <= e.maxHp*0.5) {
    e.phase2 = true;
    e.stats.STR = Math.floor(e.stats.STR*1.5);
    e.stats.ATK = Math.floor(e.stats.ATK*1.5);
    addLog('Anurath enters Phase 2!');
    showDialogue(e.name, 'NOW YOU FACE TRUE DARKNESS!', () => {});
  }

  combat.playerTurn = !combat.playerTurn;
  combat.turn++;
  showTurnIndicator(combat.playerTurn);
  updateCombatHUD();
  setTimeout(() => beginTurn(), 400);
}

function checkCombatEnd() {
  // Enemy death
  if (combat.enemy.hp <= 0) {
    if (combat.enemy.isChampion && combat.enemy.championData.passive==='undying' && !combat.enemy.undyingUsed) {
      combat.enemy.hp = Math.floor(combat.enemy.maxHp*0.3);
      combat.enemy.undyingUsed = true;
      addLog(`${combat.enemy.name} refuses to die!`);
      showFloat('UNDYING!', gameCanvas.width*0.7, gameCanvas.height*0.2, '#cc44ff', true);
      return false;
    }
    combatVictory();
    return true;
  }
  // Player death
  if (player.hp <= 0) {
    if (!player.resUsed && player.resPrepared) {
      player.hp = Math.floor(player.maxHp*0.3);
      player.resUsed = true;
      player.resPrepared = false;
      addLog('RESURRECTION!');
      showFloat('RESURRECTION!', gameCanvas.width*0.3, gameCanvas.height*0.2, '#ffd740', true);
      Snd.heal();
      spawnParts(gameCanvas.width*0.3, gameCanvas.height*0.35, '#ffd740', 16, 12);
      return false;
    }
    combatDefeat();
    return true;
  }
  return false;
}

// ── Player Actions ──
function pAdvance() {
  const steps=Math.min(3, combat.distance); if(!steps)return;
  if(player.stamina<steps)return;
  player.stamina-=steps; combat.distance=Math.max(0,combat.distance-steps);
  addLog(`Advance ${steps}. Dist: ${combat.distance}`, 'move');
  animMove(true, steps, ()=>endTurn());
}
function pRetreat() {
  const steps=Math.min(3, 10-combat.distance); if(!steps)return;
  if(player.stamina<steps)return;
  player.stamina-=steps; combat.distance=Math.min(10,combat.distance+steps);
  addLog(`Retreat ${steps}. Dist: ${combat.distance}`, 'move');
  animMove(true, -steps, ()=>endTurn());
}
function pLightAtk() {
  if(player.stamina<4)return;
  if(combat.distance>1){addLog('Too far!');return;}
  player.stamina-=4;
  const r=calcDamage(player, combat.enemy, 0.7, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, false, ()=>endTurn());
}
function pHeavyAtk() {
  if(player.stamina<8)return;
  const wep=player.equipment.weapon;
  const rng=wep?wep.range:[0,2];
  if(combat.distance<rng[0]||combat.distance>rng[1]){addLog('Out of range!');return;}
  player.stamina-=8;
  const r=calcDamage(player, combat.enemy, 1.4, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, true, ()=>endTurn());
}
function pThrust() {
  if(player.stamina<6)return;
  const wep=player.equipment.weapon;
  const maxR=wep?wep.range[1]+2:3;
  if(combat.distance>maxR){addLog('Out of range!');return;}
  player.stamina-=6;
  const r=calcDamage(player, combat.enemy, 1.0, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, false, ()=>endTurn());
}
function pRanged() {
  if(player.stamina<5)return;
  if(combat.distance<3||combat.distance>8){addLog('Range 3-8!');return;}
  player.stamina-=5;
  const r=calcDamage(player, combat.enemy, 0.9, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, false, ()=>endTurn());
}
function pDefend() {
  if(player.stamina<3)return;
  player.stamina-=3;
  player.statusFx.push({id:'shielded',turns:1});
  addLog('Defensive stance!');
  animDefend(true, ()=>endTurn());
}
function pTaunt() {
  if(player.stamina<5)return;
  player.stamina-=5;
  const d=computeDerived(player.stats,player.equipment,player.race);
  if(Math.random()<d.taunt){
    combat.enemy.statusFx.push({id:'demoralized',turns:2});
    addLog('Enemy demoralized!');
  } else addLog('Taunt fails.');
  const g=Math.floor(2+Math.random()*5);
  player.gold+=g; addLog(`Crowd throws ${g} gold`);
  endTurn();
}
function pRest() {
  player.stamina=Math.min(player.stamina+Math.floor(player.maxStamina*0.5),player.maxStamina);
  player.mana=Math.min(player.mana+Math.floor(player.maxMana*0.5),player.maxMana);
  addLog('Rest — recover stamina & mana');
  endTurn();
}
function pFireBreath() {
  if(player.race!=='dragonknight') return;
  if(player.stamina<6) return;
  if(combat.distance>3){addLog('Too far for fire breath!');return;}
  player.stamina-=6;
  const dmg = Math.floor((15 + player.stats.STR*1.5) * (0.9+Math.random()*0.2));
  const defD = computeDerived(combat.enemy.stats, emptyEquip(), combat.enemy.race);
  let finalDmg = Math.max(1, Math.floor(dmg - defD.flatDR));
  combat.enemy.hp = Math.max(0, combat.enemy.hp - finalDmg);
  combat.enemy.statusFx.push({id:'burning',turns:1});
  addLog(`Fire Breath! ${finalDmg} fire damage! Enemy is burning!`);
  Snd.magicCast();
  const ex = gameCanvas.width*0.7;
  showFloat(finalDmg.toString(), ex, gameCanvas.height*0.25, '#ff6600', true);
  spawnParts(ex, gameCanvas.height*0.35, '#ff4400', 14, 10);
  spawnParts(ex, gameCanvas.height*0.30, '#ffaa00', 8, 8);
  triggerShake(8);
  animAttack(true, true, ()=>endTurn());
}
function pFlee() {
  const cost = Math.floor(player.gold * 0.5);
  player.gold -= cost;
  addLog(`You flee the arena, losing ${cost} gold!`);
  combat.enemy = null;
  saveGame();
  changeState(ST.TOWN);
}
function pCastSpell(spellId) {
  const sp=SPELLS.find(s=>s.id===spellId); if(!sp) return;
  if(player.level<sp.unlock||player.mana<sp.mana) return;
  if(player.spellCooldowns[spellId]>0) return;
  if(combat.distance<sp.range[0]||combat.distance>sp.range[1]){addLog('Out of range!');return;}
  player.mana-=sp.mana;
  player.spellCooldowns[spellId]=sp.cd;
  hideSpellMenu();
  Snd.magicCast();

  if(sp.type==='damage') {
    animSpell(true, sp, () => {
      const r=calcDamage(player, combat.enemy, 1.0, true, sp);
      applyResult(combat.enemy, r, player.name, combat.enemy.name);
      if(sp.status && !r.dodged) { combat.enemy.statusFx.push({id:sp.status,turns:sp.statusDur}); addLog(`${combat.enemy.name} is ${sp.status}!`); }
      if(sp.stunChance && Math.random()<sp.stunChance && !r.dodged) { combat.enemy.statusFx.push({id:'stunned',turns:1}); addLog('Stunned!'); }
      endTurn();
    }); return;
  } else if(sp.type==='heal') {
    const amt=Math.floor(sp.base+player.stats.MAG*sp.scale);
    player.hp=Math.min(player.hp+amt, player.maxHp);
    addLog(`Heal: +${amt} HP`, 'heal'); Snd.heal();
    showFloat('+'+amt, gameCanvas.width*0.3, gameCanvas.height*0.3, '#44ff44', false);
    endTurn();
  } else if(sp.type==='buff') {
    player.statusFx.push({id:sp.status,turns:sp.statusDur});
    addLog(`Cast ${sp.name}!`);
    endTurn();
  } else if(sp.type==='shield') {
    player.voidArmor=Math.floor(sp.base+player.stats.MAG*sp.scale);
    addLog(`Void Armor: absorb ${player.voidArmor}`);
    endTurn();
  } else if(sp.type==='revive') {
    player.resPrepared = true;
    addLog('Resurrection prepared — death will be cheated!');
    showFloat('RES READY', gameCanvas.width*0.3, gameCanvas.height*0.3, '#ffd740', false);
    endTurn();
  }
}

// ── Enemy Actions ──
function eAdvance(steps) {
  steps=Math.min(steps||2, combat.distance);
  if(!steps||combat.enemy.stamina<steps) return false;
  combat.enemy.stamina-=steps; combat.distance=Math.max(0,combat.distance-steps);
  addLog(`${combat.enemy.name} advances ${steps}`);
  animMove(false, steps, ()=>endTurn());
  return true;
}
function eRetreat(steps) {
  steps=Math.min(steps||2, 10-combat.distance);
  if(!steps||combat.enemy.stamina<steps) return false;
  combat.enemy.stamina-=steps; combat.distance=Math.min(10,combat.distance+steps);
  addLog(`${combat.enemy.name} retreats ${steps}`);
  animMove(false, -steps, ()=>endTurn());
  return true;
}
function eLightAtk() {
  if(combat.enemy.stamina<4||combat.distance>1) return false;
  combat.enemy.stamina-=4;
  const r=calcDamage(combat.enemy, player, 0.7, false);
  applyResult(player, r, combat.enemy.name, player.name);
  animAttack(false, false, ()=>endTurn());
  return true;
}
function eHeavyAtk() {
  if(combat.enemy.stamina<8) return false;
  const wt=WEAPON_TYPES.find(w=>w.id===combat.enemy.weapon);
  const rng=wt?wt.range:[0,2];
  if(combat.distance<rng[0]||combat.distance>rng[1]) return false;
  combat.enemy.stamina-=8;
  const r=calcDamage(combat.enemy, player, 1.4, false);
  applyResult(player, r, combat.enemy.name, player.name);
  animAttack(false, true, ()=>endTurn());
  return true;
}
function eDefend() {
  if(combat.enemy.stamina<3) return false;
  combat.enemy.stamina-=3;
  combat.enemy.statusFx.push({id:'shielded',turns:1});
  addLog(`${combat.enemy.name} defends`);
  animDefend(false, ()=>endTurn());
  return true;
}
function eRest() {
  combat.enemy.stamina=Math.min(combat.enemy.stamina+Math.floor(combat.enemy.maxStamina*0.5),combat.enemy.maxStamina);
  combat.enemy.mana=Math.min(combat.enemy.mana+Math.floor(combat.enemy.maxMana*0.5),combat.enemy.maxMana);
  addLog(`${combat.enemy.name} rests`);
  endTurn();
  return true;
}

// ── AI System ──
function aiTurn() {
  if(combat.animating) return;
  const e=combat.enemy;

  // Try champion abilities first
  if(e.isChampion) {
    for(const ab of e.abilities) {
      if(ab.current<=0 && useChampAbility(ab)) return;
    }
  }

  const hpPct=e.hp/e.maxHp;
  const staPct=e.stamina/e.maxStamina;
  const dist=combat.distance;

  // Rest if very low stamina
  if(staPct<0.2) { eRest(); return; }

  switch(e.behavior) {
    case 'aggressive':
      if(dist>1) { if(!eAdvance(Math.min(3,dist))) eRest(); }
      else if(e.stamina>=8 && Math.random()<0.6) { if(!eHeavyAtk()) eLightAtk() || eRest(); }
      else { if(!eLightAtk()) eRest(); }
      break;
    case 'defensive':
      if(hpPct<0.3 && dist<3) { if(!eRetreat(2)) eDefend() || eRest(); }
      else if(dist<=1 && Math.random()<0.4) { if(!eDefend()) eLightAtk() || eRest(); }
      else if(dist>2) { if(e.stamina>=8 && Math.random()<0.5) { if(!eHeavyAtk()) eAdvance(2) || eRest(); } else eAdvance(2) || eRest(); }
      else { if(!eLightAtk()) eAdvance(1) || eRest(); }
      break;
    case 'methodical':
      if(dist>2) { eAdvance(2) || eRest(); }
      else if(e.stamina>=8 && Math.random()<0.7) { if(!eHeavyAtk()) eLightAtk() || eRest(); }
      else if(Math.random()<0.3) { eDefend() || eRest(); }
      else { eLightAtk() || eRest(); }
      break;
    case 'adaptive':
      if(hpPct>0.6) { // Aggressive phase
        if(dist>1) eAdvance(2) || eRest();
        else if(e.stamina>=8) eHeavyAtk() || eLightAtk() || eRest();
        else eLightAtk() || eRest();
      } else { // Defensive phase
        if(Math.random()<0.3) eDefend() || eRest();
        else if(dist<=1) { if(e.stamina>=8) eHeavyAtk() || eLightAtk() || eRest(); else eLightAtk() || eRest(); }
        else eAdvance(1) || eRest();
      }
      break;
    default: // balanced
      if(dist>2) { eAdvance(2) || eRest(); }
      else if(dist<=1 && e.stamina>=8 && Math.random()<0.5) { eHeavyAtk() || eLightAtk() || eRest(); }
      else if(dist<=1) { eLightAtk() || eRest(); }
      else if(Math.random()<0.3) { eDefend() || eRest(); }
      else { eAdvance(1) || eRest(); }
  }
}

// ── Combat Result ──
function combatVictory() {
  Snd.levelUp();
  animDeath(false, null);
  const e=combat.enemy;

  // Bounty boss rewards
  if(e.isBounty) {
    const b = BOUNTY_BOSSES[e.bountyIdx];
    const goldE = Math.floor(b.bountyGold * DIFFS[difficulty].goldMult);
    const xpE = Math.floor(b.bountyXp * (player.race==='human'?1.1:1));
    player.gold += goldE; player.xp += xpE;
    if(!progression.bountiesCompleted.includes(e.bountyIdx)) {
      progression.bountiesCompleted.push(e.bountyIdx);
    }
    const petals = 3;
    data.earnPetals(petals);
    data.submitScore(GAME_ID, player.level*100+progression.arena*500);
    let leveled=false;
    while(player.xp>=xpForLv(player.level)&&player.level<30) {
      player.xp-=xpForLv(player.level); player.level++; leveled=true;
    }
    recalcPlayer();
    // Guaranteed drop from bounty
    let drop = null;
    const tier = Math.min(b.bountyTier, 4);
    const slot = EQUIP_SLOTS[Math.floor(Math.random()*EQUIP_SLOTS.length)];
    drop = genItem(slot, tier, b.level);
    // Chance to be a set piece
    if(Math.random()<0.4) {
      const setIdx=Math.floor(Math.random()*ARMOR_SETS.length);
      drop.setId=ARMOR_SETS[setIdx].id;
      drop.name=ARMOR_SETS[setIdx].name.split(' ')[0]+' '+drop.name;
    }
    player.inventory.push(drop);
    player.stamina = Math.max(player.stamina, Math.floor(player.maxStamina*0.8));
    player.mana = Math.max(player.mana, Math.floor(player.maxMana*0.8));
    combat.bountyArena = null;
    saveGame();
    showPostCombat(goldE, xpE, petals, leveled, drop, e);
    return;
  }

  const goldE=Math.floor((e.isChampion?(150+e.level*12):(20+e.level*8))*DIFFS[difficulty].goldMult);
  const xpE=Math.floor((e.isChampion?(50+e.level*5):(15+e.level*3))*(player.race==='human'?1.1:1));
  player.gold+=goldE; player.xp+=xpE;
  const petals=e.isChampion?5:1;
  data.earnPetals(petals);
  data.submitScore(GAME_ID, player.level*100+progression.arena*500);

  let leveled=false;
  while(player.xp>=xpForLv(player.level)&&player.level<30) {
    player.xp-=xpForLv(player.level); player.level++; leveled=true;
  }
  recalcPlayer();

  // Refresh shop when advancing arenas
  const oldArena = progression.arena;

  // Generate drop
  let drop = null;
  if (Math.random() < (e.isChampion ? 0.8 : 0.35)) {
    let tier = Math.min(e.isChampion ? Math.min(e.equipTier+1,4) : Math.floor(Math.random()*Math.min(arena()+2,5)), 4);
    const slot = EQUIP_SLOTS[Math.floor(Math.random()*EQUIP_SLOTS.length)];
    drop = genItem(slot, tier, e.level);
    if(e.isChampion && Math.random()<0.5) {
      const setIdx=Math.floor(Math.random()*ARMOR_SETS.length);
      drop.setId=ARMOR_SETS[setIdx].id;
      drop.name=ARMOR_SETS[setIdx].name.split(' ')[0]+' '+drop.name;
    }
    player.inventory.push(drop);
  }

  // Auto-restore stamina & mana between fights
  player.stamina = Math.max(player.stamina, Math.floor(player.maxStamina*0.8));
  player.mana = Math.max(player.mana, Math.floor(player.maxMana*0.8));

  progression.fight++;
  if(e.isChampion) {
    progression.champsDefeated.push(ARENAS[progression.arena].name);
    if(progression.arena>=3 && progression.fight>=4) {
      saveGame();
      changeState(ST.VICTORY);
      return;
    }
    if(progression.arena<3) { progression.arena++; progression.fight=0; }
    // Refresh shop with better items for new arena
    shopItems = genShopItems(progression.arena, player.level);
  }

  saveGame();
  showPostCombat(goldE, xpE, petals, leveled, drop, e);
}
