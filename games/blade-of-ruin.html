// ── Damage Calculation ──
function emptyEquip() { return {head:null,shoulders:null,chest:null,arms:null,legs:null,shield:null,weapon:null}; }

// ── 2d10 Roll System ──
// Roll 2d10 (range 2-20). Stat bonuses shift tier thresholds.
// Tiers: MISS → GRAZE → HIT → STRONG → CRIT
const ROLL_TIERS = [
  { id:'miss',   label:'Miss',   color:'#666666', mult:0,    icon:'💨' },
  { id:'graze',  label:'Graze',  color:'#ff8844', mult:0.4,  icon:'🔸' },
  { id:'hit',    label:'Hit',    color:'#ffff44', mult:1.0,  icon:'⚔️' },
  { id:'strong', label:'Strong', color:'#44ff44', mult:1.5,  icon:'💪' },
  { id:'crit',   label:'CRIT!',  color:'#ff4444', mult:2.2,  icon:'💥' },
];

function roll2d10() { return Math.floor(Math.random()*10)+1 + Math.floor(Math.random()*10)+1; }

// Calculate tier thresholds for an attacker vs defender
function getRollThresholds(attacker, defender, mult, isSpell) {
  const isP = attacker===player;
  const atkD = computeDerived(attacker.stats, isP?player.equipment:emptyEquip(), attacker.race||player.race);
  const defD = computeDerived(defender.stats, defender===player?player.equipment:emptyEquip(), defender.race||player.race);
  // Base thresholds (on 2d10 scale 2-20)
  // Higher stats lower miss threshold and raise crit threshold
  const atkBonus = (isSpell ? atkD.spellMult - 1 : atkD.meleeMult - 1) * 6; // 0-6 range
  const defPen = defD.dodge * 4; // 0-2 penalty from enemy dodge
  const shift = Math.floor(atkBonus - defPen);
  // Thresholds: roll >= threshold for that tier
  // Default: miss <7, graze 7-10, hit 11-14, strong 15-17, crit 18+
  return {
    graze:  Math.max(3, 7 - shift),
    hit:    Math.max(5, 11 - shift),
    strong: Math.max(8, 15 - shift),
    crit:   Math.max(11, 18 - shift),
  };
}

function getTierForRoll(roll, thresholds) {
  if (roll >= thresholds.crit)   return 4; // CRIT
  if (roll >= thresholds.strong) return 3; // STRONG
  if (roll >= thresholds.hit)    return 2; // HIT
  if (roll >= thresholds.graze)  return 1; // GRAZE
  return 0; // MISS
}

// Preview damage range for an action (for HUD display)
function previewDamageRange(attacker, defender, atkMult, isSpell, spell) {
  const isP = attacker===player;
  const atkD = computeDerived(attacker.stats, isP?player.equipment:emptyEquip(), attacker.race||player.race);
  let base;
  if (isSpell && spell) {
    base = spell.base + (attacker.stats.MAG||0) * spell.scale;
    base *= atkD.spellMult;
    if (isP && player.race==='highelf') base *= 1.15;
  } else {
    const wep = isP ? player.equipment.weapon : null;
    base = wep ? wep.damage : (WEAPON_TYPES.find(w=>w.id===(isP?'sword':attacker.weapon))?.baseDmg||10);
    base *= atkD.meleeMult;
  }
  base *= atkMult;
  // Status mods
  (attacker.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.dmgMod) base*=(1+e.dmgMod); });
  if (isP && player.race==='orc' && player.hp < player.maxHp*0.25) base *= 1.25;
  return {
    graze:  Math.max(1, Math.floor(base * 0.4)),
    hit:    Math.max(1, Math.floor(base * 1.0)),
    strong: Math.max(1, Math.floor(base * 1.5)),
    crit:   Math.max(1, Math.floor(base * 2.2)),
  };
}

// Calculate % chance for each tier (2d10 probability table)
function tierChances(thresholds) {
  // Probability table for 2d10 sum. P(sum=n) = (ways to make n)/100
  const ways = {2:1,3:2,4:3,5:4,6:5,7:6,8:7,9:8,10:9,11:10,12:9,13:8,14:7,15:6,16:5,17:4,18:3,19:2,20:1};
  let miss=0, graze=0, hit=0, strong=0, crit=0;
  for (let r=2; r<=20; r++) {
    const w = ways[r];
    const tier = getTierForRoll(r, thresholds);
    if (tier===0) miss+=w; else if(tier===1) graze+=w; else if(tier===2) hit+=w; else if(tier===3) strong+=w; else crit+=w;
  }
  return { miss, graze, hit, strong, crit }; // Each out of 100
}

function calcDamage(attacker, defender, mult, isSpell, spell) {
  const isP = attacker===player;
  const atkD = computeDerived(attacker.stats, isP?player.equipment:emptyEquip(), attacker.race||player.race);
  const defD = computeDerived(defender.stats, defender===player?player.equipment:emptyEquip(), defender.race||player.race);

  // Dodge check first (separate from roll)
  let dodged = false;
  if (Math.random() < defD.dodge) dodged = true;
  if (!dodged && defender!==player && combat.enemy?.isChampion && combat.enemy.championData?.passive==='elvenGrace') {
    if (Math.random() < 0.3) dodged = true;
  }
  if (dodged) return { dmg:0, dodged:true, blocked:false, crit:false, roll:0, tier:0 };

  // Roll 2d10
  const d1 = Math.floor(Math.random()*10)+1;
  const d2 = Math.floor(Math.random()*10)+1;
  const roll = d1 + d2;
  const thresholds = getRollThresholds(attacker, defender, mult, isSpell);
  const tierIdx = getTierForRoll(roll, thresholds);
  const tier = ROLL_TIERS[tierIdx];

  // Miss = no damage
  if (tierIdx === 0) return { dmg:0, dodged:false, blocked:false, crit:false, roll, tier:tierIdx, d1, d2, tierLabel:tier.label };

  let base;
  if (isSpell && spell) {
    base = spell.base + (attacker.stats.MAG||0) * spell.scale;
    base *= atkD.spellMult;
    if (isP && player.race==='highelf') base *= 1.15;
  } else {
    const wep = isP ? player.equipment.weapon : null;
    base = wep ? wep.damage : (WEAPON_TYPES.find(w=>w.id===(isP?'sword':attacker.weapon))?.baseDmg||10);
    base *= atkD.meleeMult;
  }
  base *= mult;

  // Status mods
  (attacker.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.dmgMod) base*=(1+e.dmgMod); });
  (defender.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.atkMod) base*=(1+e.atkMod); });
  if (isP && player.race==='orc' && player.hp < player.maxHp*0.25) base *= 1.25;

  // Apply tier multiplier (replaces old variance + crit)
  base *= tier.mult;
  const isCrit = tierIdx === 4;

  // Block (only on graze/hit, not strong/crit)
  let blocked = false;
  if (!isSpell && tierIdx <= 2 && Math.random() < defD.block) { base *= 0.4; blocked = true; }

  // Armor
  let dmg = base - defD.flatDR;
  dmg *= (1 - defD.dr);
  if (defender===player && player.race==='dwarf') dmg *= 0.85;
  (defender.statusFx||[]).forEach(s => { const e=STATUS_FX[s.id]; if(e?.drMod) dmg*=(1-e.drMod); });

  // Void armor
  if (defender.voidArmor > 0) { const ab=Math.min(defender.voidArmor, dmg); defender.voidArmor-=ab; dmg-=ab; }

  dmg = Math.max(1, Math.floor(dmg));
  return { dmg, dodged:false, blocked, crit:isCrit, roll, tier:tierIdx, d1, d2, tierLabel:tier.label };
}

// ── Apply Damage ──
function applyResult(target, result, atkName, tgtName) {
  if (result.dodged) {
    addLog(`${tgtName} dodges!`, 'move');
    Snd.dodge();
    const x = target===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
    showFloat('DODGE', x, gameCanvas.height*0.25, '#44aaff', false);
    animDodge(target===player, null);
    return;
  }
  // Miss from roll
  if (result.tier === 0) {
    addLog(`[${result.d1}+${result.d2}=${result.roll}] ${atkName} misses ${tgtName}!`, 'move');
    Snd.dodge();
    const x = target===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
    showFloat('MISS', x, gameCanvas.height*0.25, '#666', false);
    return;
  }
  target.hp = Math.max(0, target.hp - result.dmg);
  const tierTag = result.tierLabel ? `[${result.d1}+${result.d2}=${result.roll} ${result.tierLabel}] ` : '';
  const pre = result.crit ? 'CRIT! ' : result.blocked ? 'Blocked! ' : '';
  addLog(`${tierTag}${pre}${result.dmg} dmg → ${tgtName}`, result.crit ? 'crit' : 'damage');
  if (result.crit) Snd.heavyHit(); else Snd.swordHit();
  const x = target===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
  const tierColor = result.crit ? '#ff4444' : result.tier>=3 ? '#44ff44' : result.tier>=2 ? '#ffff44' : '#ff8844';
  showFloat((result.crit?'!':'')+result.dmg, x, gameCanvas.height*0.25, tierColor, result.crit||result.tier>=3);
  // Show dice roll float
  if (result.d1 !== undefined) {
    showFloat(`🎲${result.d1}+${result.d2}`, x, gameCanvas.height*0.20, ROLL_TIERS[result.tier].color, false);
  }
  spawnParts(x, gameCanvas.height*0.35, tierColor, result.crit?18:result.tier>=3?12:6, 8);
  triggerShake(result.crit ? 14 : result.tier>=3 ? 8 : 4);
}

// ── Status Tick ──
function processStatusTicks(fighter) {
  (fighter.statusFx||[]).forEach(s => {
    const e = STATUS_FX[s.id];
    if (e?.tick) {
      fighter.hp = Math.max(0, fighter.hp - e.tick);
      const name = fighter===player ? 'You' : fighter.name;
      addLog(`${name} takes ${e.tick} ${s.id} damage`, 'damage');
      const x = fighter===player ? gameCanvas.width*0.3 : gameCanvas.width*0.7;
      showFloat(e.tick.toString(), x, gameCanvas.height*0.3, e.color, false);
    }
  });
  // Morath deathly chill
  if (fighter===player && combat.enemy?.isChampion && combat.enemy.championData?.name==='Wraith-Knight Morath') {
    const d = Math.floor(player.maxHp*0.02);
    player.hp = Math.max(0, player.hp-d);
    addLog(`Deathly Chill: ${d} damage`);
  }
}

// ── Combat Log ──
function addLog(msg, type) {
  combat.log.push({ text: msg, type: type || '' });
  if (combat.log.length > 30) combat.log.shift();
  updateCombatLog();
}
function updateCombatLog() {
  const el = document.getElementById('cl-entries');
  if (!el) return;
  const entries = combat.log.slice(-6);
  el.innerHTML = entries.map(e => {
    const entry = typeof e === 'string' ? { text: e, type: '' } : e;
    const cls = entry.type ? ` cl-${entry.type}` : '';
    return `<div class="cl-entry${cls}">${entry.text}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Start Combat ──
function startCombat(enemy) {
  combat.enemy = enemy;
  combat.distance = 5;
  combat.turn = 0;
  combat.animating = false;
  combat.log = [];
  player.resUsed = false;
  player.resPrepared = false;
  player.voidArmor = 0;
  player.statusFx = [];
  enemy.statusFx = [];
  enemy.voidArmor = 0;
  playerAnimOff = {x:0,y:0,opacity:1};
  enemyAnimOff = {x:0,y:0,opacity:1};

  // Demon intimidate
  if (player.race==='devil') {
    STAT_NAMES.forEach(s => { if(s==='ATK') enemy.stats[s]=Math.floor(enemy.stats[s]*0.95); });
  }

  // First turn
  const pPri = computeDerived(player.stats, player.equipment, player.race).pri;
  const ePri = computeDerived(enemy.stats, emptyEquip(), enemy.race).pri;
  combat.playerTurn = (enemy.isChampion && enemy.championData.passive==='thirdEye') ? false : (pPri >= ePri);

  changeState(ST.COMBAT);
  if (enemy.isChampion) {
    Snd.champIntro();
    showDialogue(enemy.name, enemy.championData.intro, () => beginTurn());
  } else beginTurn();
}

// ── Turn Flow ──
function beginTurn() {
  if (combat.animating) return;
  const fighter = combat.playerTurn ? player : combat.enemy;

  processStatusTicks(fighter);
  if (checkCombatEnd()) return;

  // Frozen/stunned skip
  const skip = (fighter.statusFx||[]).find(s => STATUS_FX[s.id]?.skip);
  if (skip) {
    addLog(`${fighter===player?player.name:combat.enemy.name} is ${skip.id}!`);
    endTurn();
    return;
  }

  // Passives
  if (combat.playerTurn && player.race==='revenant') {
    const h=Math.floor(player.maxHp*0.02);
    player.hp=Math.min(player.hp+h, player.maxHp);
  }
  if (!combat.playerTurn && combat.enemy.isChampion && combat.enemy.championData.passive==='darkThrone') {
    const h=Math.floor(combat.enemy.maxHp*0.03);
    combat.enemy.hp=Math.min(combat.enemy.hp+h, combat.enemy.maxHp);
    addLog(`Dark Throne heals ${combat.enemy.name} for ${h}`);
  }

  if (combat.playerTurn) {
    updateCombatHUD();
  } else {
    setTimeout(() => aiTurn(), 600);
  }
}

function endTurn() {
  const fighter = combat.playerTurn ? player : combat.enemy;
  // Decrement status durations
  fighter.statusFx = (fighter.statusFx||[]).filter(s => { s.turns--; return s.turns>0; });
  // Spell cooldowns
  if (combat.playerTurn) {
    Object.keys(player.spellCooldowns).forEach(id => { if(player.spellCooldowns[id]>0) player.spellCooldowns[id]--; });
  } else {
    (combat.enemy.abilities||[]).forEach(a => { if(a.current>0) a.current--; });
  }

  if (checkCombatEnd()) return;

  // Phase 2 check for Anurath
  const e = combat.enemy;
  if (e.isChampion && e.championData.name==='Anurath the Shadow Lord' && !e.phase2 && e.hp <= e.maxHp*0.5) {
    e.phase2 = true;
    e.stats.STR = Math.floor(e.stats.STR*1.5);
    e.stats.ATK = Math.floor(e.stats.ATK*1.5);
    addLog('Anurath enters Phase 2!');
    showDialogue(e.name, 'NOW YOU FACE TRUE DARKNESS!', () => {});
  }

  combat.playerTurn = !combat.playerTurn;
  combat.turn++;
  showTurnIndicator(combat.playerTurn);
  updateCombatHUD();
  setTimeout(() => beginTurn(), 400);
}

function checkCombatEnd() {
  // Enemy death
  if (combat.enemy.hp <= 0) {
    if (combat.enemy.isChampion && combat.enemy.championData.passive==='undying' && !combat.enemy.undyingUsed) {
      combat.enemy.hp = Math.floor(combat.enemy.maxHp*0.3);
      combat.enemy.undyingUsed = true;
      addLog(`${combat.enemy.name} refuses to die!`);
      showFloat('UNDYING!', gameCanvas.width*0.7, gameCanvas.height*0.2, '#cc44ff', true);
      return false;
    }
    combatVictory();
    return true;
  }
  // Player death
  if (player.hp <= 0) {
    if (!player.resUsed && player.resPrepared) {
      player.hp = Math.floor(player.maxHp*0.3);
      player.resUsed = true;
      player.resPrepared = false;
      addLog('RESURRECTION!');
      showFloat('RESURRECTION!', gameCanvas.width*0.3, gameCanvas.height*0.2, '#ffd740', true);
      Snd.heal();
      spawnParts(gameCanvas.width*0.3, gameCanvas.height*0.35, '#ffd740', 16, 12);
      return false;
    }
    combatDefeat();
    return true;
  }
  return false;
}

// ── Player Actions ──
function pAdvance() {
  const steps=Math.min(3, combat.distance); if(!steps)return;
  if(player.stamina<steps)return;
  player.stamina-=steps; combat.distance=Math.max(0,combat.distance-steps);
  addLog(`Advance ${steps}. Dist: ${combat.distance}`, 'move');
  animMove(true, steps, ()=>endTurn());
}
function pRetreat() {
  const steps=Math.min(3, 10-combat.distance); if(!steps)return;
  if(player.stamina<steps)return;
  player.stamina-=steps; combat.distance=Math.min(10,combat.distance+steps);
  addLog(`Retreat ${steps}. Dist: ${combat.distance}`, 'move');
  animMove(true, -steps, ()=>endTurn());
}
function pLightAtk() {
  if(player.stamina<4)return;
  if(combat.distance>1){addLog('Too far!');return;}
  player.stamina-=4;
  const r=calcDamage(player, combat.enemy, 0.7, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, false, ()=>endTurn());
}
function pHeavyAtk() {
  if(player.stamina<8)return;
  const wep=player.equipment.weapon;
  const rng=wep?wep.range:[0,2];
  if(combat.distance<rng[0]||combat.distance>rng[1]){addLog('Out of range!');return;}
  player.stamina-=8;
  const r=calcDamage(player, combat.enemy, 1.4, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, true, ()=>endTurn());
}
function pThrust() {
  if(player.stamina<6)return;
  const wep=player.equipment.weapon;
  const maxR=wep?wep.range[1]+2:3;
  if(combat.distance>maxR){addLog('Out of range!');return;}
  player.stamina-=6;
  const r=calcDamage(player, combat.enemy, 1.0, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, false, ()=>endTurn());
}
function pRanged() {
  if(player.stamina<5)return;
  if(combat.distance<3||combat.distance>8){addLog('Range 3-8!');return;}
  player.stamina-=5;
  const r=calcDamage(player, combat.enemy, 0.9, false);
  applyResult(combat.enemy, r, player.name, combat.enemy.name);
  animAttack(true, false, ()=>endTurn());
}
function pDefend() {
  if(player.stamina<3)return;
  player.stamina-=3;
  player.statusFx.push({id:'shielded',turns:1});
  addLog('Defensive stance!');
  animDefend(true, ()=>endTurn());
}
function pTaunt() {
  if(player.stamina<5)return;
  player.stamina-=5;
  const d=computeDerived(player.stats,player.equipment,player.race);
  if(Math.random()<d.taunt){
    combat.enemy.statusFx.push({id:'demoralized',turns:2});
    addLog('Enemy demoralized!');
  } else addLog('Taunt fails.');
  const g=Math.floor(2+Math.random()*5);
  player.gold+=g; addLog(`Crowd throws ${g} gold`);
  endTurn();
}
function pRest() {
  player.stamina=Math.min(player.stamina+Math.floor(player.maxStamina*0.5),player.maxStamina);
  player.mana=Math.min(player.mana+Math.floor(player.maxMana*0.5),player.maxMana);
  addLog('Rest — recover stamina & mana');
  endTurn();
}
function pFireBreath() {
  if(player.race!=='dragonknight') return;
  if(player.stamina<6) return;
  if(combat.distance>3){addLog('Too far for fire breath!');return;}
  player.stamina-=6;
  const dmg = Math.floor((15 + player.stats.STR*1.5) * (0.9+Math.random()*0.2));
  const defD = computeDerived(combat.enemy.stats, emptyEquip(), combat.enemy.race);
  let finalDmg = Math.max(1, Math.floor(dmg - defD.flatDR));
  combat.enemy.hp = Math.max(0, combat.enemy.hp - finalDmg);
  combat.enemy.statusFx.push({id:'burning',turns:1});
  addLog(`Fire Breath! ${finalDmg} fire damage! Enemy is burning!`);
  Snd.magicCast();
  const ex = gameCanvas.width*0.7;
  showFloat(finalDmg.toString(), ex, gameCanvas.height*0.25, '#ff6600', true);
  spawnParts(ex, gameCanvas.height*0.35, '#ff4400', 14, 10);
  spawnParts(ex, gameCanvas.height*0.30, '#ffaa00', 8, 8);
  triggerShake(8);
  animAttack(true, true, ()=>endTurn());
}
function pFlee() {
  const cost = Math.floor(player.gold * 0.5);
  player.gold -= cost;
  addLog(`You flee the arena, losing ${cost} gold!`);
  combat.enemy = null;
  saveGame();
  changeState(ST.TOWN);
}
function pCastSpell(spellId) {
  const sp=SPELLS.find(s=>s.id===spellId); if(!sp) return;
  if(player.level<sp.unlock||player.mana<sp.mana) return;
  if(player.spellCooldowns[spellId]>0) return;
  if(combat.distance<sp.range[0]||combat.distance>sp.range[1]){addLog('Out of range!');return;}
  player.mana-=sp.mana;
  player.spellCooldowns[spellId]=sp.cd;
  hideSpellMenu();
  Snd.magicCast();

  if(sp.type==='damage') {
    animSpell(true, sp, () => {
      const r=calcDamage(player, combat.enemy, 1.0, true, sp);
      applyResult(combat.enemy, r, player.name, combat.enemy.name);
      if(sp.status && !r.dodged) { combat.enemy.statusFx.push({id:sp.status,turns:sp.statusDur}); addLog(`${combat.enemy.name} is ${sp.status}!`); }
      if(sp.stunChance && Math.random()<sp.stunChance && !r.dodged) { combat.enemy.statusFx.push({id:'stunned',turns:1}); addLog('Stunned!'); }
      endTurn();
    }); return;
  } else if(sp.type==='heal') {
    const amt=Math.floor(sp.base+player.stats.MAG*sp.scale);
    player.hp=Math.min(player.hp+amt, player.maxHp);
    addLog(`Heal: +${amt} HP`, 'heal'); Snd.heal();
    showFloat('+'+amt, gameCanvas.width*0.3, gameCanvas.height*0.3, '#44ff44', false);
    endTurn();
  } else if(sp.type==='buff') {
    player.statusFx.push({id:sp.status,turns:sp.statusDur});
    addLog(`Cast ${sp.name}!`);
    endTurn();
  } else if(sp.type==='shield') {
    player.voidArmor=Math.floor(sp.base+player.stats.MAG*sp.scale);
    addLog(`Void Armor: absorb ${player.voidArmor}`);
    endTurn();
  } else if(sp.type==='revive') {
    player.resPrepared = true;
    addLog('Resurrection prepared — death will be cheated!');
    showFloat('RES READY', gameCanvas.width*0.3, gameCanvas.height*0.3, '#ffd740', false);
    endTurn();
  }
}

// ── Enemy Actions ──
function eAdvance(steps) {
  steps=Math.min(steps||2, combat.distance);
  if(!steps||combat.enemy.stamina<steps) return false;
  combat.enemy.stamina-=steps; combat.distance=Math.max(0,combat.distance-steps);
  addLog(`${combat.enemy.name} advances ${steps}`);
  animMove(false, steps, ()=>endTurn());
  return true;
}
function eRetreat(steps) {
  steps=Math.min(steps||2, 10-combat.distance);
  if(!steps||combat.enemy.stamina<steps) return false;
  combat.enemy.stamina-=steps; combat.distance=Math.min(10,combat.distance+steps);
  addLog(`${combat.enemy.name} retreats ${steps}`);
  animMove(false, -steps, ()=>endTurn());
  return true;
}
function eLightAtk() {
  if(combat.enemy.stamina<4||combat.distance>1) return false;
  combat.enemy.stamina-=4;
  const r=calcDamage(combat.enemy, player, 0.7, false);
  applyResult(player, r, combat.enemy.name, player.name);
  animAttack(false, false, ()=>endTurn());
  return true;
}
function eHeavyAtk() {
  if(combat.enemy.stamina<8) return false;
  const wt=WEAPON_TYPES.find(w=>w.id===combat.enemy.weapon);
  const rng=wt?wt.range:[0,2];
  if(combat.distance<rng[0]||combat.distance>rng[1]) return false;
  combat.enemy.stamina-=8;
  const r=calcDamage(combat.enemy, player, 1.4, false);
  applyResult(player, r, combat.enemy.name, player.name);
  animAttack(false, true, ()=>endTurn());
  return true;
}
function eDefend() {
  if(combat.enemy.stamina<3) return false;
  combat.enemy.stamina-=3;
  combat.enemy.statusFx.push({id:'shielded',turns:1});
  addLog(`${combat.enemy.name} defends`);
  animDefend(false, ()=>endTurn());
  return true;
}
function eRest() {
  combat.enemy.stamina=Math.min(combat.enemy.stamina+Math.floor(combat.enemy.maxStamina*0.5),combat.enemy.maxStamina);
  combat.enemy.mana=Math.min(combat.enemy.mana+Math.floor(combat.enemy.maxMana*0.5),combat.enemy.maxMana);
  addLog(`${combat.enemy.name} rests`);
  endTurn();
  return true;
}

// ── Champion Abilities ──
function useChampAbility(ab) {
  const e = combat.enemy;
  switch(ab.fn) {
    case 'crushingBlow': {
      if(combat.distance>1) return false;
      ab.current=ab.cd;
      const r=calcDamage(e, player, 2.0, false);
      applyResult(player, r, e.name, player.name);
      addLog('Crushing Blow!');
      animAttack(false, true, ()=>endTurn());
      return true;
    }
    case 'pitBossRoar': {
      ab.current=ab.cd;
      player.statusFx.push({id:'demoralized',turns:2});
      addLog('Pit Boss Roar! You are demoralized!');
      triggerShake(8);
      endTurn();
      return true;
    }
    case 'moonbeamStrike': {
      if(combat.distance<2||combat.distance>6) return false;
      ab.current=ab.cd;
      const r=calcDamage(e, player, 1.3, true, {base:15,scale:2});
      applyResult(player, r, e.name, player.name);
      addLog('Moonbeam Strike!');
      spawnParts(gameCanvas.width*0.3, gameCanvas.height*0.3, '#aaaaff', 10, 10);
      endTurn();
      return true;
    }
    case 'paleShield': {
      ab.current=ab.cd;
      e.statusFx.push({id:'shielded',turns:2});
      addLog('Pale Shield!');
      endTurn();
      return true;
    }
    case 'earthquakeSlam': {
      if(combat.distance>3) return false;
      ab.current=ab.cd;
      const r=calcDamage(e, player, 1.6, false);
      applyResult(player, r, e.name, player.name);
      if(Math.random()<0.4) { player.statusFx.push({id:'stunned',turns:1}); addLog('Stunned by earthquake!'); }
      triggerShake(15);
      addLog('Earthquake Slam!');
      endTurn();
      return true;
    }
    case 'soulDrain': {
      if(combat.distance>2) return false;
      ab.current=ab.cd;
      const r=calcDamage(e, player, 1.2, false);
      applyResult(player, r, e.name, player.name);
      if(!r.dodged) { const heal=Math.floor(r.dmg*0.5); e.hp=Math.min(e.hp+heal,e.maxHp); addLog(`Soul Drain heals ${heal}!`); }
      endTurn();
      return true;
    }
    case 'wraithForm': {
      ab.current=ab.cd;
      e.statusFx.push({id:'shielded',turns:1});
      addLog('Wraith Form! Untouchable!');
      enemyAnimOff.opacity = 0.3;
      setTimeout(()=>{ enemyAnimOff.opacity=1; }, 1500);
      endTurn();
      return true;
    }
    case 'infernalDecree': {
      ab.current=ab.cd;
      const effs = ['poisoned','burning','weakened','demoralized'];
      const eff = effs[Math.floor(Math.random()*effs.length)];
      player.statusFx.push({id:eff, turns:2});
      addLog(`Infernal Decree: ${eff}!`);
      endTurn();
      return true;
    }
    case 'hellfireNova': {
      ab.current=ab.cd;
      const r=calcDamage(e, player, 2.0, true, {base:40,scale:3});
      applyResult(player, r, e.name, player.name);
      if(!r.dodged) player.statusFx.push({id:'burning',turns:2});
      addLog('HELLFIRE NOVA!');
      triggerShake(20);
      spawnParts(gameCanvas.width*0.3, gameCanvas.height*0.3, '#ff4400', 20, 15);
      endTurn();
      return true;
    }
    case 'shadowChains': {
      ab.current=ab.cd;
      player.statusFx.push({id:'stunned',turns:1});
      addLog('Shadow Chains bind you!');
      endTurn();
      return true;
    }
  }
  return false;
}

// ── AI System ──
function aiTurn() {
  if(combat.animating) return;
  const e=combat.enemy;

  // Try champion abilities first
  if(e.isChampion) {
    for(const ab of e.abilities) {
      if(ab.current<=0 && useChampAbility(ab)) return;
    }
  }

  const hpPct=e.hp/e.maxHp;
  const staPct=e.stamina/e.maxStamina;
  const dist=combat.distance;

  // Rest if very low stamina
  if(staPct<0.2) { eRest(); return; }

  switch(e.behavior) {
    case 'aggressive':
      if(dist>1) { if(!eAdvance(Math.min(3,dist))) eRest(); }
      else if(e.stamina>=8 && Math.random()<0.6) { if(!eHeavyAtk()) eLightAtk() || eRest(); }
      else { if(!eLightAtk()) eRest(); }
      break;
    case 'defensive':
      if(hpPct<0.3 && dist<3) { if(!eRetreat(2)) eDefend() || eRest(); }
      else if(dist<=1 && Math.random()<0.4) { if(!eDefend()) eLightAtk() || eRest(); }
      else if(dist>2) { if(e.stamina>=8 && Math.random()<0.5) { if(!eHeavyAtk()) eAdvance(2) || eRest(); } else eAdvance(2) || eRest(); }
      else { if(!eLightAtk()) eAdvance(1) || eRest(); }
      break;
    case 'methodical':
      if(dist>2) { eAdvance(2) || eRest(); }
      else if(e.stamina>=8 && Math.random()<0.7) { if(!eHeavyAtk()) eLightAtk() || eRest(); }
      else if(Math.random()<0.3) { eDefend() || eRest(); }
      else { eLightAtk() || eRest(); }
      break;
    case 'adaptive':
      if(hpPct>0.6) { // Aggressive phase
        if(dist>1) eAdvance(2) || eRest();
        else if(e.stamina>=8) eHeavyAtk() || eLightAtk() || eRest();
        else eLightAtk() || eRest();
      } else { // Defensive phase
        if(Math.random()<0.3) eDefend() || eRest();
        else if(dist<=1) { if(e.stamina>=8) eHeavyAtk() || eLightAtk() || eRest(); else eLightAtk() || eRest(); }
        else eAdvance(1) || eRest();
      }
      break;
    default: // balanced
      if(dist>2) { eAdvance(2) || eRest(); }
      else if(dist<=1 && e.stamina>=8 && Math.random()<0.5) { eHeavyAtk() || eLightAtk() || eRest(); }
      else if(dist<=1) { eLightAtk() || eRest(); }
      else if(Math.random()<0.3) { eDefend() || eRest(); }
      else { eAdvance(1) || eRest(); }
  }
}

// ── Combat Result ──
function combatVictory() {
  Snd.levelUp();
  animDeath(false, null);
  const e=combat.enemy;
  const goldE=Math.floor((e.isChampion?(150+e.level*12):(20+e.level*8))*DIFFS[difficulty].goldMult);
  const xpE=Math.floor((e.isChampion?(50+e.level*5):(15+e.level*3))*(player.race==='human'?1.1:1));
  player.gold+=goldE; player.xp+=xpE;
  const petals=e.isChampion?5:1;
  data.earnPetals(petals);
  data.submitScore(GAME_ID, player.level*100+progression.arena*500);

  let leveled=false;
  while(player.xp>=xpForLv(player.level)&&player.level<30) {
    player.xp-=xpForLv(player.level); player.level++; leveled=true;
  }
  recalcPlayer();

  // Generate drop
  let drop = null;
  if (Math.random() < (e.isChampion ? 0.8 : 0.35)) {
    let tier = Math.min(e.isChampion ? Math.min(e.equipTier+1,4) : Math.floor(Math.random()*Math.min(arena()+2,5)), 4);
    const slot = EQUIP_SLOTS[Math.floor(Math.random()*EQUIP_SLOTS.length)];
    drop = genItem(slot, tier, e.level);
    player.inventory.push(drop);
  }

  // Auto-restore stamina & mana between fights
  player.stamina = Math.max(player.stamina, Math.floor(player.maxStamina*0.8));
  player.mana = Math.max(player.mana, Math.floor(player.maxMana*0.8));

  progression.fight++;
  if(e.isChampion) {
    progression.champsDefeated.push(ARENAS[progression.arena].name);
    if(progression.arena>=4 && progression.fight>=4) {
      saveGame();
      changeState(ST.VICTORY);
      return;
    }
    if(progression.arena<4) { progression.arena++; progression.fight=0; }
  }

  saveGame();
  showPostCombat(goldE, xpE, petals, leveled, drop, e);
}

function combatDefeat() {
  Snd.death();
  animDeath(true, () => changeState(ST.GAME_OVER));
}

function arena() { return progression.arena; }

// ── Animations ──
// Shield dome state for defend rendering
let shieldDome = null;

function getCharPositions() {
  const w = window.innerWidth, h = window.innerHeight;
  const dist = combat.distance || 5;
  const floorY = h * 0.72;
  const charH = Math.min(h * 0.45, 300);
  return {
    pX: w * (0.5 - dist * 0.035), eX: w * (0.5 + dist * 0.035),
    midY: floorY - charH * 0.5, floorY, charH, w, h
  };
}

function animAttack(isPlayer, heavy, cb) {
  combat.animating = true;
  const off = isPlayer ? playerAnimOff : enemyAnimOff;
  const dir = isPlayer ? 1 : -1;
  const pos = getCharPositions();
  const lungeDist = Math.min(30 + combat.distance * 8, heavy ? 80 : 50);
  const dur = heavy ? 450 : 280;
  const start = performance.now();
  let impactDone = false;
  function step(now) {
    const t = Math.min((now-start)/dur, 1);
    if (t < 0.4) {
      off.x = dir * lungeDist * (t/0.4);
    } else if (t < 0.5) {
      off.x = dir * lungeDist;
      if (!impactDone) {
        impactDone = true;
        const targetX = isPlayer ? pos.eX : pos.pX;
        const slashFromX = (isPlayer ? pos.pX : pos.eX) + dir * lungeDist;
        spawnSlashTrail(slashFromX, pos.midY - 30, targetX, pos.midY + 20, heavy ? '#ff4444' : '#ffaa44');
        spawnImpactFlash(targetX, pos.midY, heavy ? '#ff2222' : '#ffaa44', heavy ? 50 : 30);
        spawnParts(targetX, pos.midY, '#ff6644', heavy ? 30 : 18, heavy ? 12 : 8, 'spark');
        triggerShake(heavy ? 12 : 6, dir, 0);
        if (heavy) triggerScreenFlash('#ffffff', 12);
        haptic(heavy ? 'heavy' : 'medium');
      }
    } else {
      off.x = dir * lungeDist * (1 - (t-0.5)/0.5);
    }
    if (t >= 1) { off.x = 0; combat.animating = false; if (cb) cb(); return; }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animMove(isPlayer, steps, cb) {
  combat.animating = true;
  const off = isPlayer ? playerAnimOff : enemyAnimOff;
  const dir = steps > 0 ? (isPlayer ? 1 : -1) : (isPlayer ? -1 : 1);
  const pos = getCharPositions();
  const charX = isPlayer ? pos.pX : pos.eX;
  const start = performance.now();
  let dustSpawned = false;
  function step(now) {
    const t = Math.min((now-start)/350, 1);
    off.x = dir * 25 * Math.sin(t * Math.PI);
    // Hop via Y offset
    off.y = -8 * Math.sin(t * Math.PI);
    // Dust puff at feet
    if (t > 0.3 && t < 0.35 && !dustSpawned) {
      dustSpawned = true;
      spawnParts(charX, pos.floorY, '#8a7a6a', 8, 4, 'circle');
    }
    if (t >= 1) { off.x = 0; off.y = 0; combat.animating = false; if (cb) cb(); return; }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animDodge(isPlayer, cb) {
  combat.animating = true;
  const off = isPlayer ? playerAnimOff : enemyAnimOff;
  const dir = isPlayer ? -1 : 1;
  const pos = getCharPositions();
  const charX = isPlayer ? pos.pX : pos.eX;
  const start = performance.now();
  // Store afterimage position
  let afterimageX = 0;
  function step(now) {
    const t = Math.min((now-start)/300, 1);
    if (t < 0.4) {
      off.x = dir * 40 * (t/0.4);
      off.y = -5 * Math.sin(t/0.4 * Math.PI); // Crouch then rise
      off.opacity = 1 - t * 0.5;
      afterimageX = off.x;
    } else {
      off.x = dir * 40 * (1 - (t-0.4)/0.6);
      off.y = 0;
      off.opacity = 0.5 + (t-0.4)/0.6 * 0.5;
    }
    // Whoosh particles
    if (t > 0.1 && t < 0.4 && Math.random() < 0.4) {
      spawnParts(charX + afterimageX*0.5, pos.midY, 'rgba(180,180,220,0.5)', 2, 3, 'trail');
    }
    if (t >= 1) { off.x = 0; off.y = 0; off.opacity = 1; combat.animating = false; if (cb) cb(); return; }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animDeath(isPlayer, cb) {
  combat.animating = true;
  const off = isPlayer ? playerAnimOff : enemyAnimOff;
  const pos = getCharPositions();
  const cx = isPlayer ? pos.pX : pos.eX;
  const cy = pos.midY;
  const start = performance.now();
  const dur = 1200;
  let burstDone = false;
  function step(now) {
    const t = Math.min((now-start)/dur, 1);
    if (t < 0.15) {
      // Stage 1: Impact recoil
      off.x = (Math.random()-0.5) * 15;
      off.y = (Math.random()-0.5) * 10;
    } else if (t < 0.35) {
      // Stage 2: Kneel (scaleY would be done via y-offset)
      off.x = (Math.random()-0.5) * 6;
      off.y = 15 * ((t-0.15)/0.2);
    } else if (t < 0.6) {
      // Stage 3: Collapse
      const ct = (t-0.35)/0.25;
      off.x = (isPlayer ? -1 : 1) * 20 * ct;
      off.y = 15 + 50 * ct;
      off.opacity = 1 - ct * 0.4;
    } else {
      // Stage 4: Final fade
      const ct = (t-0.6)/0.4;
      off.y = 65 + 10*ct;
      off.opacity = 0.6 - ct * 0.6;
      if (!burstDone) {
        burstDone = true;
        spawnParts(cx, cy, '#ff2222', 35, 18, 'spark');
        spawnParts(cx, cy, '#880000', 20, 12, 'debris');
        spawnParts(cx, cy, '#ff6644', 10, 15, 'ring');
        spawnImpactFlash(cx, cy, '#ff0000', 60);
        triggerScreenFlash('#ff0000', 20);
        triggerShake(15, 0, 0);
      }
    }
    if (t >= 1) { off.x = 0; off.y = 0; off.opacity = 0; combat.animating = false; if (cb) cb(); return; }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animSpell(isPlayer, spell, cb) {
  combat.animating = true;
  const off = isPlayer ? playerAnimOff : enemyAnimOff;
  const start = performance.now();
  const elem = spell?.element || 'arcane';
  const spColor = elem==='fire'?'#ff6600':elem==='ice'?'#44ccff':elem==='lightning'?'#ffff44':elem==='dark'?'#8844cc':'#4488ff';
  const pos = getCharPositions();
  const fromX = isPlayer ? pos.pX : pos.eX;
  const toX = isPlayer ? pos.eX : pos.pX;
  const midY = pos.midY;
  let impactDone = false;
  const dur = 700;
  function step(now) {
    const t = Math.min((now-start)/dur, 1);
    // Caster pulses
    if (t < 0.3) {
      const pulse = Math.sin(t/0.3*Math.PI*3)*0.2;
      off.opacity = 1 + pulse;
      // Charge-up particles around caster
      if (Math.random() < 0.5) spawnParts(fromX + (Math.random()-0.5)*30, midY + (Math.random()-0.5)*40, spColor, 1, 2, 'circle');
    } else {
      off.opacity = 1;
    }
    // Rendered projectile beam
    if (t > 0.25 && t < 0.8) {
      const pt = (t-0.25)/0.55;
      const px = fromX + (toX-fromX)*pt;
      const py = midY + Math.sin(pt*Math.PI)*-35;
      // Different trail types per element
      if (elem === 'fire') {
        spawnParts(px, py, '#ff6600', 3, 5, 'spark');
        spawnParts(px, py, '#ff3300', 1, 3, 'circle');
      } else if (elem === 'ice') {
        spawnParts(px, py, '#88ddff', 2, 4, 'debris');
        spawnParts(px, py, '#44ccff', 2, 3, 'spark');
      } else if (elem === 'lightning') {
        // Zigzag bolt segments
        spawnParts(px + (Math.random()-0.5)*20, py + (Math.random()-0.5)*20, '#ffff44', 2, 6, 'spark');
        spawnParts(px, py, '#ffffff', 1, 2, 'circle');
      } else if (elem === 'dark') {
        spawnParts(px, py, '#8844cc', 2, 5, 'trail');
        spawnParts(px + (Math.random()-0.5)*15, py, '#440066', 1, 3, 'circle');
      } else {
        spawnParts(px, py, spColor, 3, 4, 'circle');
      }
    }
    // Impact burst at target
    if (t > 0.78 && !impactDone) {
      impactDone = true;
      spawnParts(toX, midY, spColor, 25, 12, 'spark');
      spawnParts(toX, midY, '#ffffff', 8, 8, 'circle');
      spawnImpactFlash(toX, midY, spColor, 45);
      triggerScreenFlash(spColor, 15);
      triggerShake(8, isPlayer ? 1 : -1, 0);
    }
    if (t >= 1) { off.opacity = 1; combat.animating = false; if (cb) cb(); return; }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animDefend(isPlayer, cb) {
  combat.animating = true;
  const off = isPlayer ? playerAnimOff : enemyAnimOff;
  const dir = isPlayer ? -1 : 1;
  const pos = getCharPositions();
  const cx = isPlayer ? pos.pX : pos.eX;
  const cy = pos.midY;
  const start = performance.now();
  // Create shield dome
  shieldDome = { x: cx, y: cy, radius: 40, life: 1, isPlayer };
  function step(now) {
    const t = Math.min((now-start)/400, 1);
    off.x = dir * 6 * Math.sin(t * Math.PI * 0.5);
    // Shield dome animation
    if (shieldDome) {
      shieldDome.life = t < 0.3 ? t/0.3 : (t < 0.7 ? 1 : 1 - (t-0.7)/0.3);
      shieldDome.radius = 35 + 10 * Math.sin(t * Math.PI);
    }
    // Shield sparkle particles
    if (t > 0.1 && t < 0.6 && Math.random() < 0.3) {
      const angle = Math.random() * Math.PI * 2;
      spawnParts(cx + Math.cos(angle)*35, cy + Math.sin(angle)*25, '#88bbff', 1, 2, 'spark');
    }
    if (t >= 1) { off.x = 0; shieldDome = null; combat.animating = false; if (cb) cb(); return; }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Draw shield dome (called from game loop)
function drawShieldDome(ctx) {
  if (!shieldDome) return;
  const s = shieldDome;
  ctx.save();
  ctx.globalAlpha = s.life * 0.35;
  ctx.strokeStyle = '#88bbff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#4488ff'; ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.radius, Math.PI, 0);
  ctx.stroke();
  // Dome fill
  ctx.globalAlpha = s.life * 0.08;
  ctx.fillStyle = '#4488ff';
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.radius, Math.PI, 0);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function showOverlay(id) {
  document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
  const el = document.getElementById(id);
  if (el) el.classList.remove('hidden');
}
function hideAllOverlays() { document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden')); }
function hideSpellMenu() { document.getElementById('spell-menu').classList.remove('visible'); }

function changeState(st) {
  gameState = st;
  const combTop = document.getElementById('combat-top');
  const combHud = document.getElementById('combat-hud');

// ── Dialogue ──
function showDialogue(name, text, cb) {
  const box = document.getElementById('dialogue-box');
  const nEl = document.getElementById('dialogue-name');
  const tEl = document.getElementById('dialogue-text');
  nEl.textContent = name;
  tEl.textContent = '';
  box.classList.add('visible');
  let i = 0;
  const iv = setInterval(() => {
    if (i < text.length) { tEl.textContent += text[i]; i++; }
    else { clearInterval(iv); setTimeout(() => { box.classList.remove('visible'); if(cb)cb(); }, 1500); }
  }, 30);
  box.onclick = () => { clearInterval(iv); tEl.textContent=text; setTimeout(()=>{box.classList.remove('visible');if(cb)cb();},300); box.onclick=null; };
}

// ── Shop Compare ──
function shopCompare(item) {
  const equipped = player.equipment[item.slot];
  if (!equipped) return '<div class="ic-stats" style="color:#76ff03;font-size:clamp(7px,0.8dvh,9px)">No gear equipped</div>';
  const parts = [];
  if (item.damage && equipped.damage) {
    const d = item.damage - equipped.damage;
    if (d !== 0) parts.push(`<span style="color:${d>0?'#76ff03':'#ff4444'}">DMG ${d>0?'+':''}${d}</span>`);
  }
  if (item.defense !== undefined && equipped.defense !== undefined) {
    const d = item.defense - equipped.defense;
    if (d !== 0) parts.push(`<span style="color:${d>0?'#76ff03':'#ff4444'}">DEF ${d>0?'+':''}${d}</span>`);
  }
  const allStats = new Set([...Object.keys(item.bonuses||{}), ...Object.keys(equipped.bonuses||{})]);
  allStats.forEach(s => {
    const nv = (item.bonuses||{})[s]||0;
    const ov = (equipped.bonuses||{})[s]||0;
    const d = nv - ov;
    if (d !== 0) parts.push(`<span style="color:${d>0?'#76ff03':'#ff4444'}">${s} ${d>0?'+':''}${d}</span>`);
  });
  if (!parts.length) return '';
  return `<div class="ic-stats" style="font-size:clamp(7px,0.8dvh,9px)">vs ${equipped.name}: ${parts.join(' ')}</div>`;
}

function renderShop() {
  const el = document.getElementById('shop-content');

  el.innerHTML = `
    <div class="section-title">Armorer's Forge</div>
    <div class="info-text text-center mb-sm">Gold: <span class="gold-text">${player.gold}</span> ${disc>0?`(${Math.round(disc*100)}% discount)`:''}  </div>
    <div class="info-text text-center mb-sm" style="font-size:clamp(9px,1dvh,11px);color:var(--iris-mid)">Tap to buy · Long-press to compare</div>
    <div class="item-grid" id="shop-items">${shopItems.map((it,i) => {
      const price = Math.floor(it.value * (1-disc));
      const canBuy = player.gold >= price;
      const cmp = shopCompare(it);
      return `<div class="item-card ${ITEM_TIERS[it.tier].css}" data-idx="${i}">
        <div class="ic-name" style="color:${ITEM_TIERS[it.tier].color}">${it.name}</div>
        <div class="ic-type">${SLOT_LABELS[it.slot]} · ${ITEM_TIERS[it.tier].name}</div>
        <div class="ic-stats">${itemStatText(it)}</div>
        ${cmp}
        <div class="ic-price" style="${canBuy?'':'color:#ff4444'}">${price}g</div>
      </div>`;
    }).join('')}</div>
    <div class="section-title mt-md">Sell Items</div>
    <div class="item-grid" id="sell-items">${player.inventory.map((it,i) => {
      const sellPrice = Math.floor(it.value * 0.4);
      return `<div class="item-card ${ITEM_TIERS[it.tier].css}" data-sell="${i}">
        <div class="ic-name" style="color:${ITEM_TIERS[it.tier].color}">${it.name}</div>
        <div class="ic-type">${SLOT_LABELS[it.slot]}</div>
        <div class="ic-stats">${itemStatText(it)}</div>
        <div class="ic-price">Sell: ${sellPrice}g</div>
      </div>`;
    }).join('')}${player.inventory.length===0?'<div class="info-text text-center">No items to sell</div>':''}</div>
    <div class="btn-row"><button class="btn" id="shop-back">Back to Town</button></div>`;
  // Buy handlers
  el.querySelectorAll('[data-idx]').forEach(c => c.onclick = () => {
    const idx = parseInt(c.dataset.idx);
    const it = shopItems[idx]; if(!it) return;
    const price = Math.floor(it.value * (1-disc));
    if(player.gold < price) return;
    player.gold -= price;
    player.inventory.push(it);
    shopItems.splice(idx, 1);
    Snd.gold();
    saveGame();
    renderShop();
  });
  // Sell handlers
  el.querySelectorAll('[data-sell]').forEach(c => c.onclick = () => {
    const idx = parseInt(c.dataset.sell);
    const it = player.inventory[idx]; if(!it) return;
    const sellPrice = Math.floor(it.value * 0.4);
    player.gold += sellPrice;
    player.inventory.splice(idx, 1);
    Snd.gold();
    saveGame();
    renderShop();
  });
  el.querySelector('#shop-back').onclick = () => { changeState(ST.TOWN); };
}

    // Unequip current
    const current = player.equipment[it.slot];
    if(current) player.inventory.push(current);
    player.equipment[it.slot] = it;
    player.inventory.splice(idx, 1);
    recalcPlayer(); clearImgCache(); saveGame(); Snd.click();
    renderInventory();

  // Unequip
  el.querySelectorAll('[data-unequip]').forEach(c => c.onclick = () => {

    const it = player.equipment[sl]; if(!it) return;
    player.inventory.push(it);

    renderInventory();

// ── Action Definitions (for HUD rendering) ──
function getActionDefs() {
  const e = combat.enemy; if (!e) return [];
  const wep = player.equipment.weapon;
  const wepRange = wep ? wep.range : [0,2];
  const dist = combat.distance;
  const race = RACES.find(r=>r.id===player.race);

  function atkPreview(mult) {
    const th = getRollThresholds(player, e, mult, false);
    const ch = tierChances(th);
    const dmg = previewDamageRange(player, e, mult, false);
    return { th, ch, dmg };
  }

  const actions = [
    { id:'adv', icon:'🏃', name:'Advance', cost:`${Math.min(3,dist)} STA`, type:'move',
      desc:`Close ${Math.min(3,dist)} distance. Costs 1 stamina per step.`,
      canUse: dist>0 && player.stamina>=Math.min(3,dist), fn:pAdvance },
    { id:'ret', icon:'🔙', name:'Retreat', cost:`${Math.min(3,10-dist)} STA`, type:'move',
      desc:`Fall back ${Math.min(3,10-dist)} distance. Costs 1 stamina per step.`,
      canUse: dist<10 && player.stamina>=Math.min(3,10-dist), fn:pRetreat },
    { id:'light', icon:'⚔️', name:'Quick Atk', cost:'4 STA', type:'light',
      desc:'Fast strike. Low damage, reliable. Melee range only.', mult:0.7,
      canUse: player.stamina>=4 && dist<=1, ...atkPreview(0.7), fn:pLightAtk },
    { id:'heavy', icon:'💥', name:'Power Atk', cost:'8 STA', type:'heavy',
      desc:'Devastating blow. High damage. Uses weapon range.', mult:1.4,
      canUse: player.stamina>=8 && dist>=wepRange[0] && dist<=wepRange[1], ...atkPreview(1.4), fn:pHeavyAtk },
    { id:'thrust', icon:'🔱', name:'Thrust', cost:'6 STA', type:'medium',
      desc:'Extended reach attack. Medium damage. Range +2 from weapon.', mult:1.0,
      canUse: player.stamina>=6 && dist<=(wep?wep.range[1]+2:3), ...atkPreview(1.0), fn:pThrust },
    { id:'ranged', icon:'🏹', name:'Ranged', cost:'5 STA', type:'medium',
      desc:'Ranged attack. Range 3-8 only.', mult:0.9,
      canUse: player.stamina>=5 && dist>=3 && dist<=8, ...atkPreview(0.9), fn:pRanged },
    { id:'defend', icon:'🛡️', name:'Defend', cost:'3 STA', type:'defend',
      desc:'Defensive stance. Reduces incoming damage by 30% for 1 turn.',
      canUse: player.stamina>=3, fn:pDefend },
    { id:'taunt', icon:'📢', name:'Taunt', cost:'5 STA', type:'util',
      desc:`Taunt the enemy. ${Math.floor(computeDerived(player.stats,player.equipment,player.race).taunt*100)}% chance to demoralize. Earn gold from crowd.`,
      canUse: player.stamina>=5, fn:pTaunt },
    { id:'spell', icon:'✨', name:'Spells', cost:'MP', type:'spell',
      desc:'Open spell menu. Cast magic using mana.',
      canUse: true, fn:() => toggleSpellMenu() },
    { id:'rest', icon:'😴', name:'Rest', cost:'Free', type:'util',
      desc:'Skip turn. Recover 50% stamina and mana.',
      canUse: true, fn:pRest },
  ];
  if (player.race==='dragonknight') {
    const fbDmg = Math.floor(15 + player.stats.STR*1.5);
    actions.splice(-1, 0, { id:'fire', icon:'🔥', name:'Fire Breath', cost:'6 STA', type:'heavy',
      desc:`Draconic fire. ~${fbDmg} fire damage + burn. Range 0-3.`,
      canUse: player.stamina>=6 && dist<=3, fn:pFireBreath,
      dmg: { graze:Math.floor(fbDmg*0.4), hit:fbDmg, strong:Math.floor(fbDmg*1.5), crit:Math.floor(fbDmg*2.2) } });
  }
  actions.push({ id:'flee', icon:'🚪', name:'Flee', cost:'50% Gold', type:'flee',
    desc:'Escape combat. You lose half your gold.',
    canUse: true, fn:() => { if(confirm('Flee? You lose 50% of your gold!')) pFlee(); } });
  return actions;
}

function toggleSpellMenu() {
  const menu = document.getElementById('spell-menu');
  if (menu.classList.contains('visible')) { menu.classList.remove('visible'); return; }
  const available = SPELLS.filter(sp => player.level >= sp.unlock);
  const e = combat.enemy;
  menu.innerHTML = available.map(sp => {
    const cd = player.spellCooldowns[sp.id] || 0;
    const canCast = player.mana >= sp.mana && cd <= 0 && combat.distance >= sp.range[0] && combat.distance <= sp.range[1];
    let dmgInfo = '';
    if (sp.type === 'damage' && e) {
      const dmg = previewDamageRange(player, e, 1.0, true, sp);
      const th = getRollThresholds(player, e, 1.0, true);
      const ch = tierChances(th);
      dmgInfo = `<span class="sr-dmg">${dmg.hit} dmg · ${ch.hit+ch.strong+ch.crit}% hit</span>`;
    } else if (sp.type === 'heal') {
      const amt = Math.floor(sp.base + player.stats.MAG * sp.scale);
      dmgInfo = `<span class="sr-dmg" style="color:#44ff44">+${amt} HP</span>`;
    }
    return `<div class="spell-row ${canCast?'':'disabled'}" data-spell="${sp.id}">
      <span class="sr-icon">${sp.icon}</span>
      <span class="sr-name">${sp.name}</span>
      ${dmgInfo}
      <span class="sr-cost">${sp.mana} MP</span>
      ${cd>0?`<span class="sr-cd">CD:${cd}</span>`:''}
    </div>`;
  }).join('') || '<div class="info-text text-center">No spells available</div>';
  menu.classList.add('visible');
  menu.querySelectorAll('.spell-row:not(.disabled)').forEach(r => r.onclick = () => {
    pCastSpell(r.dataset.spell);
  });
}
