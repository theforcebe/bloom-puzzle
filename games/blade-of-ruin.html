// ── Canvas Sizing ──
function resizeCanvases() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  [bgCanvas, gameCanvas, partCanvas].forEach(c => {
    c.width = w * dpr; c.height = h * dpr;
    c.style.width = w + 'px'; c.style.height = h + 'px';
    c.getContext('2d').scale(dpr, dpr);
  });
}

// ── Background Rendering ──
const bgStars = [];
for (let i = 0; i < 60; i++) bgStars.push({ x:Math.random(), y:Math.random(), s:0.5+Math.random()*1.5, b:Math.random() });
let bgEmbers = [];
for (let i = 0; i < 20; i++) bgEmbers.push({ x:Math.random(), y:Math.random(), s:1+Math.random()*2, vy:-0.0003-Math.random()*0.0005, vx:(Math.random()-0.5)*0.0002, life:Math.random() });

function drawBackground() {
  const w = window.innerWidth, h = window.innerHeight;
  const ctx = bgCtx;
  const now = Date.now() * 0.001;

  // Base fill
  let bg = '#0d0a1a';
  if (gameState === ST.COMBAT && combat.enemy) bg = ARENAS[progression.arena]?.bg || bg;
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Stars (non-combat or overlay states)
  if (gameState !== ST.COMBAT) {
    bgStars.forEach(s => {
      const twinkle = 0.3 + 0.7 * (0.5 + 0.5*Math.sin(now*2 + s.b*10));
      ctx.globalAlpha = twinkle * 0.6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x*w, s.y*h, s.s, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Embers (always)
  bgEmbers.forEach(e => {
    e.y += e.vy; e.x += e.vx; e.life -= 0.002;
    if (e.life<=0 || e.y<-0.05) { e.y=1.05; e.x=Math.random(); e.life=0.8+Math.random()*0.2; }
    ctx.globalAlpha = e.life*0.4;
    ctx.fillStyle = gameState===ST.COMBAT ? (ARENAS[progression.arena]?.accent||'#ff4444') : '#ff4444';
    ctx.beginPath(); ctx.arc(e.x*w, e.y*h, e.s, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Arena-specific combat backgrounds
  if (gameState === ST.COMBAT) {
    const ai = progression.arena;
    const floorY = h * 0.72;
    const accent = ARENAS[ai]?.accent || '#ff4444';

    if (ai === 0) drawSlavePits(ctx, w, h, floorY, now);
    else if (ai === 1) drawIronGate(ctx, w, h, floorY, now);
    else if (ai === 2) drawBurningSands(ctx, w, h, floorY, now);
    else if (ai === 3) drawShadowArena(ctx, w, h, floorY, now);
    else if (ai === 4) drawDarkThrone(ctx, w, h, floorY, now);

    // Distance bar on floor
    drawDistanceBar(ctx, w, h, floorY, accent);
  }

  // Menu background
  if (gameState === ST.MENU || gameState === ST.CREATE ||
      gameState === ST.GAME_OVER || gameState === ST.VICTORY) {
    drawMenuBackground(ctx, w, h, now);
  }

  // Town background
  if (gameState === ST.TOWN || gameState === ST.SHOP || gameState === ST.TEMPLE ||
      gameState === ST.TAVERN || gameState === ST.TRAINING || gameState === ST.ARENA_GATE ||
      gameState === ST.INVENTORY || gameState === ST.PRE_COMBAT || gameState === ST.POST_COMBAT ||
      gameState === ST.LEVEL_UP) {
    drawTown(ctx, w, h, now);
  }
}

// ── Shared Arena Helpers ──
function drawFloorPerspective(ctx, w, h, floorY, color1, color2) {
  const vanX = w * 0.5, vanY = floorY * 0.3;
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = color1; ctx.lineWidth = 0.5;
  // Converging lines
  for (let i = 0; i <= 10; i++) {
    const bx = w * (i / 10);
    ctx.beginPath(); ctx.moveTo(bx, h); ctx.lineTo(vanX, vanY); ctx.stroke();
  }
  // Horizontal lines (perspective scaled)
  ctx.strokeStyle = color2;
  for (let i = 1; i <= 6; i++) {
    const t = i / 6;
    const y = floorY + (h - floorY) * t;
    ctx.globalAlpha = 0.08 + t * 0.1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  ctx.restore();
}

function drawArenaVignette(ctx, w, h, color) {
  ctx.save();
  const grad = ctx.createRadialGradient(w*0.5, h*0.45, Math.min(w,h)*0.2, w*0.5, h*0.45, Math.max(w,h)*0.75);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.6, 'transparent');
  grad.addColorStop(1, color || 'rgba(0,0,0,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// ── Torch helper (3-layer glow) ──
function drawTorch(ctx, x, y, now, color) {
  ctx.save();
  // Sconce bracket
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(x-5, y, 10, 18);
  ctx.fillRect(x-8, y+15, 16, 5);
  // Fire
  const flicker = Math.sin(now*8)*3 + Math.sin(now*13)*2;
  // Outer glow (largest, dimmest)
  const outerGrad = ctx.createRadialGradient(x+flicker*0.3, y-8, 0, x, y-4, 50);
  outerGrad.addColorStop(0, color + 'cc');
  outerGrad.addColorStop(0.3, color + '44');
  outerGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = outerGrad;
  ctx.beginPath(); ctx.arc(x, y-4, 50, 0, Math.PI*2); ctx.fill();
  // Mid glow
  const midGrad = ctx.createRadialGradient(x+flicker*0.5, y-6, 1, x, y-4, 25);
  midGrad.addColorStop(0, color);
  midGrad.addColorStop(0.5, color + '88');
  midGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = midGrad;
  ctx.beginPath(); ctx.arc(x+flicker*0.5, y-6, 25, 0, Math.PI*2); ctx.fill();
  // Bright core
  ctx.globalAlpha = 0.9;
  ctx.shadowColor = color; ctx.shadowBlur = 20;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+flicker*0.3, y-8, 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Light cast on surroundings
  const lightGrad = ctx.createRadialGradient(x, y, 5, x, y, 120);
  lightGrad.addColorStop(0, color + '30');
  lightGrad.addColorStop(0.5, color + '12');
  lightGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = lightGrad;
  ctx.fillRect(x-120, y-120, 240, 240);
  ctx.restore();
}

// ── Slave Pits — red cave, bright torches, chains, glowing cracks ──
function drawSlavePits(ctx, w, h, floorY, now) {
  // Rich red cave fill
  const caveGrad = ctx.createLinearGradient(0, 0, 0, h);
  caveGrad.addColorStop(0, '#1a0808');
  caveGrad.addColorStop(0.5, '#2a1210');
  caveGrad.addColorStop(1, '#1a0a08');
  ctx.fillStyle = caveGrad;
  ctx.fillRect(0, 0, w, h);
  // Rough cave ceiling with depth
  ctx.fillStyle = '#120606';
  ctx.beginPath(); ctx.moveTo(0, 0);
  for (let x = 0; x <= w; x += 20) ctx.lineTo(x, 25 + Math.sin(x*0.03+1)*18 + Math.sin(x*0.07)*10);
  ctx.lineTo(w, 0); ctx.fill();
  // Stalactites
  for (let i = 0; i < 8; i++) {
    const sx = w * (0.1 + i * 0.1) + Math.sin(i*3.7)*20;
    const sl = 15 + i%3 * 12;
    ctx.fillStyle = '#150808';
    ctx.beginPath(); ctx.moveTo(sx-4, 0); ctx.lineTo(sx, sl); ctx.lineTo(sx+4, 0); ctx.fill();
  }
  // Stone floor
  ctx.fillStyle = '#2a1810';
  ctx.fillRect(0, floorY, w, h - floorY);
  drawFloorPerspective(ctx, w, h, floorY, '#3a2018', '#2a1510');
  // Glowing floor cracks (orange magma beneath)
  ctx.save();
  ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2; ctx.globalAlpha = 0.4;
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 8;
  for (let i = 0; i < 8; i++) {
    const sx = w*0.1 + Math.sin(i*2.3)*w*0.35;
    ctx.beginPath(); ctx.moveTo(sx, floorY+5);
    ctx.lineTo(sx+20+i*5, floorY+15+i*3); ctx.lineTo(sx+10+i*8, floorY+30+i*2); ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // Reflective puddles
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#334466';
  ctx.beginPath(); ctx.ellipse(w*0.25, floorY+20, 35, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(w*0.7, floorY+25, 25, 5, 0.2, 0, Math.PI*2); ctx.fill();
  // Puddle highlights
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#ff6633';
  ctx.beginPath(); ctx.ellipse(w*0.25, floorY+18, 20, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Hanging chains with metallic gleam
  for (let i = 0; i < 4; i++) {
    const cx = w*0.15 + i*w*0.22;
    const swing = Math.sin(now*0.8+i*1.5)*4;
    ctx.save();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.6;
    ctx.beginPath();
    for (let j = 0; j < 10; j++) {
      const ly = 10+j*14; const lx = cx+swing+Math.sin(j*0.5)*3;
      if (j===0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
    }
    ctx.stroke();
    // Metallic gleam on chain links
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.globalAlpha = 0.3;
    for (let j = 0; j < 10; j += 2) {
      const ly = 10+j*14; const lx = cx+swing+Math.sin(j*0.5)*3;
      ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }
  // Torches — bright orange pools
  drawTorch(ctx, w*0.08, h*0.22, now, '#ff6633');
  drawTorch(ctx, w*0.92, h*0.22, now, '#ff6633');
  drawTorch(ctx, w*0.5, h*0.10, now, '#ff5522');
  drawArenaVignette(ctx, w, h, 'rgba(10,4,4,0.6)');
}

// ── Iron Gate — stone blocks, iron bars, animated crowd, combat ring ──
function drawIronGate(ctx, w, h, floorY, now) {
  // Dark blue stone walls
  ctx.fillStyle = '#0c0c22';
  ctx.fillRect(0, 0, w, h);
  // Visible stone blocks
  ctx.save();
  ctx.strokeStyle = '#1a1a40'; ctx.lineWidth = 1; ctx.globalAlpha = 0.6;
  for (let y = 0; y < floorY; y += 28) {
    const off = (Math.floor(y/28)%2)*22;
    for (let x = -off; x < w; x += 44) {
      ctx.strokeRect(x, y, 44, 28);
      // Occasional stone detail
      if ((x+y) % 132 === 0) {
        ctx.fillStyle = '#0e0e28'; ctx.globalAlpha = 0.3;
        ctx.fillRect(x+2, y+2, 40, 24);
        ctx.globalAlpha = 0.6;
      }
    }
  }
  ctx.restore();
  // Arena floor — dark stone
  ctx.fillStyle = '#141428';
  ctx.fillRect(0, floorY, w, h-floorY);
  drawFloorPerspective(ctx, w, h, floorY, '#1a1a40', '#141430');
  // Glowing combat ring on floor
  ctx.save();
  ctx.strokeStyle = '#8888cc'; ctx.lineWidth = 2; ctx.globalAlpha = 0.25;
  ctx.shadowColor = '#8888cc'; ctx.shadowBlur = 15;
  ctx.beginPath(); ctx.ellipse(w*0.5, floorY + (h-floorY)*0.4, w*0.3, (h-floorY)*0.25, 0, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Iron bars on sides (thicker, with highlight)
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const bx = 6+i*11;
    ctx.strokeStyle = '#556'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, floorY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w-bx, 0); ctx.lineTo(w-bx, floorY); ctx.stroke();
    // Blue highlight on bars
    ctx.strokeStyle = '#8888cc'; ctx.lineWidth = 1; ctx.globalAlpha = 0.2;
    ctx.beginPath(); ctx.moveTo(bx+1, 0); ctx.lineTo(bx+1, floorY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w-bx+1, 0); ctx.lineTo(w-bx+1, floorY); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // Cross bars
  ctx.strokeStyle = '#556'; ctx.lineWidth = 3;
  [0.3, 0.7].forEach(pct => {
    ctx.beginPath(); ctx.moveTo(0, floorY*pct); ctx.lineTo(70, floorY*pct); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w-70, floorY*pct); ctx.lineTo(w, floorY*pct); ctx.stroke();
  });
  ctx.restore();
  // Animated bobbing crowd
  ctx.save();
  for (let i = 0; i < 24; i++) {
    const cx = w*0.08 + i*w*0.037;
    const bob = Math.sin(now*1.5+i*1.7)*3 + Math.cos(now*2.3+i*0.9)*1.5;
    ctx.globalAlpha = 0.25 + Math.sin(i*2.1)*0.08;
    ctx.fillStyle = '#181840';
    // Head
    ctx.beginPath(); ctx.arc(cx, 18+bob, 7, 0, Math.PI*2); ctx.fill();
    // Body
    ctx.fillRect(cx-5, 24+bob, 10, 14);
    // Occasional arm wave
    if (i % 4 === Math.floor(now*2) % 4) {
      ctx.fillRect(cx+5, 22+bob, 4, 8);
    }
  }
  ctx.restore();
  // Torch sconces — blue-white
  drawTorch(ctx, w*0.15, h*0.3, now, '#8888cc');
  drawTorch(ctx, w*0.85, h*0.3, now, '#8888cc');
  drawTorch(ctx, w*0.5, h*0.08, now, '#9999dd');
  drawArenaVignette(ctx, w, h, 'rgba(5,5,20,0.5)');
}

// ── Burning Sands — blazing sun, heat shimmer, dunes, pillars ──
function drawBurningSands(ctx, w, h, floorY, now) {
  // Sky gradient — richer
  const skyGrad = ctx.createLinearGradient(0, 0, 0, floorY);
  skyGrad.addColorStop(0, '#1a1200');
  skyGrad.addColorStop(0.3, '#2e2008');
  skyGrad.addColorStop(0.7, '#3e2e10');
  skyGrad.addColorStop(1, '#4a3818');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, floorY);
  // Blazing sun with 3-layer glow
  const sunX = w*0.8, sunY = h*0.12;
  ctx.save();
  // Outer glow
  const outerSun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 100);
  outerSun.addColorStop(0, 'rgba(255,200,80,0.15)');
  outerSun.addColorStop(1, 'transparent');
  ctx.fillStyle = outerSun;
  ctx.beginPath(); ctx.arc(sunX, sunY, 100, 0, Math.PI*2); ctx.fill();
  // Mid glow
  const midSun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 50);
  midSun.addColorStop(0, 'rgba(255,180,60,0.5)');
  midSun.addColorStop(1, 'transparent');
  ctx.fillStyle = midSun;
  ctx.beginPath(); ctx.arc(sunX, sunY, 50, 0, Math.PI*2); ctx.fill();
  // Bright core
  ctx.shadowColor = '#ffcc44'; ctx.shadowBlur = 30;
  ctx.fillStyle = 'rgba(255,220,100,0.9)';
  ctx.beginPath(); ctx.arc(sunX, sunY, 12, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Heat shimmer (visible)
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#ffcc66';
  for (let i = 0; i < 8; i++) {
    const sy = floorY - 30 + Math.sin(now*2+i*1.3)*12;
    ctx.fillRect(0, sy, w, 2);
  }
  ctx.restore();
  // Dune-textured sand floor
  const sandGrad = ctx.createLinearGradient(0, floorY, 0, h);
  sandGrad.addColorStop(0, '#4a3e20');
  sandGrad.addColorStop(0.5, '#3a2e18');
  sandGrad.addColorStop(1, '#2a2010');
  ctx.fillStyle = sandGrad;
  ctx.fillRect(0, floorY, w, h-floorY);
  // Sand dune undulations
  ctx.save();
  ctx.fillStyle = '#4a3e2a'; ctx.globalAlpha = 0.3;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(0, floorY + 10 + i*15);
    for (let x = 0; x <= w; x += 20) ctx.lineTo(x, floorY + 10 + i*15 + Math.sin(x*0.01+i*2)*8);
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();
  }
  ctx.restore();
  drawFloorPerspective(ctx, w, h, floorY, '#5a4e30', '#3a2e18');
  // Fully rendered pillars with shadows
  const pillars = [[w*0.12, h*0.18, floorY], [w*0.88, h*0.13, floorY]];
  pillars.forEach(([px, py, fy], idx) => {
    ctx.save();
    // Pillar shadow
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(px+10, fy); ctx.lineTo(px+60, fy+30); ctx.lineTo(px+50, fy+35); ctx.lineTo(px+8, fy+5);
    ctx.fill();
    // Pillar body
    ctx.globalAlpha = 1;
    const pilGrad = ctx.createLinearGradient(px-10, 0, px+10, 0);
    pilGrad.addColorStop(0, '#2a2215');
    pilGrad.addColorStop(0.5, '#3a3225');
    pilGrad.addColorStop(1, '#2a2215');
    ctx.fillStyle = pilGrad;
    ctx.fillRect(px-10, py, 20, fy-py);
    // Capital and base
    ctx.fillStyle = '#3a3020';
    ctx.fillRect(px-14, py, 28, 8);
    ctx.fillRect(px-14, fy-4, 28, 8);
    // Cracks on pillar
    if (idx === 0) {
      ctx.strokeStyle = '#1a1508'; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(px-3, py+30); ctx.lineTo(px+5, py+60); ctx.lineTo(px-2, py+80); ctx.stroke();
    }
    ctx.restore();
  });
  // Broken stones
  ctx.save(); ctx.globalAlpha = 0.5; ctx.fillStyle = '#2a2215';
  ctx.fillRect(w*0.14, floorY+5, 14, 10);
  ctx.fillRect(w*0.16, floorY+10, 10, 7);
  ctx.fillRect(w*0.13, floorY+8, 6, 6);
  ctx.restore();
  // Blowing sandstorm particles
  ctx.save();
  for (let i = 0; i < 15; i++) {
    const sx = (now*40*(i+1)*0.7) % (w+100) - 50;
    const sy = floorY - 60 + Math.sin(now+i*2.1)*40;
    ctx.globalAlpha = 0.15 + Math.sin(i*1.3)*0.08;
    ctx.fillStyle = '#c8a060';
    ctx.beginPath(); ctx.arc(sx, sy, 1.5+i%2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  drawArenaVignette(ctx, w, h, 'rgba(15,10,0,0.5)');
}

// ── Shadow Arena — vivid purple mist, soul wisps, obsidian, rune circles ──
function drawShadowArena(ctx, w, h, floorY, now) {
  ctx.fillStyle = '#060514';
  ctx.fillRect(0, 0, w, h);
  // Reflective obsidian floor
  const floorGrad = ctx.createLinearGradient(0, floorY, 0, h);
  floorGrad.addColorStop(0, '#0c0a20');
  floorGrad.addColorStop(0.5, '#080618');
  floorGrad.addColorStop(1, '#050510');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, floorY, w, h-floorY);
  // Obsidian reflection highlights
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#8844cc';
  for (let i = 0; i < 6; i++) {
    const rx = w*(0.1+i*0.15);
    ctx.beginPath(); ctx.ellipse(rx, floorY+15, 30, 5, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  drawFloorPerspective(ctx, w, h, floorY, '#1a1035', '#0a0818');
  // Rotating rune circles on floor
  ctx.save();
  ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 1; ctx.globalAlpha = 0.2;
  ctx.translate(w*0.5, floorY + (h-floorY)*0.4);
  ctx.rotate(now*0.3);
  ctx.beginPath(); ctx.arc(0, 0, Math.min(w*0.25, 100), 0, Math.PI*2); ctx.stroke();
  // Inner rune circle
  ctx.rotate(-now*0.5);
  ctx.beginPath(); ctx.arc(0, 0, Math.min(w*0.15, 60), 0, Math.PI*2); ctx.stroke();
  // Rune marks
  for (let i = 0; i < 8; i++) {
    const a = i*Math.PI/4;
    const r = Math.min(w*0.2, 80);
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*r*0.8, Math.sin(a)*r*0.8);
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); ctx.stroke();
  }
  ctx.restore();
  // Vivid purple mist (much higher alpha)
  for (let i = 0; i < 7; i++) {
    const mx = w*(0.08+i*0.14) + Math.sin(now*0.5+i*2)*40;
    const my = floorY - 20 + Math.sin(now*0.3+i)*20;
    const mistGrad = ctx.createRadialGradient(mx, my, 5, mx, my, 80+i*12);
    mistGrad.addColorStop(0, 'rgba(120,60,200,0.35)');
    mistGrad.addColorStop(0.5, 'rgba(100,40,180,0.15)');
    mistGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = mistGrad;
    ctx.fillRect(mx-90, my-90, 180, 180);
  }
  // Spectral audience (higher visibility)
  ctx.save();
  for (let i = 0; i < 18; i++) {
    const gx = w*0.06 + i*w*0.05;
    const gy = 22 + Math.sin(i*1.1+now*0.8)*5;
    const bob = Math.sin(now*1.2+i*0.7)*3;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#8844cc';
    // Ghost head
    ctx.beginPath(); ctx.arc(gx, gy+bob, 6, 0, Math.PI*2); ctx.fill();
    // Ghost body fading down
    ctx.globalAlpha = 0.2;
    ctx.fillRect(gx-4, gy+bob+5, 8, 14);
    // Eyes
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#cc88ff';
    ctx.beginPath(); ctx.arc(gx-2, gy+bob-1, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(gx+2, gy+bob-1, 1, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // Soul wisps with 3-layer glow trails
  for (let i = 0; i < 8; i++) {
    const wx = w*(0.12+i*0.11) + Math.sin(now*1.5+i*2.5)*25;
    const wy = h*0.25 + Math.cos(now*0.8+i*1.8)*50;
    ctx.save();
    // Outer glow
    const wOuter = ctx.createRadialGradient(wx, wy, 0, wx, wy, 20);
    wOuter.addColorStop(0, 'rgba(140,80,220,0.12)');
    wOuter.addColorStop(1, 'transparent');
    ctx.fillStyle = wOuter;
    ctx.beginPath(); ctx.arc(wx, wy, 20, 0, Math.PI*2); ctx.fill();
    // Mid glow
    ctx.globalAlpha = 0.5;
    const wMid = ctx.createRadialGradient(wx, wy, 0, wx, wy, 10);
    wMid.addColorStop(0, 'rgba(160,100,240,0.5)');
    wMid.addColorStop(1, 'transparent');
    ctx.fillStyle = wMid;
    ctx.beginPath(); ctx.arc(wx, wy, 10, 0, Math.PI*2); ctx.fill();
    // Bright core
    ctx.shadowColor = '#aa66ff'; ctx.shadowBlur = 8;
    ctx.fillStyle = 'rgba(200,150,255,0.8)';
    ctx.beginPath(); ctx.arc(wx, wy, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Trail
    ctx.strokeStyle = 'rgba(140,80,220,0.2)'; ctx.lineWidth = 2;
    const prevX = wx - Math.cos(now*1.5+i*2.5)*8;
    const prevY = wy + Math.sin(now*0.8+i*1.8)*8;
    ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(prevX, prevY); ctx.stroke();
    ctx.restore();
  }
  drawArenaVignette(ctx, w, h, 'rgba(5,3,15,0.6)');
}

// ── Dark Throne — bright lava, detailed throne, large embers ──
function drawDarkThrone(ctx, w, h, floorY, now) {
  // Deep volcanic background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
  bgGrad.addColorStop(0, '#1a0800');
  bgGrad.addColorStop(0.5, '#200c04');
  bgGrad.addColorStop(1, '#140600');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);
  // Volcanic rock walls with jagged edges
  ctx.save();
  ctx.fillStyle = '#120600';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, floorY);
  for (let y = floorY; y > 0; y -= 15) ctx.lineTo(18+Math.sin(y*0.04)*10+Math.cos(y*0.08)*5, y);
  ctx.fill();
  ctx.beginPath(); ctx.moveTo(w, 0); ctx.lineTo(w, floorY);
  for (let y = floorY; y > 0; y -= 15) ctx.lineTo(w-18-Math.sin(y*0.05+1)*10-Math.cos(y*0.07)*5, y);
  ctx.fill();
  // Wall cracks with orange glow underneath
  ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2; ctx.globalAlpha = 0.3;
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 10;
  for (let i = 0; i < 5; i++) {
    const wy = h*0.1 + i*floorY*0.2;
    ctx.beginPath(); ctx.moveTo(3, wy); ctx.lineTo(8+Math.sin(i)*5, wy+15); ctx.lineTo(5, wy+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w-3, wy+10); ctx.lineTo(w-10-Math.cos(i)*4, wy+25); ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // Cracked floor
  ctx.fillStyle = '#1e0e06';
  ctx.fillRect(0, floorY, w, h-floorY);
  drawFloorPerspective(ctx, w, h, floorY, '#2a1408', '#1a0a04');
  // Floor cracks with lava glow
  ctx.save();
  ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 8;
  for (let i = 0; i < 8; i++) {
    const sx = w*0.08+i*w*0.12;
    ctx.beginPath(); ctx.moveTo(sx, floorY+3);
    ctx.lineTo(sx+10+i*3, floorY+20+i*4); ctx.lineTo(sx-5+i*6, floorY+35); ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // Bright lava rivers
  const lavaGlow = 0.6 + Math.sin(now*3)*0.2;
  ctx.save();
  // Lava body
  ctx.globalAlpha = lavaGlow * 0.7;
  ctx.fillStyle = '#ff2200';
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 15;
  ctx.beginPath(); ctx.moveTo(0, floorY+6);
  for (let x = 0; x <= w; x += 8) ctx.lineTo(x, floorY+6+Math.sin(x*0.02+now*2)*4);
  ctx.lineTo(w, floorY+16);
  for (let x = w; x >= 0; x -= 8) ctx.lineTo(x, floorY+16+Math.sin(x*0.025+now*2.5)*3);
  ctx.fill();
  // Bright lava highlights
  ctx.globalAlpha = lavaGlow * 0.4;
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.moveTo(w*0.2, floorY+9);
  for (let x = w*0.2; x <= w*0.8; x += 10) ctx.lineTo(x, floorY+9+Math.sin(x*0.03+now*3)*2);
  ctx.lineTo(w*0.8, floorY+13);
  for (let x = w*0.8; x >= w*0.2; x -= 10) ctx.lineTo(x, floorY+13+Math.sin(x*0.04+now*3.5)*1.5);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Lava ambient glow
  const lavaGrad = ctx.createRadialGradient(w*0.5, floorY+10, 10, w*0.5, floorY+10, w*0.45);
  lavaGrad.addColorStop(0, 'rgba(255,60,0,0.15)');
  lavaGrad.addColorStop(0.5, 'rgba(255,34,0,0.06)');
  lavaGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = lavaGrad;
  ctx.fillRect(0, floorY-50, w, 120);
  // Detailed throne at top center
  ctx.save();
  const tx = w*0.5, ty = h*0.04;
  // Throne base
  ctx.fillStyle = '#0d0400';
  ctx.beginPath();
  ctx.moveTo(tx-35, ty+70); ctx.lineTo(tx-40, ty+10); ctx.lineTo(tx-25, ty-5);
  ctx.lineTo(tx-15, ty-15); ctx.lineTo(tx, ty-20);
  ctx.lineTo(tx+15, ty-15); ctx.lineTo(tx+25, ty-5);
  ctx.lineTo(tx+40, ty+10); ctx.lineTo(tx+35, ty+70);
  ctx.fill();
  // Throne detail lines
  ctx.strokeStyle = '#2a1508'; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.moveTo(tx-30, ty+20); ctx.lineTo(tx+30, ty+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx-25, ty+40); ctx.lineTo(tx+25, ty+40); ctx.stroke();
  // Glowing eyes on throne
  ctx.globalAlpha = 0.7 + Math.sin(now*2)*0.3;
  ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff2200';
  ctx.beginPath(); ctx.arc(tx-8, ty+5, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tx+8, ty+5, 3, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Big embers (3-5px, 25+ count)
  ctx.save();
  for (let i = 0; i < 28; i++) {
    const ex = (w*0.05+i*w*0.035+now*20*(i%5+1))%w;
    const ey = (h*0.05+now*30+i*73)%h;
    const eSize = 2 + (i%3)*1.5;
    ctx.globalAlpha = 0.5 + Math.sin(now*3+i)*0.2;
    ctx.fillStyle = i%3===0 ? '#ff6600' : i%3===1 ? '#ff3300' : '#ffaa00';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(ex, ey, eSize, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  drawArenaVignette(ctx, w, h, 'rgba(10,4,0,0.5)');
}

// ── Distance Bar on arena floor ──
function drawDistanceBar(ctx, w, h, floorY, accent) {
  ctx.save();
  const barY = floorY + 8;
  // Base line (visible)
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = accent;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(w*0.1, barY); ctx.lineTo(w*0.9, barY); ctx.stroke();
  // Distance tick markers
  ctx.globalAlpha = 0.4;
  for (let i = 0; i <= 10; i++) {
    const mx = w*0.1 + (w*0.8)*(i/10);
    ctx.beginPath(); ctx.moveTo(mx, barY-4); ctx.lineTo(mx, barY+4); ctx.stroke();
  }
  // Zone fills (visible)
  const zones = [
    { start:0, end:1, color:'#44ff44', label:'MELEE' },
    { start:2, end:3, color:'#ffff44', label:'MID' },
    { start:4, end:6, color:'#ffaa44', label:'RANGED' },
    { start:7, end:10, color:'#ff4444', label:'EXTREME' },
  ];
  zones.forEach(z => {
    const sx = w*0.1 + (w*0.8)*(z.start/10);
    const ex = w*0.1 + (w*0.8)*((z.end+1)/10);
    // Zone fill
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = z.color;
    ctx.fillRect(sx, barY-3, ex-sx, 6);
    // Zone label
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = z.color;
    ctx.font = `${Math.max(7, w*0.015)}px 'Quicksand', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(z.label, (sx+ex)/2, barY + 14);
  });
  // Player dot with glow
  const pDot = w*0.1 + (w*0.8)*((10-combat.distance)/20);
  const eDot = w*0.1 + (w*0.8)*((10+combat.distance)/20);
  const now = Date.now();
  ctx.globalAlpha = 0.8;
  ctx.shadowColor = '#66aaff'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#66aaff';
  ctx.beginPath(); ctx.arc(pDot, barY, 7 + Math.sin(now*0.005)*1, 0, Math.PI*2); ctx.fill();
  // Enemy dot with glow
  ctx.shadowColor = '#ff6666';
  ctx.fillStyle = '#ff6666';
  ctx.beginPath(); ctx.arc(eDot, barY, 7 + Math.sin(now*0.005+1)*1, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ── Turn Indicator ──
let turnIndicator = null;
function showTurnIndicator(isPlayerTurn) {
  turnIndicator = { isPlayer: isPlayerTurn, life: 1, start: Date.now() };
}

function drawTurnIndicator(ctx, w, h) {
  if (!turnIndicator) return;
  const t = turnIndicator;
  const elapsed = (Date.now() - t.start) / 1000;
  if (elapsed > 1.2) { turnIndicator = null; return; }
  const progress = Math.min(elapsed / 0.6, 1);
  const fade = elapsed > 0.8 ? 1 - (elapsed-0.8)/0.4 : 1;
  ctx.save();
  // Light sweep
  const sweepX = w * progress;
  const sweepColor = t.isPlayer ? '#4488ff' : '#ff4444';
  const sweepGrad = ctx.createLinearGradient(sweepX-60, 0, sweepX+30, 0);
  sweepGrad.addColorStop(0, 'transparent');
  sweepGrad.addColorStop(0.5, sweepColor);
  sweepGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = fade * 0.15;
  ctx.fillStyle = sweepGrad;
  ctx.fillRect(0, 0, w, h);
  // Turn text
  if (elapsed < 0.8) {
    ctx.globalAlpha = fade * 0.7;
    ctx.font = `bold ${Math.max(14, w*0.03)}px 'Cormorant Garamond', serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = sweepColor;
    ctx.shadowColor = sweepColor; ctx.shadowBlur = 15;
    ctx.fillText(t.isPlayer ? 'YOUR TURN' : 'ENEMY TURN', w*0.5, h*0.18);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

// ── Menu Background ──
function drawMenuBackground(ctx, w, h, now) {
  // Dark arena atmosphere
  ctx.fillStyle = '#0a0614';
  ctx.fillRect(0, 0, w, h);
  // Slow-panning distant torches
  const torchOffs = [
    [w*0.15, h*0.3], [w*0.5, h*0.15], [w*0.85, h*0.3],
    [w*0.3, h*0.5], [w*0.7, h*0.5]
  ];
  torchOffs.forEach(([tx, ty], i) => {
    const flicker = 0.5 + Math.sin(now*5+i*2.1)*0.15;
    const grad = ctx.createRadialGradient(tx, ty, 2, tx, ty, 60);
    grad.addColorStop(0, `rgba(255,60,30,${0.12*flicker})`);
    grad.addColorStop(0.5, `rgba(255,40,20,${0.04*flicker})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(tx, ty, 60, 0, Math.PI*2); ctx.fill();
  });
  // Crimson accent pulsing
  ctx.save();
  const pulse = 0.03 + Math.sin(now*1.5)*0.02;
  const crimGrad = ctx.createRadialGradient(w*0.5, h*0.4, 0, w*0.5, h*0.4, w*0.6);
  crimGrad.addColorStop(0, `rgba(255,40,40,${pulse})`);
  crimGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = crimGrad;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
  // Floating embers
  for (let i = 0; i < 15; i++) {
    const ex = (now*15*(i+1)*0.3) % (w+40) - 20;
    const ey = (h + 20 - (now*20 + i*67) % (h+40));
    ctx.save();
    ctx.globalAlpha = 0.3 + Math.sin(now*2+i)*0.15;
    ctx.fillStyle = i%2 === 0 ? '#ff4422' : '#ff6644';
    ctx.beginPath(); ctx.arc(ex, ey, 1.5+i%2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // Vignette
  drawArenaVignette(ctx, w, h, 'rgba(5,3,10,0.7)');
}

// ── Town Canvas Background ──
function drawTown(ctx, w, h, now) {
  // Night sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h*0.6);
  skyGrad.addColorStop(0, '#0a0818');
  skyGrad.addColorStop(1, '#15101f');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, h);
  // Moon
  ctx.save();
  const moonX = w*0.75, moonY = h*0.08;
  const moonOuter = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 60);
  moonOuter.addColorStop(0, 'rgba(200,190,220,0.08)');
  moonOuter.addColorStop(1, 'transparent');
  ctx.fillStyle = moonOuter;
  ctx.beginPath(); ctx.arc(moonX, moonY, 60, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(220,210,240,0.5)';
  ctx.beginPath(); ctx.arc(moonX, moonY, 12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(240,235,250,0.8)';
  ctx.beginPath(); ctx.arc(moonX, moonY, 6, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Twinkling stars
  ctx.save();
  for (let i = 0; i < 30; i++) {
    const sx = (i*137+50) % w;
    const sy = (i*97+20) % (h*0.4);
    const twinkle = 0.2 + 0.5*(0.5+0.5*Math.sin(now*2+i*3.7));
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx, sy, 0.8+i%2*0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // Building silhouettes
  ctx.save();
  ctx.fillStyle = '#0c0818';
  // Tavern (left)
  ctx.beginPath();
  ctx.moveTo(w*0.05, h*0.55); ctx.lineTo(w*0.05, h*0.25);
  ctx.lineTo(w*0.15, h*0.15); ctx.lineTo(w*0.25, h*0.25);
  ctx.lineTo(w*0.25, h*0.55);
  ctx.fill();
  // Chimney
  ctx.fillRect(w*0.08, h*0.13, 6, 12);
  // Shop (center)
  ctx.beginPath();
  ctx.moveTo(w*0.35, h*0.55); ctx.lineTo(w*0.35, h*0.28);
  ctx.lineTo(w*0.45, h*0.22); ctx.lineTo(w*0.55, h*0.22);
  ctx.lineTo(w*0.65, h*0.28); ctx.lineTo(w*0.65, h*0.55);
  ctx.fill();
  // Temple (right, taller)
  ctx.beginPath();
  ctx.moveTo(w*0.75, h*0.55); ctx.lineTo(w*0.75, h*0.2);
  ctx.lineTo(w*0.82, h*0.1); ctx.lineTo(w*0.85, h*0.08);
  ctx.lineTo(w*0.88, h*0.1); ctx.lineTo(w*0.95, h*0.2);
  ctx.lineTo(w*0.95, h*0.55);
  ctx.fill();
  // Temple spire
  ctx.fillRect(w*0.84, h*0.03, 3, h*0.05);
  // Windows (warm glow)
  const windows = [
    [w*0.1, h*0.3, 8, 10], [w*0.18, h*0.3, 8, 10],
    [w*0.42, h*0.3, 10, 8], [w*0.52, h*0.3, 10, 8],
    [w*0.80, h*0.25, 6, 12], [w*0.90, h*0.25, 6, 12],
  ];
  windows.forEach(([wx, wy, ww, wh], i) => {
    const flicker = 0.6 + Math.sin(now*4+i*1.7)*0.15;
    ctx.globalAlpha = flicker * 0.5;
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(wx, wy, ww, wh);
    // Window glow
    const wGrad = ctx.createRadialGradient(wx+ww/2, wy+wh/2, 2, wx+ww/2, wy+wh/2, 25);
    wGrad.addColorStop(0, 'rgba(255,170,68,0.15)');
    wGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = wGrad;
    ctx.fillRect(wx-20, wy-20, ww+40, wh+40);
  });
  ctx.restore();
  // Cobblestone ground
  ctx.fillStyle = '#15101f';
  ctx.fillRect(0, h*0.55, w, h*0.45);
  // Warm cobblestone glow from torchlight
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#3a3050';
  for (let y = h*0.55; y < h; y += 14) {
    const off = (Math.floor(y/14)%2)*10;
    for (let x = -off; x < w; x += 20) {
      const rx = x + Math.sin(y*0.1+x*0.05)*2;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(rx+1, y+1, 18, 12, 3); else ctx.rect(rx+1, y+1, 18, 12);
      ctx.fill();
    }
  }
  ctx.restore();
  // Bright torchlight pools
  const torchPositions = [[w*0.15, h*0.48], [w*0.85, h*0.48], [w*0.5, h*0.18]];
  torchPositions.forEach(([tx, ty], i) => {
    const flicker = 0.8 + Math.sin(now*6+i*2.3)*0.15 + Math.sin(now*9+i)*0.05;
    // Large glow pool
    const grad = ctx.createRadialGradient(tx, ty, 5, tx, ty, 120);
    grad.addColorStop(0, `rgba(255,170,80,${0.2*flicker})`);
    grad.addColorStop(0.4, `rgba(255,140,60,${0.08*flicker})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(tx-120, ty-120, 240, 240);
    // Bright torch point
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ffaa44';
    ctx.shadowColor = '#ff8822'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(tx, ty, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  });
  // Light fog
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#9988bb';
  for (let i = 0; i < 6; i++) {
    const fx = w*0.5 + Math.sin(now*0.3+i*0.8)*w*0.4;
    const fy = h*0.4 + Math.cos(now*0.2+i*1.2)*h*0.15;
    ctx.beginPath(); ctx.arc(fx, fy, 50+i*8, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── Character Drawing Helpers ──
function drawGroundShadow(ctx, x, floorY, charW, arenaColor) {
  ctx.save();
  const grad = ctx.createRadialGradient(x, floorY, 0, x, floorY, charW * 0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0.25)');
  grad.addColorStop(0.6, 'rgba(0,0,0,0.1)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(x, floorY, charW * 0.7, charW * 0.15, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCharacterGlow(ctx, x, y, charW, charH, accentColor, tierLevel, now) {
  ctx.save();
  const pulse = tierLevel >= 4 ? (0.15 + Math.sin(now*0.004)*0.1) : 0.18;
  const grad = ctx.createRadialGradient(x, y + charH*0.4, charW*0.1, x, y + charH*0.4, charW*0.9);
  grad.addColorStop(0, accentColor + (tierLevel>=4?'40':'25'));
  grad.addColorStop(0.5, accentColor + '15');
  grad.addColorStop(1, 'transparent');
  ctx.globalAlpha = pulse;
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(x, y + charH*0.4, charW*0.9, charH*0.55, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCanvasHealthBar(ctx, x, y, width, current, max, color1, color2) {
  const barH = 6;
  const pct = Math.max(0, Math.min(1, current / max));
  // Background
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#0d0a1a';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - width/2, y, width, barH, 3);
  else ctx.rect(x - width/2, y, width, barH);
  ctx.fill();
  // Fill
  ctx.globalAlpha = 0.9;
  const grad = ctx.createLinearGradient(x - width/2, 0, x - width/2 + width*pct, 0);
  grad.addColorStop(0, color1);
  grad.addColorStop(1, color2);
  ctx.fillStyle = grad;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - width/2, y, width*pct, barH, 3);
  else ctx.rect(x - width/2, y, width*pct, barH);
  ctx.fill();
  // Border
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#b8a9d4';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - width/2, y, width, barH, 3);
  else ctx.rect(x - width/2, y, width, barH);
  ctx.stroke();
  ctx.restore();
}

// ── Character Drawing ──
function drawCombatCharacters() {
  if (gameState !== ST.COMBAT || !combat.enemy) return;
  const ctx = gameCtx;
  const w = window.innerWidth, h = window.innerHeight;
  const now = Date.now();
  const floorY = h * 0.72;

  const charH = Math.min(h * 0.45, 300);
  const charW = charH * 0.55;
  const barW = charW * 0.9;

  // Distance-reactive positions
  const dist = combat.distance || 5;
  const pBaseX = w * (0.5 - dist * 0.035);
  const eBaseX = w * (0.5 + dist * 0.035);

  // Idle breathing animation
  const breatheScale = 1 + Math.sin(now * 0.003) * 0.015;
  const breatheY = Math.sin(now * 0.003) * 2;

  // Player
  const pX = pBaseX + playerAnimOff.x + shakeX;
  const pY = floorY - charH + playerAnimOff.y + shakeY + breatheY;
  const arenaAccent = ARENAS[progression.arena]?.accent || '#ff4444';

  // Ground shadow
  drawGroundShadow(ctx, pX, floorY, charW, arenaAccent);

  // Player glow halo
  const pTier = Math.min(Math.round(Object.values(player.equipment).filter(Boolean).reduce((s,e)=>s+e.tier,0) / Math.max(1,Object.values(player.equipment).filter(Boolean).length)), 4);
  const pAccent = ITEM_TIERS[pTier]?.color || '#a0a0a0';
  drawCharacterGlow(ctx, pX, pY, charW, charH, pAccent, pTier, now);

  // Draw player with breathing
  ctx.save();
  ctx.globalAlpha = playerAnimOff.opacity;
  const pImg = getCharImg(player.race, getModelLv(player.equipment), player.equipment.weapon?.weaponType||'sword');
  if (pImg.complete && pImg.naturalWidth) {
    ctx.translate(pX, pY + charH);
    ctx.scale(1, breatheScale);
    ctx.drawImage(pImg, -charW/2, -charH, charW, charH);
  }
  ctx.restore();

  // Player health bars
  const pBarY = pY - 14;
  drawCanvasHealthBar(ctx, pX, pBarY, barW, player.hp, player.maxHp, '#cc2222', '#ff4444');
  if (player.maxStamina > 0) drawCanvasHealthBar(ctx, pX, pBarY - 8, barW, player.stamina, player.maxStamina, '#cc8800', '#ffaa00');
  if (player.maxMana > 0) drawCanvasHealthBar(ctx, pX, pBarY - 16, barW, player.mana, player.maxMana, '#2244cc', '#4488ff');

  // Status particles for player
  spawnStatusParticles(pX, pY, charH, player.statusEffects);

  // Enemy
  const eX = eBaseX + enemyAnimOff.x + shakeX;
  const eY = floorY - charH + enemyAnimOff.y + shakeY + breatheY;
  const e = combat.enemy;

  // Ground shadow
  drawGroundShadow(ctx, eX, floorY, charW, arenaAccent);

  // Enemy glow halo
  const eAccent = ITEM_TIERS[e.equipTier]?.color || '#a0a0a0';
  drawCharacterGlow(ctx, eX, eY, charW, charH, eAccent, e.equipTier, now);

  // Draw enemy (flipped) with breathing
  ctx.save();
  ctx.globalAlpha = enemyAnimOff.opacity;
  const eImg = getCharImg(e.race, ITEM_TIERS[e.equipTier].modelLv, e.weapon);
  if (eImg.complete && eImg.naturalWidth) {
    ctx.translate(eX, eY + charH);
    ctx.scale(-1, breatheScale);
    ctx.drawImage(eImg, -charW/2, -charH, charW, charH);
  }
  ctx.restore();

  // Enemy health bars
  const eBarY = eY - 14;
  drawCanvasHealthBar(ctx, eX, eBarY, barW, e.hp, e.maxHp, '#cc2222', '#ff4444');
  if (e.maxStamina > 0) drawCanvasHealthBar(ctx, eX, eBarY - 8, barW, e.stamina, e.maxStamina, '#cc8800', '#ffaa00');

  // Status particles for enemy
  spawnStatusParticles(eX, eY, charH, e.statusEffects);

  ctx.globalAlpha = 1;
}

// ── Main Game Loop ──
function gameLoop() {
  const w = window.innerWidth, h = window.innerHeight;

  // Clear canvases
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
  partCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);

  // Update
  updateShake();
  updateParts();

  // Draw
  drawBackground();
  if (gameState === ST.COMBAT) {
    drawCombatCharacters();
    drawSlashTrails(partCtx);
    drawImpactFlashes(partCtx);
    drawShieldDome(partCtx);
    drawParts(partCtx);
    drawScreenFlash(partCtx, w, h);
    drawTurnIndicator(partCtx, w, h);
  }

  requestAnimationFrame(gameLoop);
}

// ── Initialization ──
function init() {
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  // Touch prevention
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => { if(gameState===ST.COMBAT) e.preventDefault(); }, { passive: false });
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Menu buttons
  document.getElementById('btn-new-game').onclick = () => {
    Snd.click();
    createStep=0; createRace='human'; createName=''; createBonusPoints=10;
    createBonusStats={}; createWeapon='sword';
    changeState(ST.CREATE);
  };
  document.getElementById('btn-continue').onclick = () => {
    Snd.click();
    if(loadGame()) { recalcPlayer(); changeState(ST.TOWN); }
  };
  document.getElementById('btn-import').onclick = () => {
    document.getElementById('import-file').click();
  };
  document.getElementById('import-file').onchange = e => {
    if(e.target.files[0]) importSave(e.target.files[0]);
  };

  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(b => b.onclick = () => {
    difficulty = parseInt(b.dataset.diff);
    document.querySelectorAll('.diff-btn').forEach(d => d.classList.toggle('selected', parseInt(d.dataset.diff)===difficulty));
    Snd.click();
  });

  // Skin toggle
  document.getElementById('skin-btn').onclick = () => {
    if (typeof ThemeManager !== 'undefined') {
      const skins = ThemeManager.GAME_SKINS[GAME_ID];
      if (skins) {
        const cur = ThemeManager.getGameSkin(GAME_ID);
        const next = (cur + 1) % skins.length;
        ThemeManager.setGameSkin(GAME_ID, next);
        Snd.click();
      }
    }
  };

  // Show menu
  changeState(ST.MENU);

  // Start game loop
  requestAnimationFrame(gameLoop);
}

init();

})();
</script>
