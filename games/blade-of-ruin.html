// ── Canvas Sizing ──
function resizeCanvases() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  [bgCanvas, gameCanvas, partCanvas].forEach(c => {
    c.width = w * dpr; c.height = h * dpr;
    c.style.width = w + 'px'; c.style.height = h + 'px';
    c.getContext('2d').scale(dpr, dpr);
  });
}

// ── Background Rendering ──
const bgStars = [];
for (let i = 0; i < 60; i++) bgStars.push({ x:Math.random(), y:Math.random(), s:0.5+Math.random()*1.5, b:Math.random() });
let bgEmbers = [];
for (let i = 0; i < 20; i++) bgEmbers.push({ x:Math.random(), y:Math.random(), s:1+Math.random()*2, vy:-0.0003-Math.random()*0.0005, vx:(Math.random()-0.5)*0.0002, life:Math.random() });

function drawBackground() {
  const w = window.innerWidth, h = window.innerHeight;
  const ctx = bgCtx;
  const now = Date.now() * 0.001;

  // Base fill
  let bg = '#0d0a1a';
  if (gameState === ST.COMBAT && combat.enemy) bg = ARENAS[progression.arena]?.bg || bg;
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Stars (non-combat or overlay states)
  if (gameState !== ST.COMBAT) {
    bgStars.forEach(s => {
      const twinkle = 0.3 + 0.7 * (0.5 + 0.5*Math.sin(now*2 + s.b*10));
      ctx.globalAlpha = twinkle * 0.6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x*w, s.y*h, s.s, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Embers (always)
  bgEmbers.forEach(e => {
    e.y += e.vy; e.x += e.vx; e.life -= 0.002;
    if (e.life<=0 || e.y<-0.05) { e.y=1.05; e.x=Math.random(); e.life=0.8+Math.random()*0.2; }
    ctx.globalAlpha = e.life*0.4;
    ctx.fillStyle = gameState===ST.COMBAT ? (ARENAS[progression.arena]?.accent||'#ff4444') : '#ff4444';
    ctx.beginPath(); ctx.arc(e.x*w, e.y*h, e.s, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Arena-specific combat backgrounds
  if (gameState === ST.COMBAT) {
    const ai = combat.bountyArena != null ? combat.bountyArena : progression.arena;
    const floorY = h * 0.72;
    const accent = ARENAS[ai]?.accent || '#ff4444';

    if (ai === 0) drawSunfireColosseum(ctx, w, h, floorY, now);
    else if (ai === 1) drawHornwoodGrandRing(ctx, w, h, floorY, now);
    else if (ai === 2) drawFrostglassRing(ctx, w, h, floorY, now);
    else if (ai === 3) drawAshmawCrucible(ctx, w, h, floorY, now);

    // Distance bar on floor
    drawDistanceBar(ctx, w, h, floorY, accent);
  }

  // Menu background
  if (gameState === ST.MENU || gameState === ST.CREATE ||
      gameState === ST.GAME_OVER || gameState === ST.VICTORY) {
    drawMenuBackground(ctx, w, h, now);
  }

  // Town background
  if (gameState === ST.TOWN || gameState === ST.SHOP || gameState === ST.TEMPLE ||
      gameState === ST.TAVERN || gameState === ST.TRAINING || gameState === ST.ARENA_GATE ||
      gameState === ST.INVENTORY || gameState === ST.PRE_COMBAT || gameState === ST.POST_COMBAT ||
      gameState === ST.LEVEL_UP || gameState === ST.BOUNTY_BOARD || gameState === ST.MOONWELL ||
      gameState === ST.SANCTUM || gameState === ST.ARMORY_VAULT) {
    drawTown(ctx, w, h, now);
  }
}

// ── Shared Arena Helpers ──
function drawFloorPerspective(ctx, w, h, floorY, color1, color2) {
  const vanX = w * 0.5, vanY = floorY * 0.3;
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = color1; ctx.lineWidth = 0.5;
  // Converging lines
  for (let i = 0; i <= 10; i++) {
    const bx = w * (i / 10);
    ctx.beginPath(); ctx.moveTo(bx, h); ctx.lineTo(vanX, vanY); ctx.stroke();
  }
  // Horizontal lines (perspective scaled)
  ctx.strokeStyle = color2;
  for (let i = 1; i <= 6; i++) {
    const t = i / 6;
    const y = floorY + (h - floorY) * t;
    ctx.globalAlpha = 0.08 + t * 0.1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  ctx.restore();
}

function drawArenaVignette(ctx, w, h, color) {
  ctx.save();
  const grad = ctx.createRadialGradient(w*0.5, h*0.45, Math.min(w,h)*0.2, w*0.5, h*0.45, Math.max(w,h)*0.75);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.6, 'transparent');
  grad.addColorStop(1, color || 'rgba(0,0,0,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

// ── Torch helper (3-layer glow) ──
function drawTorch(ctx, x, y, now, color) {
  ctx.save();
  // Sconce bracket
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(x-5, y, 10, 18);
  ctx.fillRect(x-8, y+15, 16, 5);
  // Fire
  const flicker = Math.sin(now*8)*3 + Math.sin(now*13)*2;
  // Outer glow (largest, dimmest)
  const outerGrad = ctx.createRadialGradient(x+flicker*0.3, y-8, 0, x, y-4, 50);
  outerGrad.addColorStop(0, color + 'cc');
  outerGrad.addColorStop(0.3, color + '44');
  outerGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = outerGrad;
  ctx.beginPath(); ctx.arc(x, y-4, 50, 0, Math.PI*2); ctx.fill();
  // Mid glow
  const midGrad = ctx.createRadialGradient(x+flicker*0.5, y-6, 1, x, y-4, 25);
  midGrad.addColorStop(0, color);
  midGrad.addColorStop(0.5, color + '88');
  midGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = midGrad;
  ctx.beginPath(); ctx.arc(x+flicker*0.5, y-6, 25, 0, Math.PI*2); ctx.fill();
  // Bright core
  ctx.globalAlpha = 0.9;
  ctx.shadowColor = color; ctx.shadowBlur = 20;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+flicker*0.3, y-8, 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Light cast on surroundings
  const lightGrad = ctx.createRadialGradient(x, y, 5, x, y, 120);
  lightGrad.addColorStop(0, color + '30');
  lightGrad.addColorStop(0.5, color + '12');
  lightGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = lightGrad;
  ctx.fillRect(x-120, y-120, 240, 240);
  ctx.restore();
}

// ── Sunfire Colosseum — golden sunset sky, white stone terraces, columns, red banners, sand floor ──
function drawSunfireColosseum(ctx, w, h, floorY, now) {
  // Golden sunset sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, floorY);
  skyGrad.addColorStop(0, '#1a1408');
  skyGrad.addColorStop(0.25, '#2e2210');
  skyGrad.addColorStop(0.5, '#4a3818');
  skyGrad.addColorStop(0.75, '#6a4e20');
  skyGrad.addColorStop(1, '#7a5a28');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, floorY);
  // Sun with layered glow
  const sunX = w*0.75, sunY = h*0.08;
  ctx.save();
  const outerGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 120);
  outerGlow.addColorStop(0, 'rgba(255,215,100,0.2)');
  outerGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = outerGlow; ctx.beginPath(); ctx.arc(sunX, sunY, 120, 0, Math.PI*2); ctx.fill();
  const midGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 50);
  midGlow.addColorStop(0, 'rgba(255,200,80,0.5)');
  midGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = midGlow; ctx.beginPath(); ctx.arc(sunX, sunY, 50, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = '#ffd740'; ctx.shadowBlur = 25;
  ctx.fillStyle = 'rgba(255,230,130,0.9)';
  ctx.beginPath(); ctx.arc(sunX, sunY, 14, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // White stone terraces (tiered seating behind fighters)
  ctx.save();
  const terraceBase = floorY * 0.35;
  for (let t = 0; t < 4; t++) {
    const ty = terraceBase + t * 22;
    const inset = t * 12;
    ctx.fillStyle = `rgba(200,190,170,${0.12 - t*0.02})`;
    ctx.fillRect(inset, ty, w - inset*2, 18);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.strokeRect(inset, ty, w - inset*2, 18);
  }
  ctx.restore();
  // Crowd silhouettes on terraces
  ctx.save();
  for (let i = 0; i < 28; i++) {
    const cx = w*0.06 + i*w*0.033;
    const row = i % 3;
    const cy = terraceBase + row*22 + 5;
    const bob = Math.sin(now*1.8+i*1.3)*2;
    ctx.globalAlpha = 0.2 + row*0.03;
    ctx.fillStyle = '#2a2418';
    ctx.beginPath(); ctx.arc(cx, cy+bob, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(cx-3, cy+bob+4, 6, 10);
    if (i%5 === Math.floor(now*2)%5) ctx.fillRect(cx+3, cy+bob+2, 4, 6);
  }
  ctx.restore();
  // Stone columns on sides
  const colPositions = [w*0.06, w*0.16, w*0.84, w*0.94];
  colPositions.forEach((cx, idx) => {
    ctx.save();
    const colGrad = ctx.createLinearGradient(cx-8, 0, cx+8, 0);
    colGrad.addColorStop(0, '#c0b8a0');
    colGrad.addColorStop(0.3, '#e0d8c0');
    colGrad.addColorStop(0.7, '#d0c8b0');
    colGrad.addColorStop(1, '#b0a890');
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = colGrad;
    ctx.fillRect(cx-8, 0, 16, floorY);
    // Capital (ornate top)
    ctx.fillStyle = '#d4c8a8'; ctx.globalAlpha = 0.3;
    ctx.fillRect(cx-12, 0, 24, 10);
    ctx.fillRect(cx-10, 10, 20, 6);
    // Base
    ctx.fillRect(cx-12, floorY-8, 24, 8);
    // Vertical fluting
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-3, 16); ctx.lineTo(cx-3, floorY-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+3, 16); ctx.lineTo(cx+3, floorY-8); ctx.stroke();
    ctx.restore();
  });
  // Red banners hanging between columns
  const bannerPairs = [[w*0.11, w*0.06], [w*0.89, w*0.94]];
  bannerPairs.forEach(([bx]) => {
    ctx.save();
    const sway = Math.sin(now*0.7)*3;
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    ctx.moveTo(bx-8, 12); ctx.lineTo(bx+8+sway, 12);
    ctx.lineTo(bx+6+sway, floorY*0.55); ctx.lineTo(bx, floorY*0.6);
    ctx.lineTo(bx-6, floorY*0.55); ctx.closePath(); ctx.fill();
    // Gold trim on banner
    ctx.strokeStyle = '#ffd740'; ctx.lineWidth = 1; ctx.globalAlpha = 0.2;
    ctx.beginPath(); ctx.moveTo(bx-7, 14); ctx.lineTo(bx+7+sway*0.5, 14); ctx.stroke();
    ctx.restore();
  });
  // Sand floor
  const sandGrad = ctx.createLinearGradient(0, floorY, 0, h);
  sandGrad.addColorStop(0, '#c8a868');
  sandGrad.addColorStop(0.3, '#b89858');
  sandGrad.addColorStop(1, '#a08848');
  ctx.fillStyle = sandGrad; ctx.globalAlpha = 0.35;
  ctx.fillRect(0, floorY, w, h-floorY);
  ctx.globalAlpha = 1;
  drawFloorPerspective(ctx, w, h, floorY, '#9a8240', '#7a6830');
  // Dust motes in sunlight
  ctx.save();
  for (let i = 0; i < 12; i++) {
    const dx = (now*15*(i+1)*0.5) % (w+40) - 20;
    const dy = floorY*0.3 + Math.sin(now*0.5+i*2.1)*floorY*0.3;
    ctx.globalAlpha = 0.15 + Math.sin(now+i)*0.1;
    ctx.fillStyle = '#ffd740';
    ctx.beginPath(); ctx.arc(dx, dy, 1+i%2*0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  drawTorch(ctx, w*0.22, h*0.15, now, '#ffd740');
  drawTorch(ctx, w*0.78, h*0.15, now, '#ffd740');
  drawArenaVignette(ctx, w, h, 'rgba(15,10,4,0.4)');
}

// ── Hornwood Grand Ring — timber walls, bronze fittings, torchlit horse-lord arena ──
function drawHornwoodGrandRing(ctx, w, h, floorY, now) {
  // Dark amber background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
  bgGrad.addColorStop(0, '#1a1008');
  bgGrad.addColorStop(0.4, '#2a1c0e');
  bgGrad.addColorStop(1, '#1a1208');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);
  // Timber wall planks
  ctx.save();
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 12; i++) {
    const px = i * (w/12);
    const shade = 0.1 + (i%3)*0.03;
    ctx.fillStyle = `rgba(140,100,50,${shade})`;
    ctx.fillRect(px, 0, w/12 - 1, floorY);
    // Wood grain lines
    ctx.strokeStyle = 'rgba(90,60,25,0.2)'; ctx.lineWidth = 1;
    for (let g = 0; g < 3; g++) {
      const gy = floorY * (0.2 + g*0.3);
      ctx.beginPath();
      ctx.moveTo(px+2, gy);
      ctx.quadraticCurveTo(px+w/24, gy + Math.sin(i+g)*8, px+w/12-2, gy+3);
      ctx.stroke();
    }
  }
  ctx.restore();
  // Horizontal timber beams
  ctx.save();
  ctx.fillStyle = 'rgba(100,70,30,0.3)';
  ctx.fillRect(0, floorY*0.3, w, 8);
  ctx.fillRect(0, floorY*0.65, w, 8);
  ctx.strokeStyle = 'rgba(60,40,15,0.2)'; ctx.lineWidth = 1;
  ctx.strokeRect(0, floorY*0.3, w, 8);
  ctx.strokeRect(0, floorY*0.65, w, 8);
  ctx.restore();
  // Bronze corner fittings / medallions
  const medallionPos = [[w*0.12, floorY*0.3+4], [w*0.88, floorY*0.3+4], [w*0.12, floorY*0.65+4], [w*0.88, floorY*0.65+4]];
  medallionPos.forEach(([mx, my]) => {
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#cc8844';
    ctx.beginPath(); ctx.arc(mx, my, 6, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#aa6622'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(mx, my, 6, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#dda855'; ctx.globalAlpha = 0.2;
    ctx.beginPath(); ctx.arc(mx-1, my-1, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
  // Carved beast posts (horse-lord totems) on either side
  const posts = [w*0.05, w*0.95];
  posts.forEach((px, idx) => {
    ctx.save();
    ctx.globalAlpha = 0.4;
    const postGrad = ctx.createLinearGradient(px-6, 0, px+6, 0);
    postGrad.addColorStop(0, '#5a3a18');
    postGrad.addColorStop(0.5, '#7a5228');
    postGrad.addColorStop(1, '#5a3a18');
    ctx.fillStyle = postGrad;
    ctx.fillRect(px-6, floorY*0.15, 12, floorY*0.85);
    // Horse head carving at top
    ctx.fillStyle = '#8a6230';
    ctx.beginPath();
    const hx = px, hy = floorY*0.15;
    ctx.moveTo(hx-8, hy); ctx.lineTo(hx, hy-18); ctx.lineTo(hx+8, hy);
    ctx.closePath(); ctx.fill();
    // Eye detail
    ctx.fillStyle = '#cc8844'; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(hx, hy-6, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
  // Dirt/packed-earth floor
  const floorGrad = ctx.createLinearGradient(0, floorY, 0, h);
  floorGrad.addColorStop(0, '#4a3818');
  floorGrad.addColorStop(0.5, '#3a2e14');
  floorGrad.addColorStop(1, '#2a2010');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, floorY, w, h-floorY);
  drawFloorPerspective(ctx, w, h, floorY, '#5a4420', '#3a2a12');
  // Straw / hay scatter on floor
  ctx.save();
  ctx.strokeStyle = '#aa8840'; ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const sx = w*0.08 + Math.sin(i*3.7)*w*0.4 + i*w*0.04;
    const sy = floorY + 5 + (i%4)*8;
    ctx.globalAlpha = 0.15;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx+6+i%3*3, sy-3); ctx.stroke();
  }
  ctx.restore();
  // Animated crowd — rougher, rowdier
  ctx.save();
  for (let i = 0; i < 20; i++) {
    const cx = w*0.1 + i*w*0.04;
    const bob = Math.sin(now*2+i*1.2)*4 + Math.cos(now*3+i*0.8)*2;
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#2a1c0e';
    ctx.beginPath(); ctx.arc(cx, 20+bob, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(cx-4, 25+bob, 8, 12);
    // Some raising fists
    if (i%3 === Math.floor(now*2.5)%3) {
      ctx.fillRect(cx-1, 13+bob, 3, 8);
    }
  }
  ctx.restore();
  // Torches with warm amber light
  drawTorch(ctx, w*0.2, h*0.22, now, '#cc8844');
  drawTorch(ctx, w*0.8, h*0.22, now, '#cc8844');
  drawTorch(ctx, w*0.4, h*0.12, now, '#bb7733');
  drawTorch(ctx, w*0.6, h*0.12, now, '#bb7733');
  drawArenaVignette(ctx, w, h, 'rgba(12,8,2,0.5)');
}

// ── Frostglass Ring — blue-white stone, moonlit, ice crystals, snowfall, aurora ──
function drawFrostglassRing(ctx, w, h, floorY, now) {
  // Deep midnight blue sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, floorY);
  skyGrad.addColorStop(0, '#040810');
  skyGrad.addColorStop(0.4, '#081018');
  skyGrad.addColorStop(0.7, '#0c1822');
  skyGrad.addColorStop(1, '#102030');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, floorY);
  // Moon with glow
  const moonX = w*0.25, moonY = h*0.09;
  ctx.save();
  const moonOuter = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
  moonOuter.addColorStop(0, 'rgba(180,210,255,0.12)');
  moonOuter.addColorStop(1, 'transparent');
  ctx.fillStyle = moonOuter; ctx.beginPath(); ctx.arc(moonX, moonY, 80, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = '#88ccff'; ctx.shadowBlur = 20;
  ctx.fillStyle = 'rgba(200,220,255,0.8)';
  ctx.beginPath(); ctx.arc(moonX, moonY, 10, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Stars
  ctx.save();
  for (let i = 0; i < 25; i++) {
    const sx = (i*137.5+50) % w;
    const sy = (i*73.7+10) % (floorY*0.6);
    ctx.globalAlpha = 0.3 + Math.sin(now*2+i)*0.2;
    ctx.fillStyle = '#aaccff';
    ctx.beginPath(); ctx.arc(sx, sy, 0.8+i%2*0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // Aurora borealis effect
  ctx.save();
  for (let i = 0; i < 5; i++) {
    const ax = w*(0.1+i*0.2) + Math.sin(now*0.3+i*1.5)*30;
    const ay = floorY*0.15 + Math.sin(now*0.2+i)*15;
    const aGrad = ctx.createRadialGradient(ax, ay, 5, ax, ay, 60+i*10);
    const hue = i%2 === 0 ? 'rgba(100,200,255,' : 'rgba(100,255,180,';
    aGrad.addColorStop(0, hue + '0.08)');
    aGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = aGrad;
    ctx.beginPath(); ctx.ellipse(ax, ay, 60+i*10, 20, 0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // Ice-stone terraces
  ctx.save();
  for (let t = 0; t < 3; t++) {
    const ty = floorY*0.4 + t*20;
    ctx.fillStyle = `rgba(140,180,220,${0.08 - t*0.015})`;
    ctx.fillRect(0, ty, w, 16);
    ctx.strokeStyle = 'rgba(136,204,255,0.06)'; ctx.lineWidth = 1;
    ctx.strokeRect(0, ty, w, 16);
  }
  ctx.restore();
  // Ice crystal pillars on sides
  const icePos = [w*0.08, w*0.18, w*0.82, w*0.92];
  icePos.forEach(ix => {
    ctx.save();
    ctx.globalAlpha = 0.2;
    const iceGrad = ctx.createLinearGradient(ix-6, 0, ix+6, 0);
    iceGrad.addColorStop(0, '#6090b0');
    iceGrad.addColorStop(0.5, '#88ccff');
    iceGrad.addColorStop(1, '#6090b0');
    ctx.fillStyle = iceGrad;
    ctx.fillRect(ix-6, floorY*0.2, 12, floorY*0.8);
    // Crystalline facets
    ctx.strokeStyle = 'rgba(136,204,255,0.15)'; ctx.lineWidth = 1;
    for (let f = 0; f < 4; f++) {
      const fy = floorY*(0.25+f*0.18);
      ctx.beginPath(); ctx.moveTo(ix-6, fy); ctx.lineTo(ix, fy-5); ctx.lineTo(ix+6, fy); ctx.stroke();
    }
    // Top crystal point
    ctx.fillStyle = '#88ccff'; ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.moveTo(ix-8, floorY*0.2); ctx.lineTo(ix, floorY*0.2-15); ctx.lineTo(ix+8, floorY*0.2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
  // Ice floor
  const iceFloor = ctx.createLinearGradient(0, floorY, 0, h);
  iceFloor.addColorStop(0, '#1a2a3a');
  iceFloor.addColorStop(0.5, '#142230');
  iceFloor.addColorStop(1, '#0c1820');
  ctx.fillStyle = iceFloor;
  ctx.fillRect(0, floorY, w, h-floorY);
  drawFloorPerspective(ctx, w, h, floorY, '#2a3a4a', '#1a2838');
  // Reflective ice sheen on floor
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#88ccff';
  for (let i = 0; i < 5; i++) {
    const rx = w*(0.1+i*0.2);
    ctx.beginPath(); ctx.ellipse(rx, floorY+12, 40, 6, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // Snowfall particles
  ctx.save();
  for (let i = 0; i < 30; i++) {
    const sx = (i*w/30 + now*12*(1+i%3)) % (w+20) - 10;
    const sy = (now*25*(1+i%4*0.3) + i*47) % (h+20) - 10;
    ctx.globalAlpha = 0.25 + Math.sin(i*2.3)*0.1;
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath(); ctx.arc(sx, sy, 1+i%3*0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // Frost breath effect near floor
  ctx.save();
  for (let i = 0; i < 4; i++) {
    const fx = w*(0.15+i*0.25) + Math.sin(now*0.4+i)*20;
    const fy = floorY - 10;
    const fGrad = ctx.createRadialGradient(fx, fy, 2, fx, fy, 40);
    fGrad.addColorStop(0, 'rgba(180,220,255,0.1)');
    fGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = fGrad;
    ctx.beginPath(); ctx.ellipse(fx, fy, 40, 15, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  drawArenaVignette(ctx, w, h, 'rgba(2,6,12,0.5)');
}

// ── Ashmaw Crucible — volcanic obsidian, lava cracks, embers, black iron gates ──
function drawAshmawCrucible(ctx, w, h, floorY, now) {
  // Deep volcanic background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
  bgGrad.addColorStop(0, '#1a0800');
  bgGrad.addColorStop(0.3, '#220c04');
  bgGrad.addColorStop(0.6, '#1a0a02');
  bgGrad.addColorStop(1, '#100400');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);
  // Volcanic rock walls with jagged edges
  ctx.save();
  ctx.fillStyle = '#120600';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, floorY);
  for (let y = floorY; y > 0; y -= 12) ctx.lineTo(20+Math.sin(y*0.04)*12+Math.cos(y*0.09)*6, y);
  ctx.fill();
  ctx.beginPath(); ctx.moveTo(w, 0); ctx.lineTo(w, floorY);
  for (let y = floorY; y > 0; y -= 12) ctx.lineTo(w-20-Math.sin(y*0.05+1)*12-Math.cos(y*0.07)*6, y);
  ctx.fill();
  ctx.restore();
  // Wall cracks with orange lava glow
  ctx.save();
  ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2; ctx.globalAlpha = 0.35;
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 10;
  for (let i = 0; i < 6; i++) {
    const wy = h*0.08 + i*floorY*0.17;
    ctx.beginPath(); ctx.moveTo(4, wy); ctx.lineTo(10+Math.sin(i)*6, wy+18); ctx.lineTo(6, wy+35); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w-4, wy+12); ctx.lineTo(w-12-Math.cos(i)*5, wy+28); ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // Obsidian terraces
  ctx.save();
  for (let t = 0; t < 3; t++) {
    const ty = floorY*0.3 + t*25;
    ctx.fillStyle = `rgba(30,14,6,${0.5 - t*0.1})`;
    ctx.fillRect(0, ty, w, 20);
    ctx.strokeStyle = 'rgba(255,68,0,0.05)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, ty+20); ctx.lineTo(w, ty+20); ctx.stroke();
  }
  ctx.restore();
  // Black iron gates on sides
  const gates = [w*0.04, w*0.96];
  gates.forEach(gx => {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#0a0604';
    const gw = 14;
    ctx.fillRect(gx-gw/2, floorY*0.2, gw, floorY*0.8);
    // Gate bars
    ctx.strokeStyle = '#2a1a10'; ctx.lineWidth = 2;
    for (let b = 0; b < 5; b++) {
      const by = floorY*0.25 + b*floorY*0.15;
      ctx.beginPath(); ctx.moveTo(gx-gw/2, by); ctx.lineTo(gx+gw/2, by); ctx.stroke();
    }
    // Glowing rivets
    ctx.fillStyle = '#ff4422'; ctx.globalAlpha = 0.3;
    for (let r = 0; r < 3; r++) {
      ctx.beginPath(); ctx.arc(gx, floorY*0.3+r*floorY*0.2, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
  // Cracked obsidian floor
  ctx.fillStyle = '#1a0e06';
  ctx.fillRect(0, floorY, w, h-floorY);
  drawFloorPerspective(ctx, w, h, floorY, '#2a1408', '#1a0a04');
  // Floor lava cracks
  ctx.save();
  ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 8;
  for (let i = 0; i < 10; i++) {
    const sx = w*0.06+i*w*0.1;
    ctx.beginPath(); ctx.moveTo(sx, floorY+2);
    ctx.lineTo(sx+8+i*4, floorY+18+i*3); ctx.lineTo(sx-3+i*6, floorY+32); ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // Lava river at floor line
  const lavaGlow = 0.6 + Math.sin(now*3)*0.2;
  ctx.save();
  ctx.globalAlpha = lavaGlow * 0.6;
  ctx.fillStyle = '#ff2200';
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.moveTo(0, floorY+4);
  for (let x = 0; x <= w; x += 8) ctx.lineTo(x, floorY+4+Math.sin(x*0.02+now*2)*3);
  ctx.lineTo(w, floorY+14);
  for (let x = w; x >= 0; x -= 8) ctx.lineTo(x, floorY+14+Math.sin(x*0.025+now*2.5)*2.5);
  ctx.fill();
  ctx.globalAlpha = lavaGlow * 0.3;
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.moveTo(w*0.15, floorY+7);
  for (let x = w*0.15; x <= w*0.85; x += 10) ctx.lineTo(x, floorY+7+Math.sin(x*0.03+now*3)*2);
  ctx.lineTo(w*0.85, floorY+11);
  for (let x = w*0.85; x >= w*0.15; x -= 10) ctx.lineTo(x, floorY+11+Math.sin(x*0.04+now*3.5)*1.5);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Lava ambient glow
  const lavaAmb = ctx.createRadialGradient(w*0.5, floorY+8, 10, w*0.5, floorY+8, w*0.45);
  lavaAmb.addColorStop(0, 'rgba(255,60,0,0.12)');
  lavaAmb.addColorStop(0.5, 'rgba(255,34,0,0.05)');
  lavaAmb.addColorStop(1, 'transparent');
  ctx.fillStyle = lavaAmb;
  ctx.fillRect(0, floorY-40, w, 100);
  // Embers — big, bright, many
  ctx.save();
  for (let i = 0; i < 30; i++) {
    const ex = (w*0.05+i*w*0.033+now*18*(i%5+1))%w;
    const ey = (h*0.05+now*28+i*67)%h;
    const eSize = 1.5 + (i%4)*1.2;
    ctx.globalAlpha = 0.5 + Math.sin(now*3+i)*0.25;
    ctx.fillStyle = i%3===0 ? '#ff6600' : i%3===1 ? '#ff3300' : '#ffaa00';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(ex, ey, eSize, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
  // Smoke wisps near ceiling
  ctx.save();
  for (let i = 0; i < 5; i++) {
    const sx = w*(0.15+i*0.18) + Math.sin(now*0.4+i*2)*25;
    const sy = 15 + Math.sin(now*0.3+i)*8;
    const sGrad = ctx.createRadialGradient(sx, sy, 2, sx, sy, 35);
    sGrad.addColorStop(0, 'rgba(60,30,10,0.15)');
    sGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = sGrad;
    ctx.beginPath(); ctx.ellipse(sx, sy, 35, 12, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  drawArenaVignette(ctx, w, h, 'rgba(10,4,0,0.55)');
}

// ── Distance Bar on arena floor ──
function drawDistanceBar(ctx, w, h, floorY, accent) {
  ctx.save();
  const barY = floorY + 8;
  // Base line (visible)
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = accent;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(w*0.1, barY); ctx.lineTo(w*0.9, barY); ctx.stroke();
  // Distance tick markers
  ctx.globalAlpha = 0.4;
  for (let i = 0; i <= 10; i++) {
    const mx = w*0.1 + (w*0.8)*(i/10);
    ctx.beginPath(); ctx.moveTo(mx, barY-4); ctx.lineTo(mx, barY+4); ctx.stroke();
  }
  // Zone fills (visible)
  const zones = [
    { start:0, end:1, color:'#44ff44', label:'MELEE' },
    { start:2, end:3, color:'#ffff44', label:'MID' },
    { start:4, end:6, color:'#ffaa44', label:'RANGED' },
    { start:7, end:10, color:'#ff4444', label:'EXTREME' },
  ];
  zones.forEach(z => {
    const sx = w*0.1 + (w*0.8)*(z.start/10);
    const ex = w*0.1 + (w*0.8)*((z.end+1)/10);
    // Zone fill
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = z.color;
    ctx.fillRect(sx, barY-3, ex-sx, 6);
    // Zone label
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = z.color;
    ctx.font = `${Math.max(7, w*0.015)}px 'Quicksand', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(z.label, (sx+ex)/2, barY + 14);
  });
  // Player dot with glow
  const pDot = w*0.1 + (w*0.8)*((10-combat.distance)/20);
  const eDot = w*0.1 + (w*0.8)*((10+combat.distance)/20);
  const now = Date.now();
  ctx.globalAlpha = 0.8;
  ctx.shadowColor = '#66aaff'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#66aaff';
  ctx.beginPath(); ctx.arc(pDot, barY, 7 + Math.sin(now*0.005)*1, 0, Math.PI*2); ctx.fill();
  // Enemy dot with glow
  ctx.shadowColor = '#ff6666';
  ctx.fillStyle = '#ff6666';
  ctx.beginPath(); ctx.arc(eDot, barY, 7 + Math.sin(now*0.005+1)*1, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ── Turn Indicator ──
let turnIndicator = null;
function showTurnIndicator(isPlayerTurn) {
  turnIndicator = { isPlayer: isPlayerTurn, life: 1, start: Date.now() };
}

function drawTurnIndicator(ctx, w, h) {
  if (!turnIndicator) return;
  const t = turnIndicator;
  const elapsed = (Date.now() - t.start) / 1000;
  if (elapsed > 1.2) { turnIndicator = null; return; }
  const progress = Math.min(elapsed / 0.6, 1);
  const fade = elapsed > 0.8 ? 1 - (elapsed-0.8)/0.4 : 1;
  ctx.save();
  // Light sweep
  const sweepX = w * progress;
  const sweepColor = t.isPlayer ? '#4488ff' : '#ff4444';
  const sweepGrad = ctx.createLinearGradient(sweepX-60, 0, sweepX+30, 0);
  sweepGrad.addColorStop(0, 'transparent');
  sweepGrad.addColorStop(0.5, sweepColor);
  sweepGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = fade * 0.15;
  ctx.fillStyle = sweepGrad;
  ctx.fillRect(0, 0, w, h);
  // Turn text
  if (elapsed < 0.8) {
    ctx.globalAlpha = fade * 0.7;
    ctx.font = `bold ${Math.max(14, w*0.03)}px 'Cormorant Garamond', serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = sweepColor;
    ctx.shadowColor = sweepColor; ctx.shadowBlur = 15;
    ctx.fillText(t.isPlayer ? 'YOUR TURN' : 'ENEMY TURN', w*0.5, h*0.18);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

// ── Menu Background ──
function drawMenuBackground(ctx, w, h, now) {
  // ── Deep starfield sky gradient ──
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
  skyGrad.addColorStop(0, '#0a0a18');
  skyGrad.addColorStop(0.3, '#14143a');
  skyGrad.addColorStop(0.6, '#1f1f56');
  skyGrad.addColorStop(0.85, '#2a1a40');
  skyGrad.addColorStop(1, '#1a0c20');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, h);

  // ── Twinkling stars ──
  ctx.save();
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137.5 + 42) % w;
    const sy = (i * 97.3 + 15) % (h * 0.7);
    const twinkle = 0.15 + 0.6 * (0.5 + 0.5 * Math.sin(now * 1.5 + i * 3.7));
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = i % 5 === 0 ? '#aaccff' : i % 7 === 0 ? '#ffddaa' : '#ffffff';
    const sz = 0.5 + (i % 3) * 0.4;
    ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // ── Occasional shooting star ──
  const shootCycle = (now * 0.15) % 12;
  if (shootCycle < 0.6) {
    ctx.save();
    const sp = shootCycle / 0.6;
    const sx1 = w * 0.2 + sp * w * 0.5;
    const sy1 = h * 0.05 + sp * h * 0.2;
    ctx.globalAlpha = (1 - sp) * 0.6;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx1 - 30, sy1 - 8); ctx.stroke();
    ctx.restore();
  }

  // ── Nebula clouds — drifting violet/indigo/magenta mist ──
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const nx = w * (0.1 + i * 0.16) + Math.sin(now * 0.08 + i * 1.5) * w * 0.06;
    const ny = h * (0.2 + i * 0.08) + Math.cos(now * 0.06 + i * 2) * 15;
    const nRad = 80 + i * 25;
    const nGrad = ctx.createRadialGradient(nx, ny, 5, nx, ny, nRad);
    const colors = ['rgba(80,40,140,', 'rgba(60,30,120,', 'rgba(120,40,100,', 'rgba(50,25,100,', 'rgba(100,30,80,', 'rgba(70,35,130,'];
    nGrad.addColorStop(0, colors[i] + '0.12)');
    nGrad.addColorStop(0.5, colors[i] + '0.05)');
    nGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = nGrad;
    ctx.beginPath(); ctx.ellipse(nx, ny, nRad, nRad * 0.5, 0.2 * i, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // ── Horizon glow — magenta/pink ──
  ctx.save();
  const horizY = h * 0.78;
  const hGrad = ctx.createLinearGradient(0, horizY - 60, 0, horizY + 20);
  hGrad.addColorStop(0, 'transparent');
  hGrad.addColorStop(0.4, 'rgba(140,40,80,0.08)');
  hGrad.addColorStop(0.7, 'rgba(180,50,90,0.12)');
  hGrad.addColorStop(1, 'rgba(100,30,60,0.06)');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, horizY - 60, w, 80);
  ctx.restore();

  // ── Mountain silhouettes ──
  ctx.save();
  ctx.fillStyle = '#0a0810';
  // Far mountains (lighter)
  ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.moveTo(0, horizY);
  const farPeaks = [0.08,0.62, 0.18,0.52, 0.28,0.58, 0.38,0.48, 0.50,0.55, 0.58,0.45, 0.68,0.52, 0.78,0.58, 0.88,0.50, 1.0,0.60];
  for (let i = 0; i < farPeaks.length; i += 2) ctx.lineTo(w * farPeaks[i], h * farPeaks[i+1]);
  ctx.lineTo(w, horizY); ctx.closePath(); ctx.fill();
  // Near mountains (darker)
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#060510';
  ctx.beginPath(); ctx.moveTo(0, horizY);
  const nearPeaks = [0.05,0.72, 0.12,0.60, 0.22,0.68, 0.30,0.56, 0.40,0.65, 0.48,0.52, 0.55,0.62, 0.65,0.54, 0.75,0.64, 0.82,0.58, 0.92,0.66, 1.0,0.70];
  for (let i = 0; i < nearPeaks.length; i += 2) ctx.lineTo(w * nearPeaks[i], h * nearPeaks[i+1]);
  ctx.lineTo(w, horizY); ctx.closePath(); ctx.fill();
  // Moon rim lighting on mountain edges
  ctx.strokeStyle = 'rgba(140,120,180,0.06)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < nearPeaks.length; i += 2) {
    if (i === 0) ctx.moveTo(w * nearPeaks[i], h * nearPeaks[i+1]);
    else ctx.lineTo(w * nearPeaks[i], h * nearPeaks[i+1]);
  }
  ctx.stroke();
  ctx.restore();

  // ── Dark treeline at base of mountains ──
  ctx.save();
  ctx.fillStyle = '#050408';
  ctx.beginPath(); ctx.moveTo(0, horizY);
  for (let x = 0; x <= w; x += 8) {
    const treeH = 6 + Math.sin(x * 0.03) * 4 + Math.sin(x * 0.08 + 1) * 3;
    ctx.lineTo(x, horizY - treeH);
  }
  ctx.lineTo(w, horizY); ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath(); ctx.fill();
  ctx.restore();

  // ── Arcane Circle — rotating sigil behind menu ──
  ctx.save();
  const cx = w * 0.5, cy = h * 0.42;
  const circR = Math.min(w, h) * 0.28;
  const rot = now * 0.12;
  ctx.translate(cx, cy);
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#b8b0d8';
  ctx.lineWidth = 1.5;

  // Outer ring
  ctx.beginPath(); ctx.arc(0, 0, circR, 0, Math.PI * 2); ctx.stroke();
  // Inner ring
  ctx.beginPath(); ctx.arc(0, 0, circR * 0.68, 0, Math.PI * 2); ctx.stroke();
  // Innermost ring
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 0, circR * 0.35, 0, Math.PI * 2); ctx.stroke();

  // Rotating triangle
  ctx.save(); ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const a = Math.PI * 2 / 3 * i - Math.PI / 2;
    const px = Math.cos(a) * circR * 0.82;
    const py = Math.sin(a) * circR * 0.82;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.stroke();
  // Circles at triangle vertices
  for (let i = 0; i < 3; i++) {
    const a = Math.PI * 2 / 3 * i - Math.PI / 2;
    ctx.beginPath(); ctx.arc(Math.cos(a) * circR * 0.82, Math.sin(a) * circR * 0.82, circR * 0.08, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();

  // Counter-rotating triangle
  ctx.save(); ctx.rotate(-rot * 0.7);
  ctx.globalAlpha = 0.07;
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const a = Math.PI * 2 / 3 * i;
    const px = Math.cos(a) * circR * 0.6;
    const py = Math.sin(a) * circR * 0.6;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.stroke();
  ctx.restore();

  // Rune marks on outer ring
  ctx.save(); ctx.rotate(rot * 0.4);
  ctx.globalAlpha = 0.1;
  for (let i = 0; i < 12; i++) {
    const a = Math.PI * 2 / 12 * i;
    const r1 = circR * 0.9;
    const r2 = circR * 1.02;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
    ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    ctx.stroke();
  }
  ctx.restore();

  // Center orb
  ctx.globalAlpha = 0.08;
  ctx.beginPath(); ctx.arc(0, 0, circR * 0.12, 0, Math.PI * 2);
  ctx.fillStyle = '#8888cc'; ctx.fill();

  // Outer glow halo
  ctx.globalAlpha = 0.05;
  const halo = ctx.createRadialGradient(0, 0, circR * 0.8, 0, 0, circR * 1.3);
  halo.addColorStop(0, 'rgba(140,120,220,0.15)');
  halo.addColorStop(1, 'transparent');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(0, 0, circR * 1.3, 0, Math.PI * 2); ctx.fill();

  ctx.restore();

  // ── Floating magic particles ──
  ctx.save();
  for (let i = 0; i < 20; i++) {
    const px = (now * 8 * (i + 1) * 0.3 + i * 47) % (w + 40) - 20;
    const py = (h + 20 - (now * 12 + i * 83) % (h + 40));
    ctx.globalAlpha = 0.2 + Math.sin(now * 2 + i) * 0.1;
    ctx.fillStyle = i % 3 === 0 ? '#cc8844' : i % 3 === 1 ? '#8866cc' : '#6688cc';
    ctx.beginPath(); ctx.arc(px, py, 1 + i % 2 * 0.5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // ── Vignette ──
  drawArenaVignette(ctx, w, h, 'rgba(5,3,10,0.6)');
}

// ── Town Movement Update ──
function updateTown() {
  const spd = 2.2;
  let dx = 0, dy = 0;
  // Keyboard
  if (townKeys.up) { dy = -spd; townDir = 3; }
  if (townKeys.down) { dy = spd; townDir = 0; }
  if (townKeys.left) { dx = -spd; townDir = 1; }
  if (townKeys.right) { dx = spd; townDir = 2; }
  // Tap-to-move
  if (townTapTarget && !townKeys.up && !townKeys.down && !townKeys.left && !townKeys.right) {
    const tdx = townTapTarget.x - townPX;
    const tdy = townTapTarget.y - townPY;
    const dist = Math.sqrt(tdx*tdx + tdy*tdy);
    if (dist > 4) {
      dx = (tdx / dist) * spd;
      dy = (tdy / dist) * spd;
      if (Math.abs(tdx) > Math.abs(tdy)) townDir = tdx > 0 ? 2 : 1;
      else townDir = tdy > 0 ? 0 : 3;
    } else {
      townTapTarget = null;
    }
  }
  // Apply movement with building collision
  if (dx !== 0 || dy !== 0) {
    let nx = townPX + dx, ny = townPY + dy;
    // Clamp to bounds
    nx = Math.max(12, Math.min(TOWN_W - 12, nx));
    ny = Math.max(12, Math.min(TOWN_H - 12, ny));
    // Building collision (player is ~10px radius)
    let blocked = false;
    for (const b of TOWN_BUILDINGS) {
      if (nx > b.tx + 4 && nx < b.tx + b.tw - 4 && ny > b.ty + 4 && ny < b.ty + b.th - 4) {
        blocked = true; break;
      }
    }
    if (!blocked) { townPX = nx; townPY = ny; }
  }
  // Check proximity to building doors
  townPromptBldg = null;
  for (const b of TOWN_BUILDINGS) {
    const ddx = townPX - b.doorX;
    const ddy = townPY - b.doorY;
    if (Math.sqrt(ddx*ddx + ddy*ddy) < 22) { townPromptBldg = b; break; }
  }
}

// ── Town Canvas — 3/4 Top-Down Hub ──
function drawTown(ctx, w, h, now) {
  // Scale town to fit screen
  const scale = Math.min(w / TOWN_W, h / TOWN_H) * 0.85;
  const offX = (w - TOWN_W * scale) / 2;
  const offY = (h - TOWN_H * scale) / 2;
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(scale, scale);

  // ── Ground — warm earth tones ──
  const gGrad = ctx.createRadialGradient(200, 200, 30, 200, 200, 280);
  gGrad.addColorStop(0, '#3d3020');
  gGrad.addColorStop(0.5, '#2a2016');
  gGrad.addColorStop(1, '#1a150e');
  ctx.fillStyle = gGrad;
  ctx.fillRect(-offX/scale, -offY/scale, w/scale+10, h/scale+10);

  // DEBUG — bright test shapes to verify rendering
  ctx.fillStyle = '#ff0000'; ctx.fillRect(150, 150, 100, 100); // red square center
  ctx.fillStyle = '#00ff00'; ctx.fillRect(30, 90, 100, 65);    // green at bounty pos
  ctx.fillStyle = '#0000ff'; ctx.fillRect(270, 90, 100, 65);   // blue at armory pos
  ctx.fillStyle = '#ffff00'; ctx.fillRect(160, 30, 80, 60);    // yellow at sanctum pos

  // ── Cobblestone texture ──
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#5a4a30';
  for (let y = 0; y < TOWN_H; y += 12) {
    const off = (Math.floor(y/12)%2)*7;
    for (let x = -off; x < TOWN_W; x += 14) {
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(x+1, y+1, 12, 10, 2);
      else ctx.rect(x+1, y+1, 12, 10);
      ctx.fill();
    }
  }
  ctx.restore();

  // ── Grass patches at edges ──
  ctx.save();
  ctx.globalAlpha = 0.35;
  const grassColor = '#2a4a1a';
  ctx.fillStyle = grassColor;
  // Top grass
  ctx.fillRect(0, 0, TOWN_W, 20);
  ctx.fillRect(0, TOWN_H-15, TOWN_W, 15);
  ctx.fillRect(0, 0, 18, TOWN_H);
  ctx.fillRect(TOWN_W-18, 0, 18, TOWN_H);
  ctx.restore();

  // ── Paths — lighter stone connecting buildings ──
  ctx.save();
  ctx.fillStyle = '#4a3d28';
  // Vertical path (fountain to sanctum and arena)
  ctx.fillRect(188, 25, 24, TOWN_H-25);
  // Horizontal paths
  ctx.fillRect(25, 148, 350, 18);
  ctx.fillRect(25, 258, 350, 18);
  // Path borders
  ctx.strokeStyle = 'rgba(120,100,60,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(188, 25, 24, TOWN_H-25);
  ctx.strokeRect(25, 148, 350, 18);
  ctx.strokeRect(25, 258, 350, 18);
  ctx.restore();

  // ── Central Fountain ──
  const fx = 200, fy = 200;
  ctx.save();
  // Fountain base (stone)
  ctx.fillStyle = '#6a5a40';
  ctx.beginPath(); ctx.ellipse(fx, fy, 30, 20, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#8a7a58'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(fx, fy, 30, 20, 0, 0, Math.PI*2); ctx.stroke();
  // Inner wall
  ctx.fillStyle = '#5a4a32';
  ctx.beginPath(); ctx.ellipse(fx, fy, 25, 16, 0, 0, Math.PI*2); ctx.fill();
  // Water
  ctx.fillStyle = 'rgba(60,130,180,0.6)';
  ctx.beginPath(); ctx.ellipse(fx, fy, 22, 14, 0, 0, Math.PI*2); ctx.fill();
  // Water shimmer
  ctx.fillStyle = 'rgba(120,190,240,0.35)';
  const shimX = Math.sin(now*1.5)*6;
  ctx.beginPath(); ctx.ellipse(fx+shimX, fy-2, 10, 5, 0, 0, Math.PI*2); ctx.fill();
  // Center pillar
  ctx.fillStyle = '#7a6a48';
  ctx.fillRect(fx-3, fy-18, 6, 16);
  // Water spout
  ctx.fillStyle = 'rgba(140,200,255,0.5)';
  ctx.beginPath(); ctx.arc(fx, fy-20, 4+Math.sin(now*3)*1.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Lantern posts ──
  const lanternPos = [[100,160],[300,160],[100,268],[300,268],[200,120],[200,300]];
  lanternPos.forEach(([lx,ly], i) => {
    const flk = 0.8+Math.sin(now*5+i*2.3)*0.2;
    // Post
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(lx-2, ly-16, 4, 16);
    // Lantern body
    ctx.fillStyle = '#6a4a20';
    ctx.fillRect(lx-3, ly-20, 6, 6);
    // Lantern glow (much brighter)
    const lg = ctx.createRadialGradient(lx, ly-17, 3, lx, ly-17, 55);
    lg.addColorStop(0, `rgba(255,190,90,${0.5*flk})`);
    lg.addColorStop(0.3, `rgba(255,160,60,${0.2*flk})`);
    lg.addColorStop(0.7, `rgba(255,120,30,${0.05*flk})`);
    lg.addColorStop(1, 'transparent');
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.arc(lx, ly-17, 55, 0, Math.PI*2); ctx.fill();
    // Flame
    ctx.fillStyle = `rgba(255,220,100,${0.9*flk})`;
    ctx.beginPath(); ctx.arc(lx, ly-17, 2.5, 0, Math.PI*2); ctx.fill();
  });

  // ── Draw buildings (3/4 top-down) ──
  TOWN_BUILDINGS.forEach(b => {
    const isNear = townPromptBldg === b;

    // Building shadow
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(b.tx+5, b.ty+5, b.tw, b.th);
    ctx.restore();

    // Building body — warm wood/stone
    ctx.save();
    const bGrad = ctx.createLinearGradient(b.tx, b.ty, b.tx, b.ty+b.th);
    bGrad.addColorStop(0, '#5a4830');
    bGrad.addColorStop(0.5, '#4a3a24');
    bGrad.addColorStop(1, '#3a2c1a');
    ctx.fillStyle = bGrad;
    ctx.fillRect(b.tx, b.ty, b.tw, b.th);

    // Wall texture lines
    ctx.strokeStyle = 'rgba(90,70,40,0.3)'; ctx.lineWidth = 0.5;
    for (let wy = b.ty+8; wy < b.ty+b.th; wy += 10) {
      ctx.beginPath(); ctx.moveTo(b.tx+2, wy); ctx.lineTo(b.tx+b.tw-2, wy); ctx.stroke();
    }

    // Roof (3/4 perspective)
    const roofH = b.th * 0.35;
    // Roof fill — distinct per building
    const roofColors = {shop:'#6a3a18', bounty:'#5a2222', moonwell:'#2a3a5a', sanctum:'#4a3a5a', armory:'#3a4a4a', arena:'#5a4a18'};
    ctx.fillStyle = roofColors[b.id] || '#4a3018';
    ctx.beginPath();
    ctx.moveTo(b.tx-6, b.ty);
    ctx.lineTo(b.tx+b.tw/2, b.ty-roofH);
    ctx.lineTo(b.tx+b.tw+6, b.ty);
    ctx.closePath(); ctx.fill();
    // Roof edge
    ctx.strokeStyle = 'rgba(255,220,160,0.15)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(b.tx-6, b.ty);
    ctx.lineTo(b.tx+b.tw/2, b.ty-roofH);
    ctx.lineTo(b.tx+b.tw+6, b.ty);
    ctx.stroke();

    // Building-specific details
    if (b.id === 'shop') {
      // Forge glow (bright orange)
      const fgGrad = ctx.createRadialGradient(b.tx+b.tw*0.3, b.ty+b.th*0.6, 3, b.tx+b.tw*0.3, b.ty+b.th*0.6, 35);
      fgGrad.addColorStop(0, 'rgba(255,140,40,0.5)');
      fgGrad.addColorStop(0.5, 'rgba(255,100,20,0.15)');
      fgGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = fgGrad;
      ctx.fillRect(b.tx-10, b.ty-10, b.tw+20, b.th+20);
      // Anvil
      ctx.fillStyle = '#666';
      ctx.fillRect(b.tx+b.tw-24, b.ty+b.th-14, 14, 10);
      ctx.fillStyle = '#888';
      ctx.fillRect(b.tx+b.tw-22, b.ty+b.th-14, 10, 3);
      // Chimney
      ctx.fillStyle = '#4a3018';
      ctx.fillRect(b.tx+14, b.ty-roofH-12, 10, 14);
      // Chimney smoke
      ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#aa9977';
      for (let s=0;s<3;s++) {
        ctx.beginPath(); ctx.arc(b.tx+19+Math.sin(now*0.5+s)*4, b.ty-roofH-16-s*9, 5+s*3, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
      // Sparks
      for (let s=0;s<5;s++) {
        const sx = b.tx+b.tw*0.3+(now*15+s*37)%25-12;
        const sy = b.ty+b.th*0.4-(now*10+s*23)%20;
        ctx.fillStyle = `rgba(255,180,40,${0.6+Math.sin(now*4+s)*0.3})`;
        ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI*2); ctx.fill();
      }
    }
    else if (b.id === 'bounty') {
      // Red banners (brighter)
      const banSway = Math.sin(now*0.7)*2;
      ctx.fillStyle = 'rgba(200,50,30,0.7)';
      ctx.fillRect(b.tx+b.tw/2-5+banSway, b.ty+4, 10, 24);
      ctx.fillRect(b.tx+8, b.ty+4, 8, 18);
      ctx.fillRect(b.tx+b.tw-16, b.ty+4, 8, 18);
      // Crossed swords emblem
      ctx.strokeStyle = 'rgba(220,200,160,0.6)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(b.tx+b.tw/2-10, b.ty+15); ctx.lineTo(b.tx+b.tw/2+10, b.ty+32); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.tx+b.tw/2+10, b.ty+15); ctx.lineTo(b.tx+b.tw/2-10, b.ty+32); ctx.stroke();
      // Braziers
      ctx.fillStyle = '#555';
      ctx.fillRect(b.tx+4, b.ty+b.th-10, 10, 8);
      ctx.fillRect(b.tx+b.tw-14, b.ty+b.th-10, 10, 8);
      // Brazier fire glow
      const bfg = ctx.createRadialGradient(b.tx+9, b.ty+b.th-10, 2, b.tx+9, b.ty+b.th-10, 18);
      bfg.addColorStop(0, 'rgba(255,120,30,0.4)'); bfg.addColorStop(1, 'transparent');
      ctx.fillStyle = bfg; ctx.fillRect(b.tx-10, b.ty+b.th-28, 38, 36);
    }
    else if (b.id === 'moonwell') {
      // Glowing moonwell pool (much brighter)
      const mGrad = ctx.createRadialGradient(b.tx+b.tw/2, b.ty+b.th*0.6, 5, b.tx+b.tw/2, b.ty+b.th*0.6, 35);
      mGrad.addColorStop(0, 'rgba(80,200,255,0.6)');
      mGrad.addColorStop(0.4, 'rgba(60,160,220,0.2)');
      mGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = mGrad;
      ctx.fillRect(b.tx-15, b.ty-15, b.tw+30, b.th+30);
      // Pool
      ctx.fillStyle = 'rgba(60,160,220,0.5)';
      ctx.beginPath(); ctx.ellipse(b.tx+b.tw/2, b.ty+b.th*0.6, 16, 10, 0, 0, Math.PI*2); ctx.fill();
      // Floating runes (brighter)
      ctx.save(); ctx.globalAlpha = 0.6; ctx.fillStyle = '#66ddff';
      for (let r=0;r<4;r++) {
        const ra = now*0.5+r*Math.PI/2;
        ctx.beginPath(); ctx.arc(b.tx+b.tw/2+Math.cos(ra)*14, b.ty+b.th*0.6+Math.sin(ra)*8, 2, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
      // Hanging herbs
      ctx.fillStyle = 'rgba(80,140,60,0.5)';
      ctx.fillRect(b.tx+8, b.ty+3, 4, 10);
      ctx.fillRect(b.tx+b.tw-12, b.ty+3, 4, 10);
    }
    else if (b.id === 'sanctum') {
      // Warm window glow (much brighter)
      ctx.fillStyle = 'rgba(255,200,100,0.6)';
      ctx.fillRect(b.tx+b.tw*0.25, b.ty+b.th*0.3, 10, 12);
      ctx.fillRect(b.tx+b.tw*0.6, b.ty+b.th*0.3, 10, 12);
      // Window glow radius
      const swg = ctx.createRadialGradient(b.tx+b.tw/2, b.ty+b.th*0.4, 5, b.tx+b.tw/2, b.ty+b.th*0.4, 35);
      swg.addColorStop(0, 'rgba(255,180,70,0.25)'); swg.addColorStop(1, 'transparent');
      ctx.fillStyle = swg; ctx.fillRect(b.tx-15, b.ty-15, b.tw+30, b.th+30);
      // Vines
      ctx.strokeStyle = 'rgba(80,160,60,0.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(b.tx, b.ty+8); ctx.quadraticCurveTo(b.tx-6, b.ty+25, b.tx+4, b.ty+45); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.tx+b.tw, b.ty+12); ctx.quadraticCurveTo(b.tx+b.tw+5, b.ty+30, b.tx+b.tw-3, b.ty+48); ctx.stroke();
      // Door (wooden with warm glow)
      ctx.fillStyle = '#6a4a28';
      ctx.fillRect(b.doorX-5, b.ty+b.th-14, 10, 14);
    }
    else if (b.id === 'armory') {
      // Iron door (prominent)
      ctx.fillStyle = '#3a3a40';
      ctx.fillRect(b.tx+b.tw/2-10, b.ty+b.th-20, 20, 20);
      ctx.strokeStyle = '#5a5a60'; ctx.lineWidth = 1.5;
      ctx.strokeRect(b.tx+b.tw/2-10, b.ty+b.th-20, 20, 20);
      // Door rivets
      ctx.fillStyle = '#7a7a80';
      ctx.beginPath(); ctx.arc(b.tx+b.tw/2-5, b.ty+b.th-14, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(b.tx+b.tw/2+5, b.ty+b.th-14, 1.5, 0, Math.PI*2); ctx.fill();
      // Weapon racks (outside)
      ctx.strokeStyle = 'rgba(160,140,100,0.5)'; ctx.lineWidth = 1.5;
      // Sword
      ctx.beginPath(); ctx.moveTo(b.tx+8, b.ty+10); ctx.lineTo(b.tx+8, b.ty+35); ctx.stroke();
      // Axe
      ctx.beginPath(); ctx.moveTo(b.tx+b.tw-8, b.ty+10); ctx.lineTo(b.tx+b.tw-8, b.ty+35); ctx.stroke();
      ctx.fillStyle = 'rgba(160,140,100,0.4)';
      ctx.fillRect(b.tx+b.tw-12, b.ty+10, 8, 6);
      // Shield display
      ctx.save(); ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#778899';
      ctx.beginPath();
      ctx.moveTo(b.tx+b.tw/2, b.ty+8); ctx.lineTo(b.tx+b.tw/2+10, b.ty+14);
      ctx.lineTo(b.tx+b.tw/2, b.ty+26); ctx.lineTo(b.tx+b.tw/2-10, b.ty+14);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#99aabb'; ctx.lineWidth = 1; ctx.stroke();
      ctx.restore();
    }
    else if (b.id === 'arena') {
      // Grand gate — darker and imposing
      ctx.fillStyle = '#2a1c0c';
      ctx.fillRect(b.tx, b.ty, b.tw, b.th);
      // Gate arch (gold, brighter)
      ctx.strokeStyle = 'rgba(255,215,64,0.5)'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(b.tx+12, b.ty+b.th);
      ctx.quadraticCurveTo(b.tx+b.tw/2, b.ty-8, b.tx+b.tw-12, b.ty+b.th);
      ctx.stroke();
      // Inner arch glow
      ctx.strokeStyle = 'rgba(255,200,40,0.2)'; ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(b.tx+12, b.ty+b.th);
      ctx.quadraticCurveTo(b.tx+b.tw/2, b.ty-8, b.tx+b.tw-12, b.ty+b.th);
      ctx.stroke();
      // Torches (brighter)
      const tf = 0.8+Math.sin(now*6)*0.2;
      ctx.fillStyle = `rgba(255,200,80,${0.8*tf})`;
      ctx.beginPath(); ctx.arc(b.tx+8, b.ty+8, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(b.tx+b.tw-8, b.ty+8, 4, 0, Math.PI*2); ctx.fill();
      // Torch glow
      const tg = ctx.createRadialGradient(b.tx+8, b.ty+8, 2, b.tx+8, b.ty+8, 20);
      tg.addColorStop(0, `rgba(255,180,60,${0.3*tf})`); tg.addColorStop(1, 'transparent');
      ctx.fillStyle = tg; ctx.fillRect(b.tx-12, b.ty-12, 40, 40);
      const tg2 = ctx.createRadialGradient(b.tx+b.tw-8, b.ty+8, 2, b.tx+b.tw-8, b.ty+8, 20);
      tg2.addColorStop(0, `rgba(255,180,60,${0.3*tf})`); tg2.addColorStop(1, 'transparent');
      ctx.fillStyle = tg2; ctx.fillRect(b.tx+b.tw-28, b.ty-12, 40, 40);
      // "ARENA" text
      ctx.save();
      ctx.font = `700 6px 'Cinzel', serif`;
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,215,64,0.5)';
      ctx.fillText('ARENA', b.tx+b.tw/2, b.ty+b.th-4);
      ctx.restore();
    }

    // Door indicator (wooden door)
    if (b.id !== 'sanctum' && b.id !== 'armory') {
      ctx.fillStyle = '#5a3a18';
      ctx.fillRect(b.doorX-6, b.doorY-3, 12, 6);
    }

    // Wall outline
    ctx.strokeStyle = 'rgba(160,140,100,0.15)'; ctx.lineWidth = 1;
    ctx.strokeRect(b.tx, b.ty, b.tw, b.th);
    ctx.restore(); // close building body save

    // Highlight glow when near
    if (isNear) {
      ctx.save();
      const grd = ctx.createRadialGradient(b.tx+b.tw/2, b.ty+b.th/2, 0, b.tx+b.tw/2, b.ty+b.th/2, Math.max(b.tw,b.th)*0.9);
      grd.addColorStop(0, b.color + '60');
      grd.addColorStop(0.6, b.color + '20');
      grd.addColorStop(1, 'transparent');
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = grd;
      ctx.fillRect(b.tx-20, b.ty-20, b.tw+40, b.th+40);
      ctx.restore();
    }

    // Label
    ctx.save();
    ctx.font = `700 10px 'Cinzel', serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    // Background pill
    const labelTxt = b.label;
    const labelW = ctx.measureText(labelTxt).width + 10;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(b.tx+b.tw/2-labelW/2, b.ty+b.th+3, labelW, 14, 3);
    else ctx.rect(b.tx+b.tw/2-labelW/2, b.ty+b.th+3, labelW, 14);
    ctx.fill();
    // Text
    ctx.fillStyle = isNear ? b.color : '#c8b890';
    if (isNear) { ctx.shadowColor = b.color; ctx.shadowBlur = 6; }
    ctx.fillText(labelTxt, b.tx+b.tw/2, b.ty+b.th+5);
    ctx.restore();
  });

  // ── Decorative elements — benches, barrels ──
  ctx.save();
  // Benches near fountain
  ctx.fillStyle = '#6a4a28';
  ctx.fillRect(172, 224, 16, 6); ctx.fillRect(212, 224, 16, 6);
  ctx.fillRect(172, 174, 16, 6); ctx.fillRect(212, 174, 16, 6);
  // Bench legs
  ctx.fillStyle = '#5a3a18';
  ctx.fillRect(174, 230, 3, 3); ctx.fillRect(185, 230, 3, 3);
  ctx.fillRect(214, 230, 3, 3); ctx.fillRect(225, 230, 3, 3);
  // Barrels near forge
  ctx.fillStyle = '#5a3a18';
  ctx.beginPath(); ctx.ellipse(136, 330, 7, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#7a5a30'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(136, 330, 7, 5, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(144, 324, 6, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(144, 324, 6, 5, 0, 0, Math.PI*2); ctx.stroke();
  ctx.restore();

  // ── Boundary foliage — trees at edges ──
  ctx.save();
  const treePosns = [
    [10,10],[50,5],[90,8],[150,2],[250,5],[310,8],[360,4],[390,10],
    [5,80],[5,180],[5,250],[5,340],[395,80],[395,180],[395,250],[395,340],
    [30,395],[100,392],[200,398],[300,393],[370,396]
  ];
  treePosns.forEach(([tx,ty], i) => {
    // Tree shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(tx+2, ty+2, 12+i%4*3, 8+i%3*2, 0, 0, Math.PI*2); ctx.fill();
    // Tree foliage (dark green, varied sizes)
    ctx.fillStyle = `rgba(${20+i%3*15},${50+i%4*15},${15+i%3*10},0.7)`;
    ctx.beginPath(); ctx.ellipse(tx, ty, 12+i%4*3, 8+i%3*2, 0, 0, Math.PI*2); ctx.fill();
    // Highlight
    ctx.fillStyle = `rgba(${40+i%3*15},${80+i%4*15},${30+i%3*10},0.3)`;
    ctx.beginPath(); ctx.ellipse(tx-2, ty-2, 8+i%4*2, 5+i%3, 0, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();

  // ── Player character (in virtual coordinates) ──
  if (player.race) {
    const charH = 30;
    const charW = charH * 0.55;
    const breathe = Math.sin(now * 3) * 0.8;
    // Ground shadow
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(townPX, townPY+3, charW*0.6, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Character image
    const pImg = getCharImg(player.race, getModelLv(player.equipment), player.equipment.weapon?.weaponType||'sword');
    if (pImg.complete && pImg.naturalWidth) {
      ctx.drawImage(pImg, townPX-charW/2, townPY-charH+breathe, charW, charH);
    } else {
      // Fallback — draw a simple colored circle if image not loaded
      ctx.save();
      ctx.fillStyle = '#e8a060';
      ctx.beginPath(); ctx.arc(townPX, townPY-charH/2, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#8a6040';
      ctx.fillRect(townPX-4, townPY-charH/2+4, 8, 12);
      ctx.restore();
    }
    // Player glow indicator
    ctx.save();
    const pglow = ctx.createRadialGradient(townPX, townPY, 2, townPX, townPY, 16);
    pglow.addColorStop(0, 'rgba(255,220,120,0.15)');
    pglow.addColorStop(1, 'transparent');
    ctx.fillStyle = pglow;
    ctx.beginPath(); ctx.arc(townPX, townPY, 16, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── "Press E to Enter" prompt ──
  if (townPromptBldg) {
    const b = townPromptBldg;
    const px = b.doorX, py = b.doorY - 22;
    const bob = Math.sin(now*3)*2;
    ctx.save();
    ctx.font = `700 8px 'Cinzel', serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    const txt = 'Press E / Tap';
    const tw = ctx.measureText(txt).width + 12;
    // Background pill
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(px-tw/2, py+bob-12, tw, 15, 4);
    else ctx.rect(px-tw/2, py+bob-12, tw, 15);
    ctx.fill();
    ctx.strokeStyle = b.color + '80'; ctx.lineWidth = 1;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(px-tw/2, py+bob-12, tw, 15, 4);
    else ctx.rect(px-tw/2, py+bob-12, tw, 15);
    ctx.stroke();
    // Text
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color; ctx.shadowBlur = 6;
    ctx.fillText(txt, px, py+bob);
    ctx.restore();
  }

  // Restore virtual coordinate transform
  ctx.restore();

  // ── Moon and stars (screen space) ──
  ctx.save();
  const moonX = w * 0.82, moonY = h * 0.08;
  ctx.fillStyle = 'rgba(255,240,210,0.8)';
  ctx.beginPath(); ctx.arc(moonX, moonY, Math.max(5, w*0.015), 0, Math.PI*2); ctx.fill();
  const moonGlow = ctx.createRadialGradient(moonX, moonY, 3, moonX, moonY, Math.max(30, w*0.08));
  moonGlow.addColorStop(0, 'rgba(255,240,210,0.15)');
  moonGlow.addColorStop(0.5, 'rgba(255,230,200,0.05)');
  moonGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = moonGlow;
  ctx.beginPath(); ctx.arc(moonX, moonY, w*0.08, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Twinkling stars
  ctx.save();
  for (let i = 0; i < 40; i++) {
    const sx = (i*137+50) % w;
    const sy = (i*97+15) % (h*0.35);
    const twinkle = 0.2 + 0.5*(0.5+0.5*Math.sin(now*2+i*3.7));
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = i%3===0 ? '#ffd080' : '#ffffee';
    ctx.beginPath(); ctx.arc(sx, sy, 0.8+i%2*0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── Character Drawing Helpers ──
function drawGroundShadow(ctx, x, floorY, charW, arenaColor) {
  ctx.save();
  const grad = ctx.createRadialGradient(x, floorY, 0, x, floorY, charW * 0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0.25)');
  grad.addColorStop(0.6, 'rgba(0,0,0,0.1)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(x, floorY, charW * 0.7, charW * 0.15, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCharacterGlow(ctx, x, y, charW, charH, accentColor, tierLevel, now) {
  ctx.save();
  const pulse = tierLevel >= 4 ? (0.15 + Math.sin(now*0.004)*0.1) : 0.18;
  const grad = ctx.createRadialGradient(x, y + charH*0.4, charW*0.1, x, y + charH*0.4, charW*0.9);
  grad.addColorStop(0, accentColor + (tierLevel>=4?'40':'25'));
  grad.addColorStop(0.5, accentColor + '15');
  grad.addColorStop(1, 'transparent');
  ctx.globalAlpha = pulse;
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(x, y + charH*0.4, charW*0.9, charH*0.55, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCanvasHealthBar(ctx, x, y, width, current, max, color1, color2) {
  const barH = 6;
  const pct = Math.max(0, Math.min(1, current / max));
  // Background
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#0d0a1a';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - width/2, y, width, barH, 3);
  else ctx.rect(x - width/2, y, width, barH);
  ctx.fill();
  // Fill
  ctx.globalAlpha = 0.9;
  const grad = ctx.createLinearGradient(x - width/2, 0, x - width/2 + width*pct, 0);
  grad.addColorStop(0, color1);
  grad.addColorStop(1, color2);
  ctx.fillStyle = grad;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - width/2, y, width*pct, barH, 3);
  else ctx.rect(x - width/2, y, width*pct, barH);
  ctx.fill();
  // Border
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#b8a9d4';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - width/2, y, width, barH, 3);
  else ctx.rect(x - width/2, y, width, barH);
  ctx.stroke();
  ctx.restore();
}

// ── Character Drawing ──
function drawCombatCharacters() {
  if (gameState !== ST.COMBAT || !combat.enemy) return;
  const ctx = gameCtx;
  const w = window.innerWidth, h = window.innerHeight;
  const now = Date.now();
  const floorY = h * 0.72;

  const charH = Math.min(h * 0.45, 300);
  const charW = charH * 0.55;
  const barW = charW * 0.9;

  // Distance-reactive positions
  const dist = combat.distance != null ? combat.distance : 5;
  const pBaseX = w * (0.5 - dist * 0.042);
  const eBaseX = w * (0.5 + dist * 0.042);

  // Idle breathing animation
  const breatheScale = 1 + Math.sin(now * 0.003) * 0.015;
  const breatheY = Math.sin(now * 0.003) * 2;

  // Player
  const pX = pBaseX + playerAnimOff.x + shakeX;
  const pY = floorY - charH + playerAnimOff.y + shakeY + breatheY;
  const arenaAccent = ARENAS[progression.arena]?.accent || '#ff4444';

  // Ground shadow
  drawGroundShadow(ctx, pX, floorY, charW, arenaAccent);

  // Player glow halo
  const pTier = Math.min(Math.round(Object.values(player.equipment).filter(Boolean).reduce((s,e)=>s+e.tier,0) / Math.max(1,Object.values(player.equipment).filter(Boolean).length)), 4);
  const pAccent = ITEM_TIERS[pTier]?.color || '#a0a0a0';
  drawCharacterGlow(ctx, pX, pY, charW, charH, pAccent, pTier, now);

  // Draw player with breathing
  ctx.save();
  ctx.globalAlpha = playerAnimOff.opacity;
  const pImg = getCharImg(player.race, getModelLv(player.equipment), player.equipment.weapon?.weaponType||'sword');
  if (pImg.complete && pImg.naturalWidth) {
    ctx.translate(pX, pY + charH);
    ctx.scale(1, breatheScale);
    ctx.drawImage(pImg, -charW/2, -charH, charW, charH);
  }
  ctx.restore();

  // Player health bars
  const pBarY = pY - 14;
  drawCanvasHealthBar(ctx, pX, pBarY, barW, player.hp, player.maxHp, '#cc2222', '#ff4444');
  if (player.maxStamina > 0) drawCanvasHealthBar(ctx, pX, pBarY - 8, barW, player.stamina, player.maxStamina, '#cc8800', '#ffaa00');
  if (player.maxMana > 0) drawCanvasHealthBar(ctx, pX, pBarY - 16, barW, player.mana, player.maxMana, '#2244cc', '#4488ff');

  // Status particles for player
  spawnStatusParticles(pX, pY, charH, player.statusEffects);

  // Enemy
  const eX = eBaseX + enemyAnimOff.x + shakeX;
  const eY = floorY - charH + enemyAnimOff.y + shakeY + breatheY;
  const e = combat.enemy;

  // Ground shadow
  drawGroundShadow(ctx, eX, floorY, charW, arenaAccent);

  // Enemy glow halo
  const eAccent = ITEM_TIERS[e.equipTier]?.color || '#a0a0a0';
  drawCharacterGlow(ctx, eX, eY, charW, charH, eAccent, e.equipTier, now);

  // Draw enemy (flipped) with breathing
  ctx.save();
  ctx.globalAlpha = enemyAnimOff.opacity;
  const eImg = getCharImg(e.race, ITEM_TIERS[e.equipTier].modelLv, e.weapon);
  if (eImg.complete && eImg.naturalWidth) {
    ctx.translate(eX, eY + charH);
    ctx.scale(-1, breatheScale);
    ctx.drawImage(eImg, -charW/2, -charH, charW, charH);
  }
  ctx.restore();

  // Enemy health bars
  const eBarY = eY - 14;
  drawCanvasHealthBar(ctx, eX, eBarY, barW, e.hp, e.maxHp, '#cc2222', '#ff4444');
  if (e.maxStamina > 0) drawCanvasHealthBar(ctx, eX, eBarY - 8, barW, e.stamina, e.maxStamina, '#cc8800', '#ffaa00');

  // Status particles for enemy
  spawnStatusParticles(eX, eY, charH, e.statusEffects);

  ctx.globalAlpha = 1;
}

// ── Main Game Loop ──
function gameLoop() {
  const w = window.innerWidth, h = window.innerHeight;

  // Clear canvases
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
  partCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);

  // Update
  updateShake();
  updateParts();
  if (gameState === ST.TOWN) updateTown();

  // Draw
  drawBackground();
  if (gameState === ST.COMBAT) {
    drawCombatCharacters();
    drawSlashTrails(partCtx);
    drawImpactFlashes(partCtx);
    drawShieldDome(partCtx);
    drawParts(partCtx);
    drawScreenFlash(partCtx, w, h);
    drawTurnIndicator(partCtx, w, h);
  }

  requestAnimationFrame(gameLoop);
}

// ── Initialization ──
function init() {
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  // Touch prevention
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => { if(gameState===ST.COMBAT) e.preventDefault(); }, { passive: false });
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Menu buttons
  document.getElementById('btn-new-game').onclick = () => {
    Snd.click();
    createStep=0; createRace='human'; createName=''; createBonusPoints=10;
    createBonusStats={}; createWeapon='sword';
    changeState(ST.CREATE);
  };
  document.getElementById('btn-continue').onclick = () => {
    Snd.click();
    if(loadGame()) { recalcPlayer(); changeState(ST.TOWN); }
  };
  document.getElementById('btn-import').onclick = () => {
    document.getElementById('import-file').click();
  };
  document.getElementById('import-file').onchange = e => {
    if(e.target.files[0]) importSave(e.target.files[0]);
  };

  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(b => b.onclick = () => {
    difficulty = parseInt(b.dataset.diff);
    document.querySelectorAll('.diff-btn').forEach(d => d.classList.toggle('selected', parseInt(d.dataset.diff)===difficulty));
    Snd.click();
  });

  // Skin toggle
  document.getElementById('skin-btn').onclick = () => {
    if (typeof ThemeManager !== 'undefined') {
      const skins = ThemeManager.GAME_SKINS[GAME_ID];
      if (skins) {
        const cur = ThemeManager.getGameSkin(GAME_ID);
        const next = (cur + 1) % skins.length;
        ThemeManager.setGameSkin(GAME_ID, next);
        Snd.click();
      }
    }
  };

  // Town canvas interaction — tap to move or enter building
  gameCanvas.addEventListener('pointerup', (e) => {
    if (gameState !== ST.TOWN) return;
    const rect = gameCanvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    // Convert screen coords to town virtual coords
    const scale = Math.min(rect.width / TOWN_W, rect.height / TOWN_H) * 0.85;
    const offX = (rect.width - TOWN_W * scale) / 2;
    const offY = (rect.height - TOWN_H * scale) / 2;
    const tvx = (sx - offX) / scale;
    const tvy = (sy - offY) / scale;
    // If near a building prompt, enter it
    if (townPromptBldg) {
      Snd.click();
      changeState(townPromptBldg.state);
      return;
    }
    // Otherwise tap-to-move
    townTapTarget = { x: Math.max(10, Math.min(TOWN_W-10, tvx)), y: Math.max(10, Math.min(TOWN_H-10, tvy)) };
  });

  // WASD / Arrow key movement for town
  document.addEventListener('keydown', (e) => {
    if (gameState !== ST.TOWN) return;
    if (e.key==='w'||e.key==='W'||e.key==='ArrowUp') { townKeys.up=true; townTapTarget=null; e.preventDefault(); }
    if (e.key==='s'||e.key==='S'||e.key==='ArrowDown') { townKeys.down=true; townTapTarget=null; e.preventDefault(); }
    if (e.key==='a'||e.key==='A'||e.key==='ArrowLeft') { townKeys.left=true; townTapTarget=null; e.preventDefault(); }
    if (e.key==='d'||e.key==='D'||e.key==='ArrowRight') { townKeys.right=true; townTapTarget=null; e.preventDefault(); }
    if ((e.key==='e'||e.key==='E'||e.key==='Enter') && townPromptBldg) {
      Snd.click(); changeState(townPromptBldg.state); e.preventDefault();
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.key==='w'||e.key==='W'||e.key==='ArrowUp') townKeys.up=false;
    if (e.key==='s'||e.key==='S'||e.key==='ArrowDown') townKeys.down=false;
    if (e.key==='a'||e.key==='A'||e.key==='ArrowLeft') townKeys.left=false;
    if (e.key==='d'||e.key==='D'||e.key==='ArrowRight') townKeys.right=false;
  });

  // Show menu
  changeState(ST.MENU);

  // Start game loop
  requestAnimationFrame(gameLoop);
}

init();

})();
</script>
</body>
</html>
