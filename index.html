<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Iris Moon Arcade</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iris Moon Arcade">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="format-detection" content="telephone=no">
<link rel="stylesheet" href="shared.css">
<style>
  /* Hub page overrides — this page scrolls */
  html { position: static; overflow-y: auto; overflow-x: hidden; height: auto; }
  body { position: static; overflow-y: auto; overflow-x: hidden; height: auto; min-height: 100dvh; touch-action: pan-y; }

  .hub-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 30% 20%, rgba(74,63,107,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 70% 80%, rgba(212,114,140,0.08) 0%, transparent 70%),
      var(--void);
  }

  .hub-container {
    position: relative; z-index: 1;
    max-width: 500px; margin: 0 auto;
    padding: env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom));
    min-height: 100dvh;
  }

  /* Header */
  .hub-header {
    text-align: center;
    padding: clamp(16px, 3dvh, 32px) 0 clamp(8px, 1.5dvh, 16px);
  }

  .hub-brand {
    font-family: var(--font-display); font-size: clamp(10px, 1.4dvh, 13px);
    font-weight: 300; letter-spacing: 5px; text-transform: uppercase;
    color: var(--iris-light); opacity: 0.6;
  }

  .hub-title {
    font-family: var(--font-display); font-size: clamp(28px, 5dvh, 42px);
    font-weight: 300; letter-spacing: 3px; margin: 4px 0 8px;
    background: linear-gradient(135deg, var(--iris-light), var(--neon-rose), var(--moon-gold), var(--neon-cyan));
    background-size: 300% 300%;
    animation: gradientShift 8s ease infinite;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .hub-currency {
    display: flex; gap: 16px; justify-content: center; align-items: center;
    padding: 8px 0;
  }

  .currency-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 5px 14px;
    font-family: var(--font-ui); font-size: 14px; font-weight: 500;
    color: var(--moon-glow);
  }

  .currency-chip .icon { font-size: 16px; }

  /* Art Nouveau divider */
  .ornament {
    text-align: center; padding: 8px 0; opacity: 0.3;
    font-size: 18px; letter-spacing: 8px; color: var(--iris-light);
  }

  /* Game Grid */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding-bottom: 16px;
  }

  .game-card {
    position: relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: clamp(14px, 2.5dvh, 22px) 12px clamp(12px, 2dvh, 18px);
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    overflow: hidden;
  }

  .game-card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 16px;
    background: radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(184,169,212,0.08)) 0%, transparent 70%);
    pointer-events: none;
  }

  .game-card:active {
    transform: scale(0.97);
    border-color: var(--card-accent, var(--iris-light));
    box-shadow: 0 0 20px var(--card-glow, rgba(184,169,212,0.15));
  }

  .card-icon {
    font-size: clamp(28px, 4.5dvh, 40px);
    margin-bottom: 6px;
    filter: drop-shadow(0 0 8px var(--card-glow, rgba(184,169,212,0.3)));
  }

  .card-title {
    font-family: var(--font-display);
    font-size: clamp(16px, 2.5dvh, 22px);
    font-weight: 400;
    margin-bottom: 2px;
    color: var(--moon-glow);
  }

  .card-desc {
    font-size: clamp(9px, 1.2dvh, 11px);
    color: var(--iris-light); opacity: 0.7;
    margin-bottom: 6px;
  }

  .card-score {
    font-family: var(--font-display);
    font-size: clamp(12px, 1.8dvh, 16px);
    color: var(--card-accent, var(--iris-light));
    font-weight: 600;
  }

  /* Card accent colors */
  .game-card[data-game="bloom-puzzle"] { --card-accent: var(--neon-rose); --card-glow: rgba(255,107,157,0.12); }
  .game-card[data-game="neon-2048"] { --card-accent: var(--neon-cyan); --card-glow: rgba(0,229,255,0.12); }
  .game-card[data-game="hex-crush"] { --card-accent: var(--neon-magenta); --card-glow: rgba(224,64,251,0.12); }
  .game-card[data-game="snake-flux"] { --card-accent: var(--neon-green); --card-glow: rgba(118,255,3,0.12); }
  .game-card[data-game="void-defense"] { --card-accent: var(--neon-purple); --card-glow: rgba(179,136,255,0.12); }
  .game-card[data-game="memory-matrix"] { --card-accent: var(--neon-gold); --card-glow: rgba(255,215,64,0.12); }
  .game-card[data-game="garden-maze"] { --card-accent: var(--neon-lime); --card-glow: rgba(198,255,0,0.12); }
  .game-card[data-game="flappy-petal"] { --card-accent: var(--neon-rose); --card-glow: rgba(255,107,157,0.12); }
  .game-card[data-game="sudoku-noir"] { --card-accent: var(--neon-gold); --card-glow: rgba(255,215,64,0.12); }
  .game-card[data-game="minesweeper"] { --card-accent: var(--neon-cyan); --card-glow: rgba(0,229,255,0.12); }

  /* Footer */
  .hub-footer {
    text-align: center; padding: 16px 0 8px;
    font-family: var(--font-display);
    font-size: 11px; letter-spacing: 3px;
    color: var(--iris-light); opacity: 0.3;
  }

  /* Settings toggle */
  .settings-row {
    display: flex; justify-content: center; gap: 12px; padding: 8px 0 16px;
  }
  .setting-btn {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 6px 14px; cursor: pointer;
    font-family: var(--font-ui); font-size: 12px; color: var(--iris-light);
    transition: all 0.3s ease;
  }
  .setting-btn.active { border-color: var(--iris-light); color: var(--moon-glow); }

  @media (max-width: 360px) {
    .hub-container { padding-left: 10px; padding-right: 10px; }
    .game-grid { gap: 8px; }
  }
</style>
</head>
<body class="hub-page">

<div class="hub-bg"></div>

<div class="hub-container">
  <div class="hub-header">
    <div class="hub-brand">Iris Moon Design Co.</div>
    <div class="hub-title">Iris Moon Arcade</div>
    <div class="hub-currency">
      <div class="currency-chip"><span class="icon">&#127801;</span> <span id="petals">0</span></div>
      <div class="currency-chip"><span class="icon">&#127804;</span> <span id="blooms">0</span></div>
    </div>
  </div>

  <div class="ornament">&#9753; &#9753; &#9753;</div>

  <div class="game-grid" id="game-grid"></div>

  <div class="settings-row">
    <button class="setting-btn active" id="btn-sound">Sound: On</button>
    <button class="setting-btn active" id="btn-haptics">Haptics: On</button>
  </div>

  <div class="hub-footer">IRIS MOON DESIGN CO.</div>
</div>

<script src="shared.js"></script>
<script>
const GAMES = [
  { id: 'bloom-puzzle', icon: '\u{1F338}', name: 'Bloom Puzzle', desc: 'Block puzzle — fill rows & columns' },
  { id: 'neon-2048', icon: '\u{1F4A0}', name: 'Neon 2048', desc: 'Swipe & merge to reach 2048' },
  { id: 'hex-crush', icon: '\u{2B21}', name: 'Hex Crush', desc: 'Match-3 on a hexagonal grid' },
  { id: 'snake-flux', icon: '\u{1F40D}', name: 'Snake Flux', desc: 'Classic snake with power-ups' },
  { id: 'void-defense', icon: '\u{1F5FC}', name: 'Void Defense', desc: 'Tower defense — 6 towers, 8 enemies' },
  { id: 'memory-matrix', icon: '\u{1F0CF}', name: 'Memory Matrix', desc: 'Flip & match card pairs' },
  { id: 'garden-maze', icon: '\u{1F331}', name: 'Garden Maze', desc: 'Tron meets gardening — claim territory' },
  { id: 'flappy-petal', icon: '\u{1F33A}', name: 'Flappy Petal', desc: 'Tap to fly through vine gaps' },
  { id: 'sudoku-noir', icon: '\u{1F522}', name: 'Sudoku Noir', desc: 'Classic number puzzle' },
  { id: 'minesweeper', icon: '\u{1F4A3}', name: 'Minesweeper', desc: 'Classic mine avoidance' },
];

function renderHub() {
  const data = ArcadeData.get();
  document.getElementById('petals').textContent = data.currency.petals;
  document.getElementById('blooms').textContent = data.currency.blooms;

  const grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  GAMES.forEach(g => {
    const best = data.scores[g.id]?.best || 0;
    const card = document.createElement('a');
    card.className = 'game-card';
    card.dataset.game = g.id;
    card.href = 'games/' + g.id + '.html';
    card.innerHTML = `
      <div class="card-icon">${g.icon}</div>
      <div class="card-title">${g.name}</div>
      <div class="card-desc">${g.desc}</div>
      ${best > 0 ? `<div class="card-score">Best: ${best}</div>` : ''}
    `;
    grid.appendChild(card);
  });

  // Settings
  const soundBtn = document.getElementById('btn-sound');
  const hapBtn = document.getElementById('btn-haptics');
  const soundOn = data.settings.sound !== false;
  const hapOn = data.settings.haptics !== false;
  soundBtn.textContent = 'Sound: ' + (soundOn ? 'On' : 'Off');
  soundBtn.classList.toggle('active', soundOn);
  hapBtn.textContent = 'Haptics: ' + (hapOn ? 'On' : 'Off');
  hapBtn.classList.toggle('active', hapOn);

  soundBtn.onclick = () => {
    const cur = ArcadeData.getSetting('sound') !== false;
    ArcadeData.setSetting('sound', !cur);
    renderHub();
  };
  hapBtn.onclick = () => {
    const cur = ArcadeData.getSetting('haptics') !== false;
    ArcadeData.setSetting('haptics', !cur);
    renderHub();
  };
}

renderHub();

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
