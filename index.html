<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Maas Arcade</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0818">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maas Arcade">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="format-detection" content="telephone=no">
<link rel="stylesheet" href="shared.css">
<style>
  /* Hub page overrides — this page scrolls */
  html { position: static; overflow-y: auto; overflow-x: hidden; height: auto; }
  body { position: static; overflow-y: auto; overflow-x: hidden; height: auto; min-height: 100dvh; touch-action: pan-y; }

  /* ── Epic Animated Background ── */
  .hub-bg-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  .hub-container {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto;
    padding: env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom));
    min-height: 100dvh;
  }

  /* ── Header — THE SICKEST TITLE ── */
  .hub-header {
    text-align: center;
    padding: clamp(18px, 4vw, 36px) 0 clamp(10px, 2vw, 18px);
    position: relative;
  }

  .hub-brand {
    font-family: var(--font-ui); font-size: clamp(9px, 2.5vw, 12px);
    font-weight: 500; letter-spacing: 6px; text-transform: uppercase;
    color: var(--iris-light); opacity: 0.5;
  }

  /* Glowing runic separator above title */
  .hub-rune-line {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 6px 0 2px; opacity: 0.4;
  }
  .hub-rune-line .rune-dash {
    width: clamp(30px, 10vw, 60px); height: 1px;
    background: linear-gradient(90deg, transparent, var(--iris-light), transparent);
  }
  .hub-rune-line .rune-icon {
    font-size: 10px; color: var(--iris-light); letter-spacing: 4px;
  }

  /* THE MAIN TITLE */
  .hub-title {
    font-family: var(--font-display); font-size: clamp(36px, 9vw, 56px);
    font-weight: 300; letter-spacing: 6px; margin: 4px 0 6px;
    text-transform: uppercase;
    background: linear-gradient(
      135deg,
      #00e5ff 0%, #b388ff 20%, #ff6b9d 40%,
      #ffd740 60%, #76ff03 80%, #00e5ff 100%
    );
    background-size: 400% 400%;
    animation: titleShift 6s ease infinite;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,229,255,0.3));
    position: relative;
  }

  @keyframes titleShift {
    0%, 100% { background-position: 0% 50%; }
    25% { background-position: 50% 0%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 100%; }
  }

  /* Subtitle — tagline */
  .hub-tagline {
    font-family: var(--font-ui); font-size: clamp(8px, 2.2vw, 11px);
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--iris-mid); opacity: 0.6;
    margin-bottom: 10px;
  }

  .hub-currency {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    padding: 6px 0;
  }

  .currency-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 5px 14px;
    font-family: var(--font-ui); font-size: 13px; font-weight: 500;
    color: var(--moon-glow);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }

  .currency-chip .icon { font-size: 15px; }

  /* ── Ornament ── */
  .ornament {
    text-align: center; padding: 6px 0; opacity: 0.2;
    font-size: 14px; letter-spacing: 10px; color: var(--iris-light);
  }

  /* ── Game Grid — Holographic cards ── */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding-bottom: 12px;
  }

  .game-card {
    position: relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: clamp(14px, 3.5vw, 22px) 12px clamp(12px, 3vw, 18px);
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    overflow: hidden;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }

  /* Holographic top-edge glow */
  .game-card::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-accent, var(--iris-light)), transparent);
    opacity: 0.6;
    border-radius: 1px;
    pointer-events: none;
  }

  /* Inner radial glow */
  .game-card::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 14px;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--card-glow, rgba(184,169,212,0.08)) 0%, transparent 70%);
    pointer-events: none;
  }

  .game-card:active {
    transform: scale(0.96);
    border-color: var(--card-accent, var(--iris-light));
    box-shadow: 0 0 24px var(--card-glow, rgba(184,169,212,0.2)), inset 0 0 16px var(--card-glow, rgba(184,169,212,0.05));
  }

  .card-icon {
    font-size: clamp(30px, 8vw, 42px);
    margin-bottom: 6px;
    filter: drop-shadow(0 0 10px var(--card-glow, rgba(184,169,212,0.4)));
  }

  .card-title {
    font-family: var(--font-display);
    font-size: clamp(15px, 3.8vw, 21px);
    font-weight: 400;
    margin-bottom: 2px;
    color: var(--moon-glow);
  }

  .card-desc {
    font-size: clamp(8px, 2vw, 10px);
    color: var(--iris-light); opacity: 0.6;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .card-score {
    font-family: var(--font-display);
    font-size: clamp(11px, 2.8vw, 15px);
    color: var(--card-accent, var(--iris-light));
    font-weight: 600;
  }

  /* Card accent colors */
  .game-card[data-game="bloom-puzzle"] { --card-accent: var(--neon-rose); --card-glow: rgba(255,107,157,0.12); }
  .game-card[data-game="neon-2048"] { --card-accent: var(--neon-cyan); --card-glow: rgba(0,229,255,0.12); }
  .game-card[data-game="hex-crush"] { --card-accent: var(--neon-magenta); --card-glow: rgba(224,64,251,0.12); }
  .game-card[data-game="snake-flux"] { --card-accent: var(--neon-green); --card-glow: rgba(118,255,3,0.12); }
  .game-card[data-game="void-defense"] { --card-accent: var(--neon-purple); --card-glow: rgba(179,136,255,0.12); }
  .game-card[data-game="memory-matrix"] { --card-accent: var(--neon-gold); --card-glow: rgba(255,215,64,0.12); }
  .game-card[data-game="garden-maze"] { --card-accent: var(--neon-lime); --card-glow: rgba(198,255,0,0.12); }
  .game-card[data-game="flappy-petal"] { --card-accent: var(--neon-rose); --card-glow: rgba(255,107,157,0.12); }
  .game-card[data-game="sudoku-noir"] { --card-accent: var(--neon-gold); --card-glow: rgba(255,215,64,0.12); }
  .game-card[data-game="minesweeper"] { --card-accent: var(--neon-cyan); --card-glow: rgba(0,229,255,0.12); }
  .game-card[data-game="blade-of-ruin"] { --card-accent: #ff4444; --card-glow: rgba(255,68,68,0.15); }

  /* Blade of Ruin card — special full-width featured card */
  .game-card.featured {
    grid-column: 1 / -1;
    flex-direction: row;
    gap: 14px;
    padding: clamp(14px, 3vw, 20px) clamp(16px, 4vw, 24px);
    border: 1px solid rgba(255,68,68,0.2);
    background: linear-gradient(135deg, rgba(40,10,10,0.5), var(--glass-bg));
  }

  .game-card.featured .card-icon {
    font-size: clamp(38px, 10vw, 52px);
    margin-bottom: 0;
  }

  .game-card.featured .featured-info {
    text-align: left; flex: 1;
  }

  .game-card.featured .card-title {
    font-size: clamp(18px, 4.5vw, 24px);
  }

  .game-card.featured .card-desc {
    font-size: clamp(9px, 2.2vw, 11px);
  }

  .featured-badge {
    font-family: var(--font-ui);
    font-size: clamp(7px, 1.8vw, 9px);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ff4444;
    background: rgba(255,68,68,0.12);
    border: 1px solid rgba(255,68,68,0.25);
    border-radius: 10px;
    padding: 2px 8px;
    display: inline-block;
    margin-bottom: 4px;
  }

  /* ── Settings Row ── */
  .settings-row {
    display: flex; justify-content: center; gap: 10px; padding: 8px 0 14px;
    flex-wrap: wrap;
  }
  .setting-btn {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 6px 14px; cursor: pointer;
    font-family: var(--font-ui); font-size: 12px; color: var(--iris-light);
    transition: all 0.3s ease;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .setting-btn.active { border-color: var(--iris-light); color: var(--moon-glow); }
  .setting-btn:active { transform: scale(0.95); }

  /* ── Theme Picker Modal ── */
  .theme-modal-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .theme-modal-backdrop.visible { opacity: 1; pointer-events: all; }

  .theme-modal {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: clamp(20px, 5vw, 32px);
    width: min(90vw, 380px);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    animation: fadeInUp 0.3s ease;
  }

  .theme-modal-title {
    font-family: var(--font-display);
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 300; letter-spacing: 2px;
    text-align: center; margin-bottom: 16px;
    color: var(--moon-glow);
  }

  .theme-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }

  .theme-card {
    background: rgba(20,16,36,0.6);
    border: 2px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
  }
  .theme-card.active {
    border-color: var(--moon-gold);
    box-shadow: 0 0 16px rgba(212,168,106,0.3);
  }
  .theme-card:active { transform: scale(0.96); }

  .theme-swatches {
    display: flex; gap: 4px; justify-content: center; margin-bottom: 6px;
  }
  .theme-swatch {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .theme-card-name {
    font-family: var(--font-ui);
    font-size: clamp(10px, 2.5vw, 12px);
    font-weight: 500; color: var(--moon-glow);
    letter-spacing: 1px;
  }

  .theme-close-btn {
    display: block; margin: 0 auto;
    font-family: var(--font-ui); font-size: 13px; font-weight: 500;
    color: var(--iris-light); background: transparent;
    border: 1px solid var(--glass-border); border-radius: 20px;
    padding: 8px 24px; cursor: pointer;
    transition: all 0.3s ease;
  }
  .theme-close-btn:active { background: var(--glass-bg); }

  /* ── Footer ── */
  .hub-footer {
    text-align: center; padding: 14px 0 8px;
    font-family: var(--font-ui);
    font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--iris-light); opacity: 0.2;
  }

  @media (max-width: 360px) {
    .hub-container { padding-left: 10px; padding-right: 10px; }
    .game-grid { gap: 8px; }
  }
</style>
</head>
<body class="hub-page">

<canvas class="hub-bg-canvas" id="hub-bg"></canvas>

<div class="hub-container">
  <div class="hub-header">
    <div class="hub-brand"></div>
    <div class="hub-rune-line">
      <span class="rune-dash"></span>
      <span class="rune-icon">&#10038; &#10038; &#10038;</span>
      <span class="rune-dash"></span>
    </div>
    <div class="hub-title">MAAS ARCADE</div>
    <div class="hub-tagline">Where Galaxies Collide With Legend</div>
    <div class="hub-currency">
      <div class="currency-chip"><span class="icon">&#9733;</span> <span id="petals">0</span></div>
      <div class="currency-chip"><span class="icon">&#9830;</span> <span id="blooms">0</span></div>
    </div>
  </div>

  <div class="ornament">&#8902; &#8902; &#8902;</div>

  <div class="game-grid" id="game-grid"></div>

  <div class="settings-row">
    <button class="setting-btn active" id="btn-sound">Sound: On</button>
    <button class="setting-btn active" id="btn-haptics">Haptics: On</button>
    <button class="setting-btn" id="btn-theme">&#9881; Theme</button>
  </div>

  <div class="hub-footer"></div>
</div>

<!-- Theme Picker Modal -->
<div class="theme-modal-backdrop" id="theme-modal">
  <div class="theme-modal">
    <div class="theme-modal-title">Choose Theme</div>
    <div class="theme-grid" id="theme-grid"></div>
    <button class="theme-close-btn" id="theme-close">Close</button>
  </div>
</div>

<script src="shared.js"></script>
<script>
const GAMES = [
  { id: 'blade-of-ruin', icon: '\u2694\uFE0F', name: 'Blade of Ruin', desc: 'Turn-based arena RPG — overthrow the Shadow Lord', featured: true },
  { id: 'bloom-puzzle', icon: '\u{1F338}', name: 'Bloom Puzzle', desc: 'Block puzzle — fill rows & columns' },
  { id: 'neon-2048', icon: '\u{1F436}', name: "Obi's Block Game", desc: 'Swipe & merge to reach 2048' },
  { id: 'hex-crush', icon: '\u{2B21}', name: 'Hex Crush', desc: 'Match-3 on a hexagonal grid' },
  { id: 'snake-flux', icon: '\u{1F40D}', name: 'Snake Flux', desc: 'Classic snake with power-ups' },
  { id: 'void-defense', icon: '\u{1F5FC}', name: 'Galactic Defense', desc: 'Tower defense — 7 towers, endless waves' },
  { id: 'memory-matrix', icon: '\u{1F0CF}', name: 'Memory Matrix', desc: 'Flip & match card pairs' },
  { id: 'garden-maze', icon: '\u{1F331}', name: 'Garden Maze', desc: 'Tron meets gardening — claim territory' },
  { id: 'flappy-petal', icon: '\u{1F33A}', name: 'Flappy Petal', desc: 'Tap to fly through vine gaps' },
  { id: 'sudoku-noir', icon: '\u{1F522}', name: 'Sudoku Noir', desc: 'Classic number puzzle' },
  { id: 'minesweeper', icon: '\u{1F4A3}', name: 'Minesweeper', desc: 'Classic mine avoidance' },
];

function renderHub() {
  const data = ArcadeData.get();
  document.getElementById('petals').textContent = data.currency.petals;
  document.getElementById('blooms').textContent = data.currency.blooms;

  const grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  GAMES.forEach(g => {
    const best = data.scores[g.id]?.best || 0;
    const card = document.createElement('a');
    card.className = 'game-card' + (g.featured ? ' featured' : '');
    card.dataset.game = g.id;
    card.href = 'games/' + g.id + '.html';

    if (g.featured) {
      card.innerHTML = `
        <div class="card-icon">${g.icon}</div>
        <div class="featured-info">
          <div class="featured-badge">New RPG</div>
          <div class="card-title">${g.name}</div>
          <div class="card-desc">${g.desc}</div>
          ${best > 0 ? `<div class="card-score">Best: ${best}</div>` : ''}
        </div>
      `;
    } else {
      card.innerHTML = `
        <div class="card-icon">${g.icon}</div>
        <div class="card-title">${g.name}</div>
        <div class="card-desc">${g.desc}</div>
        ${best > 0 ? `<div class="card-score">Best: ${best}</div>` : ''}
      `;
    }
    grid.appendChild(card);
  });

  // Settings
  const soundBtn = document.getElementById('btn-sound');
  const hapBtn = document.getElementById('btn-haptics');
  const soundOn = data.settings.sound !== false;
  const hapOn = data.settings.haptics !== false;
  soundBtn.textContent = 'Sound: ' + (soundOn ? 'On' : 'Off');
  soundBtn.classList.toggle('active', soundOn);
  hapBtn.textContent = 'Haptics: ' + (hapOn ? 'On' : 'Off');
  hapBtn.classList.toggle('active', hapOn);

  soundBtn.onclick = () => {
    const cur = ArcadeData.getSetting('sound') !== false;
    ArcadeData.setSetting('sound', !cur);
    renderHub();
  };
  hapBtn.onclick = () => {
    const cur = ArcadeData.getSetting('haptics') !== false;
    ArcadeData.setSetting('haptics', !cur);
    renderHub();
  };
}

// ── Theme Picker ──
function renderThemePicker() {
  const grid = document.getElementById('theme-grid');
  grid.innerHTML = '';
  const current = ThemeManager.getTheme();

  const swatchColors = {
    'void-neon': ['#0a0818', '#4a3f6b', '#b8a9d4', '#d4a86a'],
    'hyperspace': ['#020a14', '#1a4a7a', '#7abcf0', '#6ac4ff'],
    'mirkwood': ['#060d08', '#2a5a38', '#7acc8e', '#c9a84c'],
    'mordor-forge': ['#140804', '#6a3a1a', '#e0a060', '#ff8c00'],
  };

  for (const [key, theme] of Object.entries(ThemeManager.HUB_THEMES)) {
    const card = document.createElement('div');
    card.className = 'theme-card' + (key === current ? ' active' : '');

    const colors = swatchColors[key] || ['#333','#666','#999','#ccc'];
    card.innerHTML = `
      <div class="theme-swatches">
        ${colors.map(c => `<div class="theme-swatch" style="background:${c}"></div>`).join('')}
      </div>
      <div class="theme-card-name">${theme.label}</div>
    `;

    card.onclick = () => {
      ThemeManager.setTheme(key);
      renderThemePicker();
      renderHub();
    };

    grid.appendChild(card);
  }
}

document.getElementById('btn-theme').onclick = () => {
  renderThemePicker();
  document.getElementById('theme-modal').classList.add('visible');
};

document.getElementById('theme-close').onclick = () => {
  document.getElementById('theme-modal').classList.remove('visible');
};

document.getElementById('theme-modal').onclick = (e) => {
  if (e.target === document.getElementById('theme-modal')) {
    document.getElementById('theme-modal').classList.remove('visible');
  }
};

// ── Epic Background — Starfield + Grid + Nebula + Particles ──
(() => {
  const canvas = document.getElementById('hub-bg');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W, H;

  // Stars
  const stars = [];
  const STAR_COUNT = 120;

  // Grid lines (Tron effect)
  let gridPhase = 0;

  // Ember particles
  const embers = [];
  const EMBER_COUNT = 20;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  function init() {
    resize();
    // Generate stars
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 0.5 + Math.random() * 2,
        speed: 0.02 + Math.random() * 0.08,
        alpha: 0.2 + Math.random() * 0.6,
        phase: Math.random() * Math.PI * 2,
        twinkle: Math.random() < 0.15,
      });
    }
    // Generate embers
    for (let i = 0; i < EMBER_COUNT; i++) {
      embers.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -0.2 - Math.random() * 0.5,
        size: 1 + Math.random() * 2.5,
        life: Math.random(),
        color: Math.random() > 0.5 ? '#ff6b4a' : '#ffaa33',
      });
    }
  }

  function drawBackground() {
    // Deep void gradient
    const bgGrad = ctx.createRadialGradient(W * 0.4, H * 0.3, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.8);
    bgGrad.addColorStop(0, '#0f0c1e');
    bgGrad.addColorStop(0.5, '#0a0818');
    bgGrad.addColorStop(1, '#050410');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Nebula clouds
    const nebulae = [
      { x: W * 0.2, y: H * 0.25, r: W * 0.35, c: '80,40,160' },
      { x: W * 0.75, y: H * 0.65, r: W * 0.3, c: '160,40,80' },
      { x: W * 0.5, y: H * 0.85, r: W * 0.25, c: '40,100,160' },
    ];
    for (const n of nebulae) {
      const ng = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      ng.addColorStop(0, `rgba(${n.c},0.06)`);
      ng.addColorStop(1, `rgba(${n.c},0)`);
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawStars(t) {
    for (const s of stars) {
      let alpha = s.alpha;
      if (s.twinkle) {
        alpha *= 0.5 + 0.5 * Math.sin(t * 2 + s.phase);
      }
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#e8e0ff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawGrid(t) {
    gridPhase = t * 0.15;
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 0.5;

    const spacing = 60;
    // Horizontal lines scrolling down
    const offset = (gridPhase * 40) % spacing;
    for (let y = -spacing + offset; y < H + spacing; y += spacing) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    // Vertical lines
    for (let x = 0; x < W; x += spacing) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawEmbers(t) {
    for (const e of embers) {
      e.x += e.vx;
      e.y += e.vy;
      e.life -= 0.003;

      if (e.life <= 0 || e.y < -10) {
        e.x = Math.random() * W;
        e.y = H + 10;
        e.life = 0.5 + Math.random() * 0.5;
      }

      ctx.globalAlpha = e.life * 0.5;
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * e.life, 0, Math.PI * 2);
      ctx.fill();

      // Glow
      ctx.globalAlpha = e.life * 0.15;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * e.life * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function animate() {
    const t = Date.now() * 0.001;
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawGrid(t);
    drawStars(t);
    drawEmbers(t);
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  init();
  animate();
})();

renderHub();

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
